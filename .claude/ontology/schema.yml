name: domain-driven
version: 1
description: "podo-backend는 28개 도메인 모듈이 applications/ 아래 분리되어 있고, command/query 서비스 분리와 이벤트 리스너 패턴을 사용하므로 Domain-Driven 구조가 자연스럽게 대응됨"
element_types:
  - name: Aggregate
    description: "트랜잭션 일관성의 경계 단위. 하나의 Aggregate Root와 그에 속한 Entity/ValueObject를 포함"
    has: [root_entity, entities, value_objects, invariants]
  - name: Entity
    description: "고유 식별자를 가지며 생명주기가 있는 도메인 개체"
    has: [properties, identity, lifecycle_states]
  - name: ValueObject
    description: "식별자 없이 속성 값의 조합으로 정의되는 불변 개체"
    has: [properties, equality_rule]
  - name: DomainEvent
    description: "도메인에서 발생한 사실을 표현하는 불변 메시지"
    has: [payload, trigger, subscribers]
  - name: Command
    description: "시스템에 대한 의도적 행위 요청"
    has: [parameters, preconditions, postconditions]
  - name: DomainService
    description: "특정 Entity나 Aggregate에 속하지 않는 도메인 로직"
    has: [operations, dependencies]
  - name: Repository
    description: "Aggregate의 영속성 접근을 추상화하는 인터페이스"
    has: [aggregate, query_methods]
  - name: BoundedContext
    description: "도메인 모델의 적용 범위를 한정하는 경계"
    has: [aggregates, upstream_contexts, downstream_contexts]

name: determinism-regression

# Phase 1 P1-4 — catalog drift guard.
#
# Authority:
#   development-records/evolve/20260423-phase-1-catalog-ssot-design.md §9
#   development-records/evolve/20260423-activation-determinism-redesign.md §8
#
# Purpose: fail closed when a PR (or push to main) lands a catalog change
# without regenerating its 5 derived artifacts. Without this gate, the
# runtime entry guards in dispatcher.ts / preboot-dispatch.ts catch drift
# only at invocation time, and the cli-help segment + package.json scripts
# have no module-load guard at all.
#
# `paths:` filter mirrors every input that can flip a derived artifact:
# the catalog itself, the deriver code, the templates, the existing
# derived files, and this workflow file. Any of those changing requires
# the drift check to pass.
#
# `ONTO_ALLOW_STALE_DISPATCHER=1` is intentionally NOT honored here.
# That env var is a dev-workflow escape (mid-edit local runs); CI is the
# main-protection gate and must run fail-closed.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/core-runtime/cli/command-catalog.ts'
      - 'src/core-runtime/cli/command-catalog-helpers.ts'
      - 'src/core-runtime/cli/command-catalog.test.ts'
      - 'src/core-runtime/cli/dispatcher.ts'
      - 'src/core-runtime/cli/preboot-dispatch.ts'
      - 'src/core-runtime/cli/dispatch-preboot-core.ts'
      - 'src/core-runtime/cli/meta-handlers.ts'
      - 'src/core-runtime/cli/catalog-hash.ts'
      - 'src/core-runtime/cli/derive-hash-guard.ts'
      - 'src/cli.ts'
      - 'scripts/check-catalog-drift.ts'
      - 'scripts/check-handler-exports.ts'
      - 'scripts/check-contract-refs.ts'
      - 'scripts/generate-command-catalog-derived.ts'
      - 'scripts/command-catalog-generator/**'
      - 'src/core-runtime/cli/command-catalog-templates/**'
      - '.onto/commands/**'
      - '.onto/processes/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/determinism-regression.yml'

jobs:
  catalog-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Verify catalog ↔ derived artifacts are in sync
        run: npm run check:catalog-drift

      # P2-A canonical gate (RFC-1 §6.1 Layer 0): handler_module fs 존재 +
      # handler_export 함수 형 검증. drift 통과 후 실행 — drift 가 우선 fail
      # 차단하는 게 깨끗한 진단 (catalog 형식 OK 후 handler 검증).
      - name: Verify catalog handler_export references resolve
        run: npm run check:handler-exports

      # R2-PR-4 (RFC-2 §4.5): contract_ref 파일 존재 검증. catalog 의 PublicEntry
      # contract_ref 가 .onto/processes/*.md 에 실제 존재하는지. broken ref 가
      # silent 로 markdown-deriver 까지 전파되는 것을 PR 진입에서 차단.
      - name: Verify catalog contract_ref files exist
        run: npm run check:contract-refs

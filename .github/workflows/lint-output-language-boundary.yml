name: lint-output-language-boundary

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'processes/**'
      - 'commands/**'
      - 'design-principles/**'
      - 'authority/external-render-points.yaml'
      - 'roles/**'
      - 'src/**'
      - 'scripts/lint-output-language-boundary.ts'
      - 'process.md'
      - 'CLAUDE.md'
      - '.github/workflows/lint-output-language-boundary.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Enforce output-language boundary
        run: npm run lint:output-language-boundary

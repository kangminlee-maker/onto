# Core Lens Registry
#
# Single source of truth for all core lens IDs and per-lens semantic scope.
# "lens가 무엇을 검증하는가?"의 단일 seat.
# Consumed by: review-invoke.ts (lens set defaults), materialize-review-prompt-packets.ts (core role detection).
# Adding a new core lens: add it here. The runtime derives FULL/LIGHT/CORE sets from this file.
# Canonical label owner: this file owns the canonical bare lens/role IDs (logic, structure, …).
# Concept ownership is in core-lexicon.yaml; this file owns the runtime-facing ID labels.
#
# `schema_version`: 이 registry 의 semantic 세대.
# Bump 규칙: yaml 구조(필드 이름·배열)는 유지하면서 lens 집합의 의미
# (core-axis composition, selection rationale) 가 바뀔 때 bump.
# 세대 이력은 `core_axis_lens_ids` 아래 "이력" 블록에 누적.
schema_version: 2

lens_definitions:
  logic:
    purpose: "Logical consistency verification"
    semantic_scope: "Contradictions, type conflicts, constraint conflicts"
    role_ref: ".onto/roles/logic.md"
  structure:
    purpose: "Structural completeness verification"
    semantic_scope: "Isolated elements, broken paths, missing relations"
    role_ref: ".onto/roles/structure.md"
  dependency:
    purpose: "Dependency integrity verification"
    semantic_scope: "Cycles, reverse direction, diamond dependencies"
    role_ref: ".onto/roles/dependency.md"
  semantics:
    purpose: "Semantic accuracy verification"
    semantic_scope: "Name-meaning alignment, synonyms/homonyms"
    role_ref: ".onto/roles/semantics.md"
  pragmatics:
    purpose: "Pragmatic fitness verification"
    semantic_scope: "Queryability, competency question testing"
    role_ref: ".onto/roles/pragmatics.md"
  evolution:
    purpose: "Evolution fitness verification"
    semantic_scope: "Breakage when adding new data/domains"
    role_ref: ".onto/roles/evolution.md"
  coverage:
    purpose: "Domain coverage verification"
    semantic_scope: "Missing sub-areas, concept bias, gaps against standards"
    role_ref: ".onto/roles/coverage.md"
  conciseness:
    purpose: "Conciseness verification"
    semantic_scope: "Duplicate definitions, over-specification, unnecessary distinctions"
    role_ref: ".onto/roles/conciseness.md"
  axiology:
    purpose: "Purpose and value alignment verification"
    semantic_scope: "Purpose drift, value conflict, mission misalignment"
    role_ref: ".onto/roles/axiology.md"
  synthesize:
    purpose: "Review synthesis and adjudication"
    semantic_scope: "Consensus integration, disagreement preservation, final review output"
    role_ref: ".onto/roles/synthesize.md"

# `full_review_lens_ids` — 9 lens 전수. review_mode 가 `full` 일 때 실행.
# 9 lens 는 다양한 관점 (논리 / 구조 / 의존 / 의미 / 실용 / 진화 / 커버리지 /
# 간결 / 가치) 을 독립적으로 검증. 분류 (meta-level vs content-level) 는
# v0.2.0 의 design-intent 잠정 분류였으나 v0.2.1 empirical 재구성 이후
# 이 taxonomy 는 SSOT 에서 제거 — 실제 선정 근거는 core_axis_lens_ids
# 섹션의 empirical 주석 및 benchmark 참조.
full_review_lens_ids:
  - logic
  - structure
  - dependency
  - semantics
  - pragmatics
  - evolution
  - coverage
  - conciseness
  - axiology

# `core_axis_lens_ids` — review_mode 가 `core-axis` 일 때 실행되는 고정
# lens set. v0.2.1 (schema_version=2) 부터 cost-constrained Pareto-optimal
# (coverage × depth × items-lost × cost 4-axis) 6 lens.
#
# Default 결정은 invocation path 별 다름 (registry 단독 결정 X):
#   - explicit `--review-mode` / config `review_mode` 없으면 → `full`
#   - host-facing positional invoke (예: /onto:review) → `core-axis`
#
# 선정 근거 · 각 lens 의 empirical 역할 · 이름 `core-axis` 의 의미 shift
# (PR #127 meta-level axis → PR #131 empirical core lens) · rejected
# alternative 분석 은 아래 proposal §1.1.1 (이름 shift) / §1.1.2 (Pareto
# 용어) / §3.2 (Pareto frontier) / §4 (권장안 근거) 에 기술.
# 수치 (coverage / depth / items-lost / cost) SSOT 는 benchmark 파일.
#
# 참조:
#   - Proposal (설계 rationale + 이름 의미 shift):
#       development-records/evolve/20260419-core-axis-empirical-recomposition.md
#   - Benchmark (수치 SSOT):
#       development-records/benchmark/20260419-lens-contribution-analysis.md
#
# 이력 (세대 변경 시 본 section 1 줄 추가, schema_version 함께 bump):
#   - 세대 1 (v0.2.0, PR #127 light→core-axis rename): 4 lens (logic / pragmatics / evolution / axiology) — meta-level axis 잠정
#   - 세대 2 (v0.2.1): 6 lens empirical recomposition — 본 seat
#
# Recomposition procedure (세대 N → N+1 시 본 6 step 을 단일 PR 에 묶어 실행):
#   1. `core_axis_lens_ids` array 갱신
#   2. `schema_version: N+1` bump
#   3. 본 "이력" 블록에 "세대 N+1" 한 줄 추가
#   4. lens-registry.test.ts 의 content assertion (정확 집합) + raw-text schema_version guard 갱신
#   5. 신규 proposal 파일 생성 `development-records/evolve/YYYYMMDD-<topic>.md` (rationale + alternative + empirical 근거)
#   6. 본 yaml "참조" 블록의 proposal pointer 를 신규 파일로 교체 (또는 append)
core_axis_lens_ids:
  - axiology
  - coverage
  - evolution
  - logic
  - semantics
  - structure

# Core role IDs: these lenses have system-level role definitions in ontoHome/.onto/roles/.
# Project override is forbidden for these roles.
core_role_ids:
  - logic
  - structure
  - dependency
  - semantics
  - pragmatics
  - evolution
  - coverage
  - conciseness
  - axiology
  - synthesize

# `always_include_lens_ids` — 어떤 lens set 에도 반드시 포함되는 lens.
# 현재는 axiology 뿐 (가치 정합성은 모든 review 의 최상위 판단 축이므로).
# core_axis_lens_ids 에 axiology 가 들어있는 것은 결과적 일치 — always_include
# 규칙과 core-axis mode 의 empirical 선정 (v0.2.1 cost-constrained Pareto)
# 이 각각 독립 이유로 axiology 를 채택.
always_include_lens_ids:
  - axiology

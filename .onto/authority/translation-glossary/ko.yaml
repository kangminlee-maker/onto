# .onto/authority/translation-glossary/ko.yaml
#
# 한국어 번역 glossary — canonical SSOT: .onto/authority/core-lexicon.yaml §authoring_rules.translation_policy.
# Consumer: src/core-runtime/translate/render-for-user.ts (Phase 2 backend 도입 시).
# Layer: output-language-boundary.md §9 Layer 2.
#
# v0.21.0 정책 (2026-04-20): bilingual mode 제거. default=preserved. 현재 2 mode 시스템:
#   - preserved: 원어 유지 (default). rank 1-4 + command 어휘 전수 해당.
#   - translated: korean_label 치환 (explicit opt-in). 현재 사용 항목 0.
#
# 본 파일의 역할 (v0.21.0 이후):
#   - preserved 항목 (default 또는 explicit): rationale 기록용 (optional documentation)
#   - translated 항목 (explicit opt-in): translated_label + rationale 필수 (lint R3 enforce)
#
# Lint: scripts/lint-output-language-boundary.ts R3/R4/R5 가 일관성 검증.
#   R3: lexicon 의 translation_mode=translated explicit 선언 시 본 파일에 translated_label 포함 entry 필수
#   R4: entry 의 mode 가 lexicon 의 declared mode 와 일치
#   R5: entry 의 term_id 가 lexicon 에 존재하는 key 또는 term_id
#
# 신규 term 추가 시:
#   - 기본 (rank 1-4 정의 개념 또는 command): 아무 편집 불필요. default preserved 로 자동 적용.
#   - 예외 (비-core 일반어로 translated 필요): lexicon 에 translation_mode=translated 명시 + 본 파일에 translated_label 추가.

version: "1.1"
language: "ko"
schema_version: "1"
as_of: "2026-04-20"

# ---------------------------------------------------------------------------
# Preserved — 원어 유지 rationale (documentation only).
# 본 section 은 rank 1-4 + command 중 rationale 기록 가치가 큰 항목만 선별 등재.
# 기록되지 않은 entity/term 도 동일하게 preserved default 적용.
# ---------------------------------------------------------------------------
entries:
  - term_id: "entrypoint"
    mode: "preserved"
    rationale: "framework-specific entrypoint 개념. '진입점' 은 일반 용어라 onto 의 구조적 의미 (dispatches→process) 손상."

  - term_id: "domain"
    mode: "preserved"
    rationale: "scope axis 의 값 + cross-product frame. '도메인' 이 일반 용어로 쓰이면 framework scope 와 혼동."

  - term_id: "ontology"
    mode: "preserved"
    rationale: "product-local 개념·실체·관계 망. '온톨로지' 는 학술 용어로서 onto-direction §1 의 정밀 의미와 편차."

  - term_id: "activity_enum"
    mode: "preserved"
    rationale: "§1.2 의 5 활동 canonical enum. 번역 시 enum identity 손상."

  - term_id: "axis_enum"
    mode: "preserved"
    rationale: "§1.5 의 4 축 canonical enum. W-ID 축 토큰과 직결."

  - term_id: "fact_type"
    mode: "preserved"
    rationale: "reconstruct 활동의 10-value taxonomy. 각 value (entity/enum/property 등) 가 이미 영어 canonical."

# ---------------------------------------------------------------------------
# Translated — explicit opt-in (현재 0 entries).
# 미래 rank 1-4 외부 일반어가 lexicon 에 등재되면서 translated 필요 시 추가.
# 각 entry 는 translated_label + rationale 필수.
# ---------------------------------------------------------------------------
# (현재 빈 상태 — lexicon 전수가 preserved default 로 일관)

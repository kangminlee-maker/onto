# per src/core-runtime/review/review-config-legacy-translate.ts:legacyTopologyIdToAxes.
review:
  teamlead:
    model:
      provider: codex
      model_id: gpt-5.4
      effort: high
  subagent:
    provider: codex
    model_id: gpt-5.4
    effort: high

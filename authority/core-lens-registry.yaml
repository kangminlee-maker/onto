# Core Lens Registry
#
# Single source of truth for all core lens IDs and per-lens semantic scope.
# "lens가 무엇을 검증하는가?"의 단일 seat.
# Consumed by: review-invoke.ts (lens set defaults), materialize-review-prompt-packets.ts (core role detection).
# Adding a new core lens: add it here. The runtime derives FULL/LIGHT/CORE sets from this file.
# Canonical label owner: this file owns the canonical bare lens/role IDs (logic, structure, …).
# Concept ownership is in core-lexicon.yaml; this file owns the runtime-facing ID labels.

lens_definitions:
  logic:
    purpose: "Logical consistency verification"
    semantic_scope: "Contradictions, type conflicts, constraint conflicts"
    role_ref: "roles/logic.md"
  structure:
    purpose: "Structural completeness verification"
    semantic_scope: "Isolated elements, broken paths, missing relations"
    role_ref: "roles/structure.md"
  dependency:
    purpose: "Dependency integrity verification"
    semantic_scope: "Cycles, reverse direction, diamond dependencies"
    role_ref: "roles/dependency.md"
  semantics:
    purpose: "Semantic accuracy verification"
    semantic_scope: "Name-meaning alignment, synonyms/homonyms"
    role_ref: "roles/semantics.md"
  pragmatics:
    purpose: "Pragmatic fitness verification"
    semantic_scope: "Queryability, competency question testing"
    role_ref: "roles/pragmatics.md"
  evolution:
    purpose: "Evolution fitness verification"
    semantic_scope: "Breakage when adding new data/domains"
    role_ref: "roles/evolution.md"
  coverage:
    purpose: "Domain coverage verification"
    semantic_scope: "Missing sub-areas, concept bias, gaps against standards"
    role_ref: "roles/coverage.md"
  conciseness:
    purpose: "Conciseness verification"
    semantic_scope: "Duplicate definitions, over-specification, unnecessary distinctions"
    role_ref: "roles/conciseness.md"
  axiology:
    purpose: "Purpose and value alignment verification"
    semantic_scope: "Purpose drift, value conflict, mission misalignment"
    role_ref: "roles/axiology.md"
  synthesize:
    purpose: "Review synthesis and adjudication"
    semantic_scope: "Consensus integration, disagreement preservation, final review output"
    role_ref: "roles/synthesize.md"

# `full_review_lens_ids` — 9 lens 전수. review_mode 가 `full` 일 때 실행.
# Content-level (structure / dependency / semantics / coverage / conciseness)
# 과 meta-level (logic / pragmatics / evolution / axiology) 를 모두 포함.
full_review_lens_ids:
  - logic
  - structure
  - dependency
  - semantics
  - pragmatics
  - evolution
  - coverage
  - conciseness
  - axiology

# `core_axis_lens_ids` — 6 lens. review_mode 가 `core-axis` 일 때 실행.
# Default 결정은 invocation path 별 다름 (registry 단독으로 결정 X):
#   - explicit `--review-mode` / config `review_mode` 없으면 → `full` (review-invoke.ts:1171 fallback)
#   - host-facing positional invoke (예: /onto:review) → `core-axis` (Step 1.5 dynamic 또는 fixed 6-lens, host_runtime 분기)
#
# 선정 근거 (empirical, v5 benchmark 기반):
#   479 session set-cover + 24 consensus depth items 의 empirical simulation
#   결과, 본 6 lens 조합이 Pareto-optimal:
#     - Coverage 86.4% (fully-coverable session cover rate)
#     - Depth retention 67.6% (consensus cross-lens redundancy)
#     - Items lost 2/24 (axiology-only sole contributor 2 개)
#   k=3~9 전수 비교에서 k=6 이 유일 Pareto front.
#
# Broad lens (logic / evolution / axiology) 과 niche lens
# (coverage / semantics / structure) 의 혼합 — MECE 하지 않음이 품질
# 보증 (다중 독립 검증). 각 lens 의 실측 기여:
#   - logic: 논리 일관성 — broad coverage contributor
#   - structure: 구조 완결성 — niche, 깨진 경로/고립 요소 감지
#   - semantics: 이름-의미 정렬 — niche, 동의어/동형어 감지
#   - evolution: 시간 변화 / 확장성 — broad coverage contributor
#   - coverage: 도메인 누락 / 개념 편향 — niche, "놓친 영역" 감지
#   - axiology: 가치 / 목적 정합성 — broad, always_include 와 결과 일치
#
# 제외: pragmatics / dependency / conciseness (3) — empirical marginal
# contribution 이 본 6 개 대비 낮음. 재포함 시 k=7~9 구간에서
# Pareto-dominated.
#
# Cost:
#   - LLM call 수: core-axis 실행 시 6 (vs full 9) — full 대비 67%
#   - v0.2.0 (4 lens) 대비 +50% call 증가, coverage/depth trade-off 에서
#     우위 (사용자 benchmark v5 §6.6-6.7 참조)
#
# 이력:
#   - PR #127 (v0.2.0): `light_review_lens_ids` → `core_axis_lens_ids` rename
#     (당시 4 lens: logic / pragmatics / evolution / axiology)
#   - PR ??? (v0.2.1): 4 → 6 lens empirical recomposition (본 PR)
#     제거: pragmatics. 추가: coverage / semantics / structure
#
# 참조:
#   - development-records/benchmark/20260419-lens-contribution-analysis.md (v5)
#   - development-records/evolve/20260419-core-axis-empirical-recomposition.md
#   - development-records/evolve/20260418-light-to-core-axis-rename-proposal.md
core_axis_lens_ids:
  - axiology
  - coverage
  - evolution
  - logic
  - semantics
  - structure

# Core role IDs: these lenses have system-level role definitions in ontoHome/roles/.
# Project override is forbidden for these roles.
core_role_ids:
  - logic
  - structure
  - dependency
  - semantics
  - pragmatics
  - evolution
  - coverage
  - conciseness
  - axiology
  - synthesize

# `always_include_lens_ids` — 어떤 lens set 에도 반드시 포함되는 lens.
# 현재는 axiology 뿐 (가치 정합성은 모든 review 의 최상위 판단 축이므로).
# core_axis_lens_ids 에 axiology 가 들어있는 것은 결과적 일치 — always_include
# 규칙과 core-axis mode 의 meta-axis 선정이 각각 독립 이유로 axiology 를 채택.
always_include_lens_ids:
  - axiology

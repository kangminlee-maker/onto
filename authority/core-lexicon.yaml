  - term_id: "fact_type"
    canonical_label: "fact type"
    korean_label: "사실 유형"
    translation_mode: "preserved"
    axis: "onto_taxonomy"
    term_status: "active"
    definition: "reconstruct 활동에서 Explorer 가 source (코드/스프레드시트/DB/문서) 를 traverse 하며 발견한 domain fact 의 분류. Delta (fact 보고 단위) 의 필수 속성. 본 term 이 enum 의 authority SSOT."
    allowed_values:
      - "entity"
      - "enum"
      - "property"
      - "relation"
      - "code_mapping"
      - "state_transition"
      - "command"
      - "query"
      - "policy_constant"
      - "flow"
    stage_partition:
      stage_1_structure:
        - "entity"
        - "enum"
        - "property"
        - "relation"
        - "code_mapping"
      stage_2_behavior:
        - "state_transition"
        - "command"
        - "query"
        - "policy_constant"
        - "flow"
    legacy_aliases: []  # 신규 term, retire 이력 없음. 향후 fact_type rename·세분화 발생 시 activity_enum 과 동일 구조로 기록.
    notes:
      - "Stage 1 (Structure) = source 가 무엇인가 (names, fields, relations, schemas) 분류. Explorer 가 Stage 1 라운드에서 우선 보고."
      - "Stage 2 (Behavior) = source 가 무엇을 하는가 (state transitions, methods, flows) 분류. Stage 1 entity 확정 후 Stage 2 라운드에서 보고."
      - "Stage 2 coverage 정의: 한 entity 가 ≥1 fact (state_transition | command | query) 를 가지면 covered. policy_constant + flow 는 cross-cutting, coverage 에 산입 안 됨 (reconstruct.md L747)."
      - "Producer: Explorer (reconstruct.md L395-400). Consumer: Lenses (label assignment), Runtime Coordinator (patch generation), Phase 3 Observation Aspect Distribution table 간접 참조."
      - "Schema location: `processes/reconstruct.md` L1003 의 Delta schema 가 본 enum 의 schema-level 적용 위치. 본 lexicon term 이 값 정의의 SSOT, reconstruct.md 는 schema 적용처."
      - "Canonical definition source: 본 lexicon term (v0.10.0). reconstruct.md L1003 와 BLUEPRINT.md fact_type 섹션은 본 term 을 참조."
      - "Consumers: processes/reconstruct.md (Delta schema), BLUEPRINT.md (개념 설명 표)."
      - "Reference format: `authority/core-lexicon.yaml#fact_type.v<lexicon_version>` (DR-M04-02 패턴 동일)."
      - "Extension policy: 신규 fact_type 추가 시 (1) 본 term allowed_values 에 추가 + stage_partition 에 배정, (2) reconstruct.md L1004-1014 structured_data 명세에 schema 추가, (3) Explorer/Lens prompt 가 새 type 인식하도록 갱신, (4) lexicon_version bump."


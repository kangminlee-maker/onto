        - "src/core-runtime/evolve/commands/reconstruct.ts (handler)"
        - "src/core-runtime/evolve/commands/reconstruct.test.ts (17 tests)"
        - "processes/reconstruct.md (activity=reconstruct, process_name=reconstruct)"
      notes:
        - "DL-020 해소"
        - "§1.4 reconstruct 완료 기준 3축 (초안·why 추정·Principal 검증) 이 3-step 에 매핑됨"
        - "reconstruct runtime 의 실제 Explorer/lens loop 은 후속 W-ID 범위"
    invoke_surface:
      term_id: invoke_surface
      lifecycle_status: seed
      registered_by: "W-A-52"
      registered_date: "2026-04-14"
      definition_draft: >
        entrypoint 호출 시 주체자가 진입하는 표면 파일. design 활동에서는 .onto/commands/evolve.md
        (repo) 또는 그 install 경로 ~/.claude/plugins/onto/.onto/commands/evolve.md 를 가리킨다.
        authority seat (processes/evolve.md) 을 참조하는 citation 의 출발점이며,
        install_surface 가 deterministic snapshot 으로 mirror 된다.
        없으면 repo 경로와 install 경로 어느 쪽이 실제 호출 대상인지 모호해진다.
      evidence:
        - ".onto/commands/evolve.md (invoke surface 실체)"
        - "processes/evolve.md §9 (Install-Surface Authority Alignment)"
      notes:
        - "R-4 성문화 seed. authority seat 는 기존 rank 1 authority 파일 개념이므로 별도 seed 없음."
        - "§8 command surface 와 동일 실체를 가리키며 §9 alignment 불변식의 참조점."
    install_surface:
      term_id: install_surface
      lifecycle_status: seed
      registered_by: "W-A-52"
      registered_date: "2026-04-14"
      definition_draft: >
        runtime 실행 시 invoke_surface 가 실제로 읽는 파일이 거주하는 배포 트리.
        현재 onto 배포 기준 ~/.claude/plugins/onto/ 하위 전체가 install surface 이다.
        authority seat 의 deterministic snapshot 이어야 하며 (mirror requirement),
        independent authority 를 갖지 않는다 (non-mutation). drift 는 재설치로만 보정된다.
        없으면 install tree 에 대한 현장 수정이 authority seat 를 우회할 수 있다.
      evidence:
        - "processes/evolve.md §9.2 (4 불변식)"
        - ".onto/commands/evolve.md 의 ~/.claude/plugins/onto/ 상대 경로 citation"
      notes:
        - "R-4 성문화 seed. invoke_surface 와 한 쌍으로 alignment 모델의 축을 형성."
        - "runtime-bound 경로에서도 동일 불변식 적용 (§9.4)."
        - "Phase 1 host-decoupling (2026-04-17): install_surface 의 default 경로는 ~/.claude/plugins/onto/ 이지만 ONTO_PLUGIN_DIR env var 로 override 가능. 즉 install surface 는 host runtime 종속이 아니다 — Claude Code · Codex CLI · standalone CLI 모두 동일 install tree 를 공유."

    host_runtime_detection:
      term_id: host_runtime_detection
      lifecycle_status: seed
      registered_by: "Phase 1 host-decoupling (2026-04-17)"
      registered_date: "2026-04-17"
      definition_draft: >
        onto runtime이 어떤 host 환경에서 실행되는지 결정하는 우선순위 기반 detection 절차.
        canonical seat: src/core-runtime/discovery/host-detection.ts:detectHostRuntime().
        반환 값은 3-host 분류 — claude (Claude Code session) | codex (Codex CLI session 또는
        passive availability) | standalone (TS process, no host LLM).
        priority order:
          1. ONTO_HOST_RUNTIME env var (explicit override)
          2. config.host_runtime in .onto/config.yml
          3. CLAUDECODE / CLAUDE_PROJECT_DIR / CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS → claude
          4. CODEX_THREAD_ID / CODEX_CI → codex
          5. codex binary on PATH + ~/.codex/auth.json → codex
          6. (none) → standalone (default)
        없으면 host-coupled detection 코드가 review-invoke / bootstrap-review-binding /
        prepare-review-session 3 곳에 중복되며, 새 host (standalone, 향후 추가) 도입 시
        모든 위치를 수정해야 한다.
      evidence:
        - "src/core-runtime/discovery/host-detection.ts (canonical seat)"
        - "src/core-runtime/discovery/host-detection.test.ts (24 unit tests)"
      notes:
        - "Phase 1: detection + capability matrix + override mechanism 만 구현. Phase 2 에서 host_runtime: standalone 시 main_llm/subagent_llm 직접 호출 wire."
        - "host capability (hasTeamCreate, hasAgentSpawn) 는 host_runtime 에 종속 — claude 만 true. LLM provider capability (hasAnthropicApiKey, hasOpenAiApiKey, hasLiteLlmEndpoint, hasCodexExec) 는 환경 독립적 — host 와 무관하게 detection 됨."

    main_subagent_llm_axis:
      term_id: main_subagent_llm_axis
      lifecycle_status: seed
      registered_by: "Phase 1 host-decoupling (2026-04-17)"
      registered_date: "2026-04-17"
      definition_draft: >
        review 실행에서 LLM 역할을 두 축으로 분리하는 모델.
          - main LLM (orchestrator): 세션을 진행하고 lens 선택·synthesize 같은 메타 추론 수행
          - subagent LLM (per-lens executor): 9개 lens 의 실제 reasoning 수행
        두 LLM 은 같을 수도, 다를 수도 있다. Phase 1 에서는 두 축 모두 host_runtime 에 묶여 있으나
        (main = host LLM, subagent = host 가 spawn하는 instance), Phase 2 에서 독립 configurable
        로 wire 한다.
        예: Claude Code main + LiteLLM 8B subagent / LiteLLM 31B main + LiteLLM 8B subagent /
        Anthropic SDK direct main + LiteLLM 8B subagent.
        없으면 host_runtime 단일 축이 main 과 subagent 결정을 모두 묶어버려, cross-host 조합이
        type 차원에서 표현 불가능.
      evidence:
        - "BLUEPRINT.md §1 Two-tier LLM model (Phase 1 schema, Phase 2 wiring)"
        - "src/core-runtime/learning/shared/llm-caller.ts (background task LLM caller — review-time subagent caller 의 prior art)"
      notes:
        - "Phase 1: schema + 문서화만. Phase 2: subagent_llm 직접 호출 (ts_inline_http) 구현."
        - "Phase 2 결정 1 (inline content vs function-calling loop): inline content mode 우선 — 8B 모델은 function-calling 신뢰도 낮음. function-calling loop 는 Phase 3."
        - "Phase 2 결정 2 (standalone main 시 LLM 호출 여부): TS process 가 별도 LLM 호출하여 lens 선택 + synthesize 수행 — 단순 dispatcher 가 아닌 별도 main LLM 사용."


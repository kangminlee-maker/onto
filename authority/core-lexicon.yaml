  - term_id: "activity_enum"
    canonical_label: "activity"
    korean_label: "활동"
    translation_mode: "preserved"
    axis: "onto_taxonomy"
    term_status: "active"
    definition: "§1.2 에 정의된 onto 의 다섯 활동. work item / consolidated / inventory / ledger 의 activity field canonical enum. 본 term 이 enum 의 authority SSOT."
    allowed_values:
      - "review"
      - "evolve"
      - "reconstruct"
      - "learn"
      - "govern"
    legacy_aliases:
      - alias: "build"
        retire_kind: "renamed"
        canonical_replacement: "reconstruct"
        retire_date: "2026-04-13"
        context: >
          Legacy activity name retired 2026-04-13 via DR-M00-04 homonym mapping.
          Scope: (1) activity 분류 시 build→reconstruct 로 계산, (2) 파일명·명령명·slash command rename 은 W-A-77 (2026-04-14) 에서 집행 완료 — 현재 canonical 은 `processes/reconstruct.md`, `.onto/commands/reconstruct.md`, slash `/onto:reconstruct`; `npm run build:ts-core` 는 TypeScript 컴파일 명령으로 activity 와 무관하며 유지,
          (3) state-machine 코드 식별자 (`RECONSTRUCT_TRANSITIONS` / `ReconstructState` / `reconstruct_exploring` / `reconstruct_failed` 등) 도 W-A-77 에서 전수 rename 완료 — legacy `BUILD_*` / `build_*` 식별자는 제거됨,
          (4) 관용 표현 ("build 프로세스") 은 legacy 명칭 유지 가능, (5) promoted learning artifact 의 source token 은 retire 이후에도 historical record 로 보존.
      - alias: "design"
        retire_kind: "renamed"
        canonical_replacement: "evolve"
        retire_date: "2026-04-15"
        context: >
          Legacy activity name retired 2026-04-15 via W-A-78 (entrypoint-only rename).
          Scope: (1) entrypoint (파일·디렉토리·slash·CLI·activity_enum·W-ID activity field·TS handler) 는 W-A-78 에서 `evolve` 로 전수 치환 — current canonical: `processes/evolve.md`, `.onto/commands/evolve.md`, `src/core-runtime/evolve/`, `development-records/evolve/`, slash `/onto:evolve`, `onto evolve <subcommand>`, `handleEvolve*`,
          (2) 방법론 term (`design_target`, `design_area`, `design_constraint`, `design_gap`) 은 entrypoint 가 아닌 lexicon entity 이므로 legacy 명칭 유지 — Perl word boundary (`\b`) 매칭에서 `_` 가 word char 이므로 자동 보존,
          (3) 한국어 자연어 "설계" (e.g., "설계 대상", "설계 방식") 는 자연어 번역어로 보존. entrypoint 지칭 맥락의 한국어 "설계" 는 향후 Phase B 에서 영문 "evolve" 로 통일 예정,
          (4) 관용 표현 ("design 프로세스") 은 legacy 명칭 유지 가능, (5) promoted learning artifact 의 source token 은 retire 이후에도 historical record 로 보존.
      - alias: "ask"
        retire_kind: "retired"
        canonical_replacement: null
        retire_date: "2026-04-13"
        context: >
          §1.2 에서 폐기 선언 (2026-04-13). 대체 없음 — 필요 시 단일 lens review 로 대체.
          .onto/commands/ask-*.md 파일은 BL-121 에서 review 계열 이동 또는 제거 예정.
      - alias: "E"
        retire_kind: "shortcode"
        canonical_replacement: "reconstruct"
        retire_date: null

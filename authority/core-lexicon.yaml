  - 'v0.32.0 corrective (repo layout migration Phase 2 — domains/, 2026-04-21): 11 subdomain × ≈8 `.md` = 91 domain knowledge file 을 `domains/` 에서 `.onto/domains/` 로 일괄 이동 (+ legacy `.DS_Store` 1건 함께 이동된 뒤 후속 수정에서 untracked). 비-domain refs 갱신 22 파일: (1) Infrastructure 2 — `package.json` files 필드, `setup-domains.sh` DOMAINS_SRC + 에러 메시지. (2) Authority 2 — `authority/core-lexicon.yaml` 2 notes (competency_question + competency_scope consumers) + 본 changelog 자체, `authority/translation-reference.yaml` 2 refs (competency_question.relations.stored_at + review-result template). (3) Top-level docs 4 — `BLUEPRINT.md`·`README.md` 트리 다이어그램, `process.md` touch point checklist + 신규 "`.onto/` structural subdir" 섹션, `.gitignore` guard 참조 주석. (4) Processes 2 — `processes/onboard.md` plugin bundle 경로 2건, `processes/review/record-contract.md` source_doc 1건. (5) Roles 9 — axiology/conciseness/coverage/dependency/evolution/logic/pragmatics/semantics/structure Domain document 경로 각 1건. (6) TS consumer 1 — `src/core-runtime/cli/materialize-review-prompt-packets.ts` resolveDomainDirectory docstring + 에러 메시지. (7) Domain self-ref 1 — `.onto/domains/llm-native-development/structure_spec.md` 예시 경로 (follow-up commit). `.onto/commands/` 0건·CLAUDE.md 0건·design-principles/ 0건 (모두 user-space/workflow 개념으로 판단되어 KEEP). 주요 소비자 `materialize-review-prompt-packets.ts` 는 Phase 0 `resolveInstallationPath("domains", ...)` 가 이제 `.onto/domains/` 를 우선 해석 (legacy fallback Phase 7 까지 유지). Dev-mode fallback 은 `isOntoRoot(projectRoot)` 로 gate (external project 오탐 방지, Codex review F-2 해소). 동시 도입 — `.onto/` allowlist guard CI lint (`scripts/check-onto-allowlist.sh` + `.github/workflows/onto-dir-allowlist.yml`) — Phase 1 의 enumerated-ephemeral gitignore 정책 failure mode 방어선. 초기 allowlist: `.onto/commands/`, `.onto/domains/`. Phase 3-6 각 단계는 allowlist 에 새 top-level subdir 추가 프로토콜 준수. `~/.onto/domains/` (user-installed domain docs) 참조는 user-space 이므로 범위 밖 — 보존. canonical-advancing.'
  - 'v0.31.0 additive (P9 Runtime Legacy Cleanup track completion, 2026-04-21): 이 버전은 **P9.6 doc sweep PR 과 함께 shipped** 됩니다 (자기-서술 changelog — P9 track 이 이 버전으로 종결됨을 명시). **runtime surface** legacy 전수 제거 (P7 의 visible-surface 제거 연속선). 7 PR squash-merged (#161~#167): (1) P9.1 `DEFAULT_TOPOLOGY_PRIORITY` export + `normalizePriorityArray` helper + resolver ladder loop 제거 — axis-first + universal `main_native` degrade 만 남김. (2) P9.2 `OntoConfig.execution_topology_priority` + `execution_topology_overrides` field 타입 삭제. (3) P9.3 `review-invoke.ts` always-on topology dispatch — opt-in gate 전수 제거, coordinator handoff JSON 항상 topology descriptor 포함. (3a) P9.3 m1 resolver 3→1 caching + `--prepare-only` STDERR 관측 불변 보존. (4) P9.4 `config-profile.ts` Option B simplification — `validateProfileCompleteness` + `buildBothIncompleteError` + `buildProjectIncompleteNotice` + `summarizeProfile` 제거. `ProfileAdoption` discriminated union 전환. `adoptProfile` 5-branch → 3-branch. (5) P9.5 `legacy-field-deprecation.ts` 모듈 전면 삭제 (233+252 줄). 3-stage retirement (warning→throw→type removal) 종결. Config 로드는 throw 없이 성공, legacy YAML field 는 OntoConfig 타입에서 graceful-ignore (typed 접근 불가). Resolver 의 `no_host` 가 단일 fail-fast 지점. (6) P9.6 (이 버전 동반) prose / wrap-up / lexicon / fixture 정합 sweep. P9.1~P9.5 누적 diff +1,833 / −2,250 = **runtime 층 순 −417 줄** (P9.6 자체 line count 는 wrap-up 문서 circular reference 회피를 위해 self-reporting — squash commit diff 가 canonical). 사용자 영향: legacy-only YAML 로도 review 가능 (auto-detect 가 경로 결정). Tests: 94 files / 1922 pass baseline. terms 갱신 없음 (v0.30.0 에서 이미 `execution_realization` / `host_runtime` retired). Wrap-up 정본: `development-records/evolve/20260421-p9-runtime-cleanup-completion.md`. canonical-advancing.'

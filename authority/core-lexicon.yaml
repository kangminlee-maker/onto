lexicon_version: "0.1.0"
position: "Prototype-to-service ontology authority for the onto main repository."
notes:
  - "This lexicon is the concept SSOT for the productization track."
  - "This file owns the concept INVENTORY. Naming RULES are owned by ontology-as-code-naming-charter.md."
  - "Current prototype commands/processes/roles may still use legacy wording while migration is in progress."
  - "Canonical English labels remain authoritative; Korean labels are for explanation and discussion."
legacy_alias_governance:
  owner: "core-lexicon.yaml (this file)"
  precedence: "canonical_label always wins. legacy_aliases exist for comprehension bridging only."
  lifecycle: "A legacy alias is retired when zero prototype files reference it."
  retire_gate: "Dual-read fallback code (lens-registry.ts canonicalizeLensId, paths.ts resolveWithFallback) may be removed when: (1) zero onto_* learning files exist in any active seat, AND (2) at least one successful full review session has run with bare IDs."
  relation_to_translation_reference: "translation-reference.yaml is a NON-AUTHORITATIVE onboarding aid. This governance block is the canonical bridge."
review_taxonomy_migration:
  note: "Informative record of review structure rename. Not a normative rule."
  mappings:
    - legacy: "agent panel"
      canonical: "9 review lenses (logic … axiology)"
    - legacy: "philosopher"
      canonical: "axiology (value/purpose alignment) + synthesize (synthesis stage)"
    - legacy: "agent"
      canonical: "review_lens (independent review perspective)"
terms:
  - term_id: "entrypoint"
    canonical_label: "entrypoint"
    korean_label: "진입점"
    axis: "entrypoint"
    term_status: "active"
    definition: "User-facing top-level intent."
    allowed_values:
      - "review"
      - "build"
      - "ask"
      - "learn"
      - "govern"
    allowed_value_korean_labels:
      review: "검토"
      build: "구축"
      ask: "질의"
      learn: "학습"
      govern: "거버넌스"
    allowed_value_definitions:
      review: "대상의 논리적 일관성, 구조적 완전성, 의미 정확성 등을 9-lens 구조로 검증한다. 핵심 가치: 놓침 방지와 다관점 교차 검증."
      build: "온톨로지 또는 도메인 지식을 구조화된 artifact로 구축한다. 핵심 가치: 암묵지의 명시화와 재사용 가능한 지식 자산 생성."
      ask: "특정 dimension의 관점에서 질의에 답한다. 핵심 가치: 단일 관점의 깊은 분석."
      learn: "검증 경험에서 학습을 축적하고, 축적된 학습을 승격·큐레이션·감사한다. 핵심 가치: 탐색 비용과 실패 비용의 절감. 학습이 없으면 매번 동일한 실패를 반복한다."
      govern: "시스템의 규칙, 구조, 프로세스를 관리한다. 핵심 가치: 시스템 일관성과 규칙 준수 보장."
    notes:
      - "`review`, `build`, `ask`, `learn`, `govern` are the canonical entrypoint family for productization."
  - term_id: "invocation_interpretation"
    canonical_label: "InvocationInterpretation"
    korean_label: "호출 해석"
    axis: "invocation_phase"
    term_status: "active"
    definition: "LLM-owned phase that interprets natural-language user input into entrypoint, target candidates, intent, and ambiguity."
  - term_id: "invocation_binding"
    canonical_label: "InvocationBinding"
    korean_label: "호출 고정"
    axis: "invocation_phase"
    term_status: "active"
    definition: "Runtime-owned deterministic phase that binds interpreted input into canonical requests and concrete refs."
  - term_id: "scope"
    canonical_label: "scope"
    korean_label: "적용 범위"
    axis: "scope"
    term_status: "active"
    definition: "Applicability boundary of a knowledge asset or statement."
    allowed_values:
      - "user"
      - "project"
      - "domain"
  - term_id: "structural_role"
    canonical_label: "structural_role"
    korean_label: "구조 역할"
    axis: "structural_role"
    term_status: "active"
    definition: "Structural classification of an asset independent of its scope."
    allowed_values:
      - "ontology_seed"
      - "learning_prior"
      - "canonical_knowledge"
  - term_id: "use_role"
    canonical_label: "use_role"
    korean_label: "사용 역할"
    axis: "use_role"
    term_status: "active"
    definition: "Functional role in reasoning or runtime usage."
    allowed_values:
      - "scaffold"
      - "heuristic"
      - "constraint"
  - term_id: "lifecycle_status"
    canonical_label: "lifecycle_status"
    korean_label: "생애주기 상태"
    axis: "lifecycle"
    term_status: "active"
    definition: "Lifecycle maturity or disposition of an asset."
    allowed_values:
      - "seed"
      - "candidate"
      - "provisional"
      - "promoted"
      - "deprecated"
      - "retired"
    consumption_constraint: "learning term의 lifecycle_constraint 참조."
  - term_id: "proposal_shape"
    canonical_label: "proposal_shape"
    korean_label: "제안 형식"
    axis: "proposal_shape"
    term_status: "active"
    definition: "Authoring-stage shape of a candidate proposal."
  - term_id: "review_record"
    canonical_label: "ReviewRecord"
    korean_label: "리뷰 기록"
    axis: "review_output"
    term_status: "active"
    definition: "Canonical output of review; structured lineage record consumed by later learning/governance."
  - term_id: "review_target_scope"
    canonical_label: "review_target_scope"
    korean_label: "검토 대상 범위"
    axis: "review_input"
    term_status: "active"
    definition: "Resolved review target as a scope or bundle, not necessarily a single file path."
  - term_id: "review_lens"
    canonical_label: "review_lens"
    korean_label: "리뷰 lens"
    axis: "review_structure"
    term_status: "active"
    definition: "An independent review perspective that produces its own finding before synthesis."
    legacy_aliases:
      - alias: "agent"
        context: "Legacy 'agent panel' referred to what is now the 9 review lenses."
      - alias: "onto_{id}"
        context: "Pre-migration lens/role IDs used 'onto_' prefix (e.g., onto_logic, onto_synthesize). Bare IDs are canonical since 2026-04-08."
  - term_id: "context_isolated_reasoning_unit"
    canonical_label: "ContextIsolatedReasoningUnit"
    korean_label: "맥락 격리 추론 단위"
    axis: "execution_unit"
    term_status: "active"
    definition: "A reasoning unit that does not share main-context state, consumes contract-bounded input, and produces contract-bounded output independently."
    legacy_aliases:
      - alias: "subagent"
        context: "Prototype files sometimes use 'subagent' to mean any context-isolated unit, not just the execution_realization value."
    notes:
      - "Typical realizations include an Agent Teams teammate, a subagent, an MCP-isolated LLM, or an external model worker."
      - "The canonical concept is the context-isolated reasoning property, not a specific host implementation."
  - term_id: "execution_realization"
    canonical_label: "execution_realization"
    korean_label: "실행 실현 방식"
    axis: "execution_profile"
    term_status: "active"
    definition: "Canonical structural realization used to execute context-isolated review units."
    allowed_values:
      - "subagent"
      - "agent-teams"
    notes:
      - "`subagent` and `agent-teams` are structural realizations, not host runtime names."
  - term_id: "host_runtime"
    canonical_label: "host_runtime"
    korean_label: "호스트 런타임"
    axis: "execution_profile"
    term_status: "active"
    definition: "Concrete host environment that runs a chosen execution realization."
    allowed_values:
      - "codex"
      - "claude"
    notes:
      - "`codex` and `claude` are host runtimes, not canonical execution realizations."
  - term_id: "lens_prompt_contract"
    canonical_label: "LensPromptContract"
    korean_label: "lens 프롬프트 계약"
    axis: "prompt_contract"
    term_status: "active"
    definition: "Prompt execution contract that defines the common inputs, invariants, and output obligations for a review lens."
  - term_id: "synthesize_prompt_contract"
    canonical_label: "SynthesizePromptContract"
    korean_label: "종합 프롬프트 계약"
    axis: "prompt_contract"
    term_status: "active"
    definition: "Prompt execution contract that defines the inputs, invariants, and output obligations for the synthesize stage."
  - term_id: "lens_selection_plan"
    canonical_label: "LensSelectionPlan"
    korean_label: "lens 선택 계획"
    axis: "review_structure"
    term_status: "active"
    definition: "Interpretation-owned plan that recommends full/light review and the lens set to execute."
  - term_id: "domain_final_selection"
    canonical_label: "DomainFinalSelection"
    korean_label: "도메인 최종 선택"
    axis: "invocation_phase"
    term_status: "active"
    definition: "Final domain value after explicit token parsing and, when needed, user confirmation of a recommendation."
  - term_id: "review_session_metadata"
    canonical_label: "review_session_metadata"
    korean_label: "검토 세션 메타데이터"
    axis: "review_artifact"
    term_status: "active"
    definition: "Deterministic execution metadata for a single review session."
  - term_id: "target_snapshot"
    canonical_label: "target_snapshot"
    korean_label: "대상 스냅샷"
    axis: "review_artifact"
    term_status: "active"
    definition: "Immutable basis of what the review actually read at execution time."
  - term_id: "review_target_materialized_input"
    canonical_label: "review_target_materialized_input"
    korean_label: "검토 대상 구체화 입력"
    axis: "review_artifact"
    term_status: "active"
    definition: "Execution-friendly materialization of the resolved review target scope for lens reading."
  - term_id: "context_candidate_assembly"
    canonical_label: "context_candidate_assembly"
    korean_label: "맥락 후보 조립물"
    axis: "review_artifact"
    term_status: "active"
    definition: "Candidate context set assembled for review execution before per-lens relevance judgment."
  - term_id: "synthesize_stage"
    canonical_label: "synthesize"
    korean_label: "종합 단계"
    axis: "review_structure"
    term_status: "active"
    definition: "A non-lens review stage that integrates lens findings into a final review result."
    notes:
      - "Homonym: 'synthesize' appears as both this concept term (axis: review_structure) and a role ID in core-lens-registry.yaml. Different axis — OaC §5 permits same token across disjoint namespaces."
    legacy_aliases:
      - alias: "philosopher"
        context: "Legacy prototype coordinator role. Now split into axiology (value judgment) + synthesize (synthesis)."
  - term_id: "prompt_backed_reference_path"
    canonical_label: "PromptBackedReferencePath"
    korean_label: "프롬프트 기반 기준 경로"
    axis: "implementation_path"
    term_status: "active"
    definition: "Reference execution path that follows the designed process with prompt-driven execution before hardened implementation exists."
  - term_id: "implementation_replacement_step"
    canonical_label: "ImplementationReplacementStep"
    korean_label: "구현 치환 단계"
    axis: "implementation_path"
    term_status: "active"
    definition: "One bounded replacement step that moves a single responsibility from prompt-backed execution to product implementation."
  - term_id: "declared_handoff_inputs"
    canonical_label: "DeclaredHandoffInputs"
    korean_label: "선언형 handoff 입력"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "Predeclared, runtime-provided input set that fixes role, primary target, required context, output seat, and explicit control policy for one LLM call."
  - term_id: "self_directed_exploration_inputs"
    canonical_label: "SelfDirectedExplorationInputs"
    korean_label: "자율 탐색 입력"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "Additional inputs that an LLM acquires by its own semantic judgment during problem solving, such as extra file exploration or web research within the declared boundary."
  - term_id: "boundary_policy"
    canonical_label: "BoundaryPolicy"
    korean_label: "경계 정책"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "Declared policy that specifies allowed, denied, required, and forbidden behavior for one LLM execution boundary."
  - term_id: "boundary_presentation"
    canonical_label: "BoundaryPresentation"
    korean_label: "경계 제시"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "The way a declared boundary is exposed to an LLM, such as embedded instructions, refs, seat maps, or capability notices."
  - term_id: "boundary_enforcement_profile"
    canonical_label: "BoundaryEnforcementProfile"
    korean_label: "경계 강제 프로필"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "Execution-specific description of how a declared boundary is actually enforced across prompt, host, MCP, filesystem, or environment layers."
  - term_id: "deterministic_state_enforcer"
    canonical_label: "DeterministicStateEnforcer"
    korean_label: "결정론적 상태 강제자"
    axis: "execution_unit"
    term_status: "active"
    definition: "Runtime state machine that deterministically enforces review process state transitions. Not an orchestrator — executes pre-fixed rules, not semantic judgment."
    notes:
      - "Review process only. build/learn/govern extensions require separate design."
      - "9 states (auto 3, await 3, terminal 3), 12 edges."
  - term_id: "auto_state"
    canonical_label: "auto_state"
    korean_label: "자동 상태"
    axis: "execution_unit"
    term_status: "active"
    definition: "State machine state where runtime executes deterministic steps automatically and transitions to the next state without caller intervention."
  - term_id: "await_state"
    canonical_label: "await_state"
    korean_label: "대기 상태"
    axis: "execution_unit"
    term_status: "active"
    definition: "State machine state where runtime outputs dispatch instructions and waits for caller to invoke the next transition."
  - term_id: "terminal_state"
    canonical_label: "terminal_state"
    korean_label: "종료 상태"
    axis: "execution_unit"
    term_status: "active"
    definition: "State machine state with no outgoing transitions. Represents final disposition of a review session."
  - term_id: "learning"
    canonical_label: "learning"
    korean_label: "학습"
    axis: "learning"
    term_status: "active"
    definition: "onto 활동(review, build, ask, design 등)에서 축적된 경험 지식. 실패 경험, 극복 경로, 특정 맥락에서만 알 수 있는 사실 등을 저장하여 이후 활동의 탐색 비용과 실패 비용을 줄인다."
    core_value: "시간과 비용의 절감. 저장된 경험이 있으면 실패 없이 성공 경로를 바로 갈 수 있고, 특정 경로를 통해서만 알 수 있었던 사실을 비용 0으로 활용할 수 있다."
    value_boundary: "핵심 가치(비용 절감)보다 더 큰 비용(drift로 인한 재작업)을 만들면 안 된다. 따라서 검증되지 않은 학습의 소비는 금지된다."
    lifecycle_status_values:
      - "seed — 생성 직후. 프로젝트에 축적됨. 소비 불가"
      - "candidate — promote에서 승격 후보로 식별됨"
      - "provisional — 패널 리뷰 통과, 사용자 승인 대기"
      - "promoted — 승인 완료, 글로벌에 기록됨. 소비 가능"
      - "deprecated — 퇴역 후보 (event marker 축적)"
      - "retired — 퇴역 완료"
    lifecycle_constraint: "creation → {project}/.onto/learnings/ (seed). consumption → ~/.onto/learnings/ (promoted only). seed/candidate/provisional 상태 학습은 creation과 promotion의 입력이지, consumption의 소스가 아니다."
    notes:
      - "lifecycle_status(범용 생애주기 상태)의 값을 learning 맥락에서 구체화한 것. 각 상태의 전이는 learning_lifecycle_op(creation, promotion, retirement, consumption)에 의해 발생한다."
      - "파생 속성: learning_applicability, learning_role, learning_impact, learning_lifecycle_op"
      - "'법칙'이 아니라 '상황에 따라 사용하면 매우 유용한 정보'. 있으면 좋지만 risk를 질 필요는 없는 항목."
  - term_id: "learning_applicability"
    canonical_label: "learning_applicability"
    korean_label: "학습 적용 범위"
    axis: "learning_applicability"
    term_status: "active"
    definition: "Content applicability scope of a learning item. Orthogonal to scope (storage ownership boundary)."
    allowed_values:
      - "methodology"
      - "domain/{name}"
    notes:
      - "Multiple values allowed per item."
      - "Orthogonal to scope (user/project/domain). scope = storage ownership, applicability = content applicability."
  - term_id: "learning_role"
    canonical_label: "learning_role"
    korean_label: "학습 역할"
    axis: "learning_role"
    term_status: "active"
    definition: "Purpose classification of a learning item."
    allowed_values:
      - "guardrail"
      - "foundation"
      - "convention"
    notes:
      - "Optional tag. Under-classified items have no role tag."
      - "Orthogonal to use_role (scaffold/heuristic/constraint). Value sets are entirely different."
      - "`insight` removed from role enum to resolve OntoClean rigidity violation."
  - term_id: "learning_impact"
    canonical_label: "learning_impact"
    korean_label: "학습 영향도"
    axis: "learning_impact"
    term_status: "active"
    definition: "Impact level of a learning item. Determined at creation time, immutable."
    allowed_values:
      - "high"
      - "normal"
  - term_id: "learning_lifecycle_op"
    canonical_label: "learning_lifecycle_op"
    korean_label: "학습 생애주기 운영 단계"
    axis: "learning_lifecycle_op"
    term_status: "active"
    definition: "Operational phase applied to a learning item. Orthogonal to lifecycle_status (maturity state)."
    allowed_values:
      - "creation"
      - "promotion"
      - "retirement"
      - "consumption"
    notes:
      - "Orthogonal to lifecycle_status (seed~retired). op = operational action, status = maturity state."
      - "consumption의 전제 조건: learning term의 lifecycle_constraint 참조."
  - term_id: "effective_boundary_state"
    canonical_label: "EffectiveBoundaryState"
    korean_label: "실효 경계 상태"
    axis: "llm_runtime_interface"
    term_status: "active"
    definition: "The final applied boundary state after policy declaration, presentation, capability realization, and deny-precedence resolution."

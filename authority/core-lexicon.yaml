  - 'v0.29.0 additive (Review UX Redesign P6 — docs 전수 갱신, 2026-04-21): 5 user-facing doc 갱신 — (1) `config.yml.example` 에 `review:` axis block 예시 추가 + legacy `execution_topology_priority` 를 deprecated 로 표시. (2) `.onto/commands/review.md` 에 "Canonical path (Review UX Redesign)" 섹션 신설, 기존 3-canonical / sketch v3 내용은 "Legacy execution paths (backward compat through P7)" 로 재분류. (3) `docs/topology-migration-guide.md` 제목 "Legacy → Review UX Redesign" 으로 전환 + §7 "Review UX Redesign migration" 신설 (7.1 왜 / 7.2 id→axes 매핑표 / 7.3 migration 수단 / 7.4 universal fallback 보장 / 7.5 spawn-ready 상태 / 7.6 troubleshooting). (4) `README.md` §review config 블록 교체 + legacy 섹션 분리. (5) `BLUEPRINT.md` 신규 entity term (TopologyShape / OntoReviewConfig) + legacy mapping 보완 + §7 Lens Execution Axes 를 "6 axes + 6 shape" 구조로 rewrite. Self-review amendment: (a) BLUEPRINT §7 renumber (§7.4 Parallel Execution → §7.5, 7.4 중복 해소), (b) migration-guide §6 Reference 의 Deprecation detection orphan 재배치, (c) lexicon terms 에 `review_execution_config` (OntoReviewConfig) + `topology_shape` (TopologyShape) 정식 등재 + `execution_realization` / `host_runtime` 를 term_status: deprecated 로 전환. Code 미변경 (prose + lexicon metadata only). P7 legacy 제거 전 정본 alignment 완료. canonical-advancing.'

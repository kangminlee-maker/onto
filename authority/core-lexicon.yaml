      - "Canonical definition source: development-records/design/20260413-onto-direction.md#§1.5 (as_of=2026-04-13)."
      - "Consumers: M-05/M-06/M-07/M-08 work items (axis field + W-ID token), consolidated.md frontmatter axis_enum_ref, Expansion Protocol 축 추가·삭제·병합 trigger."
      - "Reference format: `authority/core-lexicon.yaml#axis_enum.v<lexicon_version>` (DR-M04-02)."

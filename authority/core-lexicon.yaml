        세션별 learning-manifest.yaml 에서 공급량(loaded), 필터링률(parsed→loaded),
        토큰 효율, tier/role 분포를 수집하여 학습 기제 신뢰도 proxy 를 산출한다.
        없으면 학습 축적이 실제로 활동 비용을 줄이는지 판단할 수 없다.

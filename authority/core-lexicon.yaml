    recording_actor:
      responsibility: "해당 term 을 등장시킨 work item 의 ownership_boundary role"
      escalation: "등록 누락 시 M-07 lifecycle balance check 가 gap 으로 flag"
    downstream_consumer:
      - id: refresh_protocol
        role: "M-08 refresh protocol 주기적 scan — lifecycle_status 승격·폐기 판정"

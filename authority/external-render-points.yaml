# authority/external-render-points.yaml
#
# `output_language` 설정값에 따라 번역이 허용되는 지점의 whitelist.
# 이 파일에 등록되지 않은 위치에서 `{output_language}` 를 참조하는 코드나
# 문서는 (CI lint gate 가 활성화되면) 빌드 실패 대상이다.
#
# 엔트리 추가는 `.onto/principles/output-language-boundary.md` §4 절차에 따름:
#   1. rationale 필드에 "이 지점 이후 다른 agent 소비 없음" 증명
#   2. PR 로 추가 — 리뷰어가 internal boundary 침범 여부 확인
#
# Canonical authority: .onto/principles/output-language-boundary.md
# Loader / render seat: src/core-runtime/translate/render-for-user.ts
# Schema version: v1 (2026-04-17)

schema_version: "v1"
as_of: "2026-04-17"

# 각 엔트리 필드:
#   id           : unique identifier (snake_case)
#   file         : repo-relative path (파일 또는 디렉토리 glob)
#   section      : optional. 파일 내 섹션 제목 (예: "Phase 3 — User Review")
#   rationale    : 왜 이 지점이 external boundary 인가 (agent 소비 없음을 입증)
#   conditional  : optional. 부분 허용 조건 (예: "user-visible annotation 영역만")
#
# 본 파일은 render-for-user.ts 에 의해 런타임에 로드되며, 미등록 id 로
# renderForUser 를 호출하면 런타임 에러. CI lint gate 는 추가 follow-up PR
# 에서 도입 — 등록된 현황이 baseline 으로 고정된 뒤 켜진다.

points:
  # ─────────────────────────────────────────────────────────────────
  # Reconstruct: halt message templates (per halt code)
  # ─────────────────────────────────────────────────────────────────
  # 각 halt 템플릿은 Runtime 이 원인·보존 경로·다음 행동을 조립한 뒤
  # principal 에게 직접 표시한다. Agent 소비 없음. 현재는 English hardcoded
  # 이며, render 경계가 이 지점이라는 사실만 등록. 실제 번역 주입은
  # follow-up PR.
  - id: halt_message_config_malformed
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — config_malformed"
    rationale: "Halt 시 principal 이 직접 읽는 최종 메시지. 이후 agent 소비 없음."

  - id: halt_message_phase_3_5_invariant_violation
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — phase_3_5_invariant_violation"
    rationale: "Runtime bug halt. principal 에게 preserved path + 진단 안내."

  - id: halt_message_phase_reentry_bound_exhausted
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — phase_reentry_bound_exhausted"
    rationale: "Phase 3.5 재진입 상한 초과. principal 에게 raw.yml 안내."

  - id: halt_message_explorer_failure
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — explorer_failure"
    rationale: "Explorer 실패 최종 메시지. session dir preserved 경로 안내."

  - id: halt_message_runtime_coordinator_failure
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — runtime_coordinator_failure"
    rationale: "Runtime Coordinator deterministic bug halt. debug guidance."

  - id: halt_message_session_state_corrupt
    file: .onto/processes/reconstruct.md
    section: "Halt event rendering — session_state_corrupt"
    rationale: "Resumption integrity check 실패. principal 에게 repair/discard 선택 안내."

  # ─────────────────────────────────────────────────────────────────
  # Reconstruct: principal-facing phase output
  # ─────────────────────────────────────────────────────────────────
  - id: phase_3_user_summary
    file: .onto/processes/reconstruct.md
    section: "Phase 3: User Review"
    rationale: "wip.yml (English) 을 principal 이 검토할 요약으로 Runtime 이 조립. 이후 principal 응답만 돌아오므로 agent hand-off 아님."

  - id: phase_5_completion_report
    file: .onto/processes/reconstruct.md
    section: "Phase 5: Learning Storage — Completion report"
    rationale: "Reconstruct 완료 시 principal 이 읽는 최종 표·지표. agent 소비 없음."

  # ─────────────────────────────────────────────────────────────────
  # Onboard / help — 대화형 CLI surface
  # ─────────────────────────────────────────────────────────────────
  - id: onboard_interactive_messages
    file: .onto/processes/onboard.md
    rationale: "Onboard 의 모든 프롬프트·안내 메시지. principal 과 직접 대화."

  - id: help_command_output
    file: .onto/commands/help.md
    rationale: "/onto:help 출력. README 외 principal 이 직접 읽는 커맨드 reference."

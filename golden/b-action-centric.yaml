# ============================================================
# FUNCTIONS (Policy constants + Cross-entity guards)
# ============================================================
functions:
  policy_constants:
    - id: CANCELLATION_DEADLINE_HOURS
      value: 4
      unit: hours
      description: Free cancellation hours before lesson start
      changeable: true
      source_code: "config/policies.yml"
      used_by_guard: [session_cancel_guard]

    - id: SESSION_DURATION_MINUTES
      value: 30
      unit: minutes
      description: Default duration per lesson
      changeable: true
      source_code: "config/policies.yml"
      used_by_guard: []

    - id: MAX_RESCHEDULE_COUNT
      value: 2
      unit: count
      description: Maximum reschedule count per session
      changeable: true
      source_code: "config/policies.yml"
      used_by_guard: [session_reschedule_guard]

    - id: TRIAL_CREDIT_COUNT
      value: 1
      unit: count
      description: Free trial lesson count
      changeable: false
      source_code: "config/policies.yml"
      used_by_guard: []

    - id: REFERRAL_DISCOUNT_PERCENT
      value: 15
      unit: percent
      description: Referral discount rate
      changeable: true
      source_code: "config/policies.yml"
      used_by_guard: [coupon_referral_guard]

  cross_entity_guards:
    - id: session_cancel_guard
      source_entity: Session
      target_entity: Credit
      target_transition: "Session.CONFIRMED → CANCELLED"
      check: "Check if current time is before scheduled_at - CANCELLATION_DEADLINE_HOURS"
      description: Determines whether to restore credit based on free cancellation deadline
      source_code: "SessionGateway.validateCancellation()"

    - id: session_reschedule_guard
      source_entity: Session
      target_entity: Session
      target_transition: "Session.CONFIRMED → CONFIRMED (reschedule)"
      check: "reschedule_count < MAX_RESCHEDULE_COUNT"
      description: Validates maximum reschedule count exceeded
      source_code: "SessionGateway.validateReschedule()"

    - id: contract_pause_guard
      source_entity: Contract
      target_entity: Contract
      target_transition: "Contract.ACTIVE → PAUSED"
      check: "pause_count < MAX_PAUSE_COUNT(2)"
      description: Validates maximum pause count exceeded
      source_code: "ContractService.validatePause()"

    - id: noshow_timeout_guard
      source_entity: Session
      target_entity: Session
      target_transition: "Session.CONFIRMED → NO_SHOW"
      check: "No connection for over NOSHOW_TIMEOUT_MINUTES(10) minutes"
      description: Validates no-show timeout exceeded
      source_code: "SessionGateway.checkNoShowTimeout()"

    - id: coupon_referral_guard
      source_entity: Coupon
      target_entity: Payment
      target_transition: null
      check: "Validates REFERRAL category coupon discount rate is within REFERRAL_DISCOUNT_PERCENT"
      description: Validates referral discount rate upper limit
      source_code: "CouponService.validateReferralDiscount()"

# ============================================================
# DOMAIN FLOWS (5)
# ============================================================
domain_flows:
  - name: SessionBookingFlow
    description: Complete flow for a student booking a lesson
    external_dependencies:
      - WebRTC server (at lesson start)
    involved_entities: [Student, Credit, Instructor, AvailabilitySlot, Booking, Session]
    steps:
      - step: 1
        action: Credit remaining check
        actor: system
        description: Checks the student's available credit remaining
      - step: 2
        action: Time slot selection
        actor: student
        description: Selects desired time from available time slots
      - step: 3
        action: Instructor matching
        actor: system
        description: Assigns instructor for the selected time slot
      - step: 4
        action: Booking created
        actor: system
        description: Creates booking record and occupies AvailabilitySlot
      - step: 5
        action: Session created
        actor: system
        description: "Session(PENDING) created -> CONFIRMED on instructor assignment"

  - name: PaymentFlow
    description: Flow from subscription product payment to credit issuance
    external_dependencies:
      - PG payment API
    involved_entities: [Student, Payment, PaymentCard, Coupon, Credit, Contract, Subscription]
    steps:
      - step: 1
        action: Product selection and coupon application
        actor: student
        description: Selects subscription product and applies owned coupon
      - step: 2
        action: Payment INITIATED
        actor: system
        description: Creates payment record
      - step: 3
        action: PG authentication request
        actor: system
        description: Requests PG payment authentication (AUTHORIZED)
      - step: 4
        action: Settlement captured
        actor: system
        description: CAPTURED on PG authentication success
      - step: 5
        action: Credit issuance
        actor: system
        description: Issues credits defined in subscription product
      - step: 6
        action: Contract activation
        actor: system
        description: "Contract TRIAL → ACTIVE"

  - name: SubscriptionRenewalFlow
    description: Subscription auto-renewal flow
    external_dependencies:
      - PG recurring payment API
    involved_entities: [Contract, Payment, PaymentCard, Credit, Subscription]
    steps:
      - step: 1
        action: Expiration check
        actor: system
        description: Searches for Contracts where next_billing_at has arrived
      - step: 2
        action: Auto payment
        actor: system
        description: Executes recurring payment with registered card
      - step: 3
        action: Credit issuance
        actor: system
        description: Issues renewal credits
      - step: 4
        action: Next billing date updated
        actor: system
        description: Updates next_billing_at

  - name: SessionCompletionFlow
    description: Flow from lesson completion to assessment and notification
    external_dependencies:
      - AI analysis service (STT, NLP)
    involved_entities: [Session, Assessment, Notification, Student, Instructor]
    steps:
      - step: 1
        action: Lesson end
        actor: system
        description: "Session IN_PROGRESS → COMPLETED"
      - step: 2
        action: Assessment creation
        actor: system
        description: Creates Assessment(QUEUED) and triggers AI pipeline
      - step: 3
        action: Speech transcription
        actor: system
        description: "QUEUED → TRANSCRIBING → ANALYZING"
      - step: 4
        action: Report generation
        actor: system
        description: "ANALYZING -> COMPLETE, score and feedback recorded"
      - step: 5
        action: Notification sent
        actor: system
        description: Assessment completion notification sent to student

  - name: NewStudentOnboardingFlow
    description: Onboarding flow from new student registration to first lesson booking
    external_dependencies: []
    involved_entities: [Student, Credit, Coupon, CouponTemplate, Booking, Session]

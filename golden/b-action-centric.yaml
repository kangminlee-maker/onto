---
# EduConnect — Action-Centric (Palantir style) Ontology
# canonical.yaml converted to ObjectType, LinkType, ActionType, Function structure
# Note: This is a fictional domain and unrelated to any real service

meta:
  schema: Action-Centric (Palantir style)
  domain: EduConnect
  version: 1
  source: golden/canonical.yaml
  created: 2026-03-26

# ============================================================
# ENUMS (10)
# ============================================================
enums:
  - name: Language
    description: Supported languages
    values:
      - value: EN
        description: English
      - value: JP
        description: Japanese
      - value: KR
        description: Korean
      - value: CN
        description: Chinese

  - name: SessionStatus
    description: Lesson session status
    values:
      - value: PENDING
        description: Pending (instructor not assigned)
      - value: CONFIRMED
        description: Confirmed (instructor assigned, credit deducted)
      - value: IN_PROGRESS
        description: Lesson in progress
      - value: COMPLETED
        description: Lesson completed normally
      - value: CANCELLED
        description: Cancelled (credit restored)
      - value: NO_SHOW
        description: No-show (no connection for over 10 minutes)

  - name: InstructorTier
    description: Instructor tier
    values:
      - value: STANDARD
        description: Standard instructor
      - value: PREMIUM
        description: Premium instructor
      - value: ELITE
        description: Elite instructor

  - name: PaymentMethod
    description: Payment method
    values:
      - value: CREDIT_CARD
        description: Credit card
      - value: BANK_TRANSFER
        description: Bank transfer
      - value: MOBILE_PAY
        description: Mobile payment

  - name: PaymentStatus
    description: Payment status
    values:
      - value: INITIATED
        description: Payment initiation
      - value: AUTHORIZED
        description: PG authentication completed
      - value: CAPTURED
        description: Settlement captured
      - value: FAILED
        description: PG authentication failed
      - value: REFUNDED
        description: Full refund
      - value: PARTIALLY_REFUNDED
        description: Partial refund

  - name: ContractStatus
    description: Subscription contract status
    values:
      - value: TRIAL
        description: Trial period
      - value: ACTIVE
        description: Active
      - value: PAUSED
        description: Paused (max 2 times)
      - value: EXPIRED
        description: Expired (no renewal)
      - value: CANCELLED
        description: Cancelled (prorated refund)
      - value: TERMINATED
        description: Terminated (refund processed, 30-day retention)

  - name: CouponCategory
    description: Coupon category
    values:
      - value: WELCOME
        description: Welcome sign-up
      - value: REFERRAL
        description: Referral
      - value: SEASONAL
        description: Seasonal event
      - value: LOYALTY
        description: Long-term loyalty
      - value: RECOVERY
        description: Churn prevention

  - name: DiscountType
    description: Discount type
    values:
      - value: PERCENTAGE
        description: Percentage discount
      - value: FIXED_AMOUNT
        description: Fixed amount discount

  - name: AssessmentStage
    description: AI assessment processing stage
    values:
      - value: QUEUED
        description: Queued
      - value: TRANSCRIBING
        description: Speech-to-text conversion in progress
      - value: ANALYZING
        description: Analyzing
      - value: COMPLETE
        description: Complete
      - value: ERROR
        description: Error occurred

  - name: CourseCategory
    description: Course category
    values:
      - value: BASIC_CONVERSATION
        description: Basic conversation
      - value: BUSINESS
        description: Business
      - value: EXAM_PREP
        description: Exam preparation
      - value: FREE_TALK
        description: Free talk

# ============================================================
# OBJECT TYPES (15)
# ============================================================
object_types:
  - name: Student
    domain: account
    description: Student. Primary user of the platform
    db_table: users
    normalization_status: normalized
    code_mapping:
      canonical: Student
      code_entity: User
      db_table: users
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
    source:
      backend.entity: User
      backend.table: users
      frontend: StudentProfile
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: email
        type: string
        nullable: false
        description: Email (login ID)
      - name: name
        type: string
        nullable: false
        description: Display name
      - name: phone
        type: string
        nullable: true
        description: Phone number
      - name: language
        type: enum
        nullable: false
        description: Target learning language
        enum_ref: Language
      - name: timezone
        type: string
        nullable: false
        description: Timezone (IANA)
      - name: registered_at
        type: datetime
        nullable: false
        description: Registration datetime
      - name: is_active
        type: boolean
        nullable: false
        description: Active status

  - name: Instructor
    domain: account
    description: Instructor. Educator who conducts lessons
    db_table: instructors
    normalization_status: normalized
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      db_table: instructors
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
    source:
      backend.entity: Tutor
      backend.table: instructors
      frontend: InstructorProfile
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: Display name
      - name: email
        type: string
        nullable: false
        description: Email
      - name: tier
        type: enum
        nullable: false
        description: Instructor tier
        enum_ref: InstructorTier
      - name: language
        type: enum
        nullable: false
        description: Available teaching language
        enum_ref: Language
      - name: bio
        type: text
        nullable: true
        description: Bio
      - name: rating
        type: decimal
        nullable: true
        description: Average rating (1.0~5.0)
      - name: is_available
        type: boolean
        nullable: false
        description: Currently available

  - name: Session
    domain: session
    description: Lesson session. 1:1 lesson unit between student and instructor
    db_table: sessions
    normalization_status: normalized
    code_mapping:
      canonical: Session
      code_entity: Lesson
      db_table: lessons
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
    source:
      backend.entity: Lesson
      backend.table: lessons
      frontend: SessionView
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: instructor_id
        type: bigint
        nullable: true
        description: Instructor FK (null when PENDING)
      - name: course_id
        type: bigint
        nullable: false
        description: Course FK
      - name: credit_id
        type: bigint
        nullable: true
        description: Used credit FK
      - name: status
        type: enum
        nullable: false
        description: Session status
        enum_ref: SessionStatus
      - name: scheduled_at
        type: datetime
        nullable: false
        description: Scheduled time
      - name: started_at
        type: datetime
        nullable: true
        description: Actual start time
      - name: ended_at
        type: datetime
        nullable: true
        description: Actual end time
      - name: reschedule_count
        type: integer
        nullable: false
        description: Reschedule count
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: Instructor assignment and credit deduction
          guard: null
          side_effects: [Credit deduction, Student/instructor notification sent]
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: Lesson start time reached
          guard: null
          side_effects: [WebRTC session created]
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: Lesson completed normally
          guard: null
          side_effects: [Assessment QUEUED created, Lesson completion notification]
        - from: CONFIRMED
          to: CANCELLED
          trigger: Student or instructor cancellation
          guard: ["Free cancellation if cancellation time is CANCELLATION_DEADLINE_HOURS(4) hours before lesson start"]
          side_effects: [Credit restoration, Cancellation notification sent]
        - from: CONFIRMED
          to: NO_SHOW
          trigger: No connection for over NOSHOW_TIMEOUT_MINUTES(10) minutes
          guard: ["NOSHOW_TIMEOUT_MINUTES=10"]
          side_effects: [No-show notification sent]

  - name: Course
    domain: session
    description: Course. Category and curriculum definition for lessons
    db_table: courses
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: Course name
      - name: category
        type: enum
        nullable: false
        description: Course category
        enum_ref: CourseCategory
      - name: language
        type: enum
        nullable: false
        description: Target language
        enum_ref: Language
      - name: description
        type: text
        nullable: true
        description: Course description
      - name: level
        type: integer
        nullable: false
        description: Difficulty level (1~10)
      - name: is_active
        type: boolean
        nullable: false
        description: Active status

  - name: Credit
    domain: billing
    description: Credit. Manages lesson availability units with dual tracking by minutes/count
    db_table: credits
    normalization_status: normalized
    code_mapping:
      canonical: Credit
      code_entity: Ticket
      db_table: credits
      legacy_aliases: [Token, Point]
      fk_variants: [credit_id, ticket_id]
    source:
      backend.entity: Ticket
      backend.table: credits
      frontend: CreditBalance
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: payment_id
        type: bigint
        nullable: true
        description: Payment FK (null for trial credits)
      - name: contract_id
        type: bigint
        nullable: true
        description: Subscription contract FK
      - name: total_count
        type: integer
        nullable: false
        description: Total issued count
      - name: used_count
        type: integer
        nullable: false
        description: Used count
      - name: total_minutes
        type: integer
        nullable: false
        description: Total issued minutes
      - name: used_minutes
        type: integer
        nullable: false
        description: Used minutes
      - name: expires_at
        type: datetime
        nullable: false
        description: Expiration datetime
      - name: issued_at
        type: datetime
        nullable: false
        description: Issuance datetime

  - name: Subscription
    domain: billing
    description: Subscription product definition. Product template with price, included credits, etc.
    db_table: subscriptions
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: Product name
      - name: price
        type: decimal
        nullable: false
        description: Monthly price
      - name: credit_count
        type: integer
        nullable: false
        description: Included lesson count
      - name: credit_minutes
        type: integer
        nullable: false
        description: Included lesson minutes
      - name: duration_days
        type: integer
        nullable: false
        description: Subscription duration (days)
      - name: is_active
        type: boolean
        nullable: false
        description: Currently on sale

  - name: Contract
    domain: billing
    description: Subscription contract. Contract instance where a student subscribes to a specific subscription product
    db_table: contracts
    normalization_status: normalized
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      db_table: contracts
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
    source:
      backend.entity: SubscriptionMapping
      backend.table: contracts
      frontend: ContractView
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: subscription_id
        type: bigint
        nullable: false
        description: Subscription product FK
      - name: card_id
        type: bigint
        nullable: true
        description: Payment card FK
      - name: status
        type: enum
        nullable: false
        description: Contract status
        enum_ref: ContractStatus
      - name: started_at
        type: datetime
        nullable: false
        description: Contract start date
      - name: expires_at
        type: datetime
        nullable: false
        description: Contract expiration date
      - name: next_billing_at
        type: datetime
        nullable: true
        description: Next billing date
      - name: pause_count
        type: integer
        nullable: false
        description: Pause count
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: First payment processing completed
          guard: null
          side_effects: [Credit issuance, Activation notification]
        - from: ACTIVE
          to: PAUSED
          trigger: Student pause request
          guard: ["MAX_PAUSE_COUNT=2 (current pause_count < 2)"]
          side_effects: [Next billing date postponed, Pause notification]
        - from: PAUSED
          to: ACTIVE
          trigger: Resume request
          guard: null
          side_effects: [Next billing date recalculated, Resume notification]
        - from: ACTIVE
          to: EXPIRED
          trigger: Period expired, no renewal
          guard: null
          side_effects: [Expiration notification]
        - from: ACTIVE
          to: CANCELLED
          trigger: Student cancellation request
          guard: null
          side_effects: [Prorated refund calculation, Cancellation notification]
        - from: CANCELLED
          to: TERMINATED
          trigger: Refund processing completed
          guard: ["Terminated after 30-day retention period"]
          side_effects: [Data retention marking]

  - name: Payment
    domain: billing
    description: Payment. Payment transaction via PG integration
    db_table: payments
    normalization_status: normalized
    source:
      backend.entity: Payment
      backend.table: payments
      frontend: PaymentView
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: contract_id
        type: bigint
        nullable: true
        description: Subscription contract FK
      - name: amount
        type: decimal
        nullable: false
        description: Payment amount
      - name: discount_amount
        type: decimal
        nullable: false
        description: Discount amount
      - name: method
        type: enum
        nullable: false
        description: Payment method
        enum_ref: PaymentMethod
      - name: status
        type: enum
        nullable: false
        description: Payment status
        enum_ref: PaymentStatus
      - name: pg_transaction_id
        type: string
        nullable: true
        description: PG transaction ID
      - name: created_at
        type: datetime
        nullable: false
        description: Payment creation datetime
      - name: captured_at
        type: datetime
        nullable: true
        description: Settlement capture datetime
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG authentication successful
          guard: null
          side_effects: [PG authentication token stored]
        - from: AUTHORIZED
          to: CAPTURED
          trigger: Settlement captured
          guard: null
          side_effects: [Credit issuance triggered, Contract activation triggered, Payment completion notification]
        - from: CAPTURED
          to: REFUNDED
          trigger: Full refund request
          guard: null
          side_effects: [PG refund API called, Credit retrieval, Refund notification]
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: Partial refund request
          guard: null
          side_effects: [PG partial refund API called, Partial refund notification]
        - from: AUTHORIZED
          to: FAILED
          trigger: PG authentication failed
          guard: null
          side_effects: [Payment failure notification]

  - name: PaymentCard
    domain: billing
    description: Registered card. Payment card information registered by the student
    db_table: payment_cards
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: card_number_masked
        type: string
        nullable: false
        description: Masked card number
      - name: card_brand
        type: string
        nullable: false
        description: Card brand (VISA, MASTER, etc.)
      - name: billing_key
        type: string
        nullable: false
        description: PG billing key
      - name: is_default
        type: boolean
        nullable: false
        description: Default payment method
      - name: registered_at
        type: datetime
        nullable: false
        description: Registration datetime

  - name: Coupon
    domain: promotion
    description: Issued coupon. Coupon instance issued to a specific student
    db_table: coupons
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: template_id
        type: bigint
        nullable: false
        description: Coupon template FK
      - name: student_id
        type: bigint
        nullable: false
        description: Student FK
      - name: payment_id
        type: bigint
        nullable: true
        description: Used payment FK (null if unused)
      - name: code
        type: string
        nullable: false
        description: Coupon code
      - name: is_used
        type: boolean
        nullable: false
        description: Usage status
      - name: issued_at
        type: datetime
        nullable: false
        description: Issuance datetime
      - name: expires_at
        type: datetime
        nullable: false
        description: Expiration datetime

  - name: CouponTemplate
    domain: promotion
    description: Coupon definition. Template for coupon type, discount rules, etc.
    db_table: coupon_templates
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: Coupon name
      - name: category
        type: enum
        nullable: false
        description: Coupon category
        enum_ref: CouponCategory
      - name: discount_type
        type: enum
        nullable: false
        description: Discount type
        enum_ref: DiscountType
      - name: discount_value
        type: decimal
        nullable: false
        description: Discount value (% for percentage, KRW for fixed amount)
      - name: min_purchase_amount
        type: decimal
        nullable: true
        description: Minimum purchase amount
      - name: max_issue_count
        type: integer
        nullable: true
        description: Maximum issue count
      - name: is_active
        type: boolean
        nullable: false
        description: Active status

  - name: Assessment
    domain: assessment
    description: AI learning assessment. AI-based assessment report auto-generated after lesson completion
    db_table: assessments
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: session_id
        type: bigint
        nullable: false
        description: Lesson session FK
      - name: stage
        type: enum
        nullable: false
        description: Processing stage
        enum_ref: AssessmentStage
      - name: transcript
        type: text
        nullable: true
        description: Lesson transcript text
      - name: score
        type: decimal
        nullable: true
        description: Overall score (0~100)
      - name: feedback
        type: text
        nullable: true
        description: AI feedback content
      - name: created_at
        type: datetime
        nullable: false
        description: Creation datetime
      - name: completed_at
        type: datetime
        nullable: true
        description: Assessment completion datetime

  - name: Booking
    domain: session
    description: Booking schedule. Booking record linking session and availability slot
    db_table: bookings
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: session_id
        type: bigint
        nullable: false
        description: Lesson session FK
      - name: slot_id
        type: bigint
        nullable: false
        description: Availability slot FK
      - name: booked_at
        type: datetime
        nullable: false
        description: Booking datetime
      - name: cancelled_at
        type: datetime
        nullable: true
        description: Cancellation datetime

  - name: AvailabilitySlot
    domain: session
    description: Instructor availability slot. Time range when instructor can conduct lessons
    db_table: availability_slots
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: instructor_id
        type: bigint
        nullable: false
        description: Instructor FK
      - name: start_time
        type: datetime
        nullable: false
        description: Start time
      - name: end_time
        type: datetime
        nullable: false
        description: End time
      - name: is_booked
        type: boolean
        nullable: false
        description: Booking occupied
      - name: day_of_week
        type: integer
        nullable: false
        description: Day of week (1=Mon ~ 7=Sun)

  - name: Notification
    domain: notification
    description: Notification. Notification message delivered from system to user
    db_table: notifications
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: recipient_id
        type: bigint
        nullable: false
        description: Recipient FK (student or instructor)
      - name: recipient_type
        type: string
        nullable: false
        description: "Recipient type (Student | Instructor)"
      - name: title
        type: string
        nullable: false
        description: Notification title
      - name: body
        type: text
        nullable: false
        description: Notification body
      - name: channel
        type: string
        nullable: false
        description: "Channel (PUSH | EMAIL | SMS)"
      - name: is_read
        type: boolean
        nullable: false
        description: Read status
      - name: sent_at
        type: datetime
        nullable: false
        description: Sent datetime

# ============================================================
# LINK TYPES (40)
# ============================================================
link_types:
  - id: lnk_student_session
    from: Student
    to: Session
    type: takes_lesson
    cardinality: "1:N"
    fk_column: sessions.student_id
    description: A student has multiple lesson sessions

  - id: lnk_instructor_session
    from: Instructor
    to: Session
    type: conducts
    cardinality: "1:N"
    fk_column: sessions.instructor_id
    description: An instructor conducts multiple lesson sessions

  - id: lnk_session_course
    from: Session
    to: Course
    type: belongs_to
    cardinality: "N:1"
    fk_column: sessions.course_id
    description: A session belongs to one course

  - id: lnk_session_credit
    from: Session
    to: Credit
    type: uses
    cardinality: "N:1"
    fk_column: sessions.credit_id
    description: A session uses one credit

  - id: lnk_student_credit
    from: Student
    to: Credit
    type: owns
    cardinality: "1:N"
    fk_column: credits.student_id
    description: A student owns multiple credits

  - id: lnk_credit_payment
    from: Credit
    to: Payment
    type: purchases
    cardinality: "N:1"
    fk_column: credits.payment_id
    description: A credit is purchased with one payment

  - id: lnk_credit_contract
    from: Credit
    to: Contract
    type: issues
    cardinality: "N:1"
    fk_column: credits.contract_id
    description: A credit is issued from one subscription contract

  - id: lnk_student_contract
    from: Student
    to: Contract
    type: contracts
    cardinality: "1:N"
    fk_column: contracts.student_id
    description: A student enters multiple subscription contracts

  - id: lnk_contract_subscription
    from: Contract
    to: Subscription
    type: based_on
    cardinality: "N:1"
    fk_column: contracts.subscription_id
    description: A contract is based on one subscription product

  - id: lnk_contract_card
    from: Contract
    to: PaymentCard
    type: payment_method
    cardinality: "N:1"
    fk_column: contracts.card_id
    description: A contract is linked to one payment card

  - id: lnk_student_payment_card
    from: Student
    to: PaymentCard
    type: registers
    cardinality: "1:N"
    fk_column: payment_cards.student_id
    description: A student registers multiple payment cards

  - id: lnk_student_payment
    from: Student
    to: Payment
    type: pays
    cardinality: "1:N"
    fk_column: payments.student_id
    description: A student makes multiple payments

  - id: lnk_payment_contract
    from: Payment
    to: Contract
    type: bills
    cardinality: "N:1"
    fk_column: payments.contract_id
    description: A payment is made for one contract

  - id: lnk_contract_payment
    from: Contract
    to: Payment
    type: payment_history
    cardinality: "1:N"
    fk_column: payments.contract_id
    description: A contract generates multiple payments

  - id: lnk_coupon_template
    from: Coupon
    to: CouponTemplate
    type: defines

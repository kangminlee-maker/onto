# ============================================================
# ACTORS
# ============================================================
actors:
  - id: student
    description: Student. Primary actor for lesson booking, payment, subscription, etc.
  - id: instructor
    description: Instructor. Actor for availability slot registration, lesson delivery, etc.
  - id: admin
    description: Admin. Actor for operational actions such as refunds, coupon issuance, etc.
  - id: system
    description: System. Actor for automated actions such as auto-renewal, no-show processing, AI assessment, etc.
  - id: anonymous
    description: Unauthenticated user. Only registration is allowed

# ============================================================
# ACTION TYPES — Commands (20)
# ============================================================
action_types:
  # AUTH
  - id: act_register_student
    name: RegisterStudent
    display_name: Student registration
    domain: account
    actor: anonymous
    mutating: true
    target_object_types: [Student]
    preconditions:
      - check: "No duplicate email"
        policy_ref: null
    results:
      - Student record created
      - Trial Credit issued (TRIAL_CREDIT_COUNT=1)
    state_transitions: []
    side_effects:
      - Welcome sign-up email sent
      - Welcome coupon auto-issued
    source_code: "AuthController.register()"

  - id: act_login_student
    name: LoginStudent
    display_name: Student login
    domain: account
    actor: student
    mutating: true
    target_object_types: [Student]
    preconditions:
      - check: "Email/password match"
        policy_ref: null
    results:
      - Authentication token issued
    state_transitions: []
    side_effects: []
    source_code: "AuthController.login()"

  - id: act_logout_student
    name: LogoutStudent
    display_name: Student logout
    domain: account
    actor: student
    mutating: true
    target_object_types: [Student]
    preconditions: []
    results:
      - Authentication token invalidated
    state_transitions: []
    side_effects: []
    source_code: "AuthController.logout()"

  - id: act_withdraw_student
    name: WithdrawStudent
    display_name: Student withdrawal
    domain: account
    actor: student
    mutating: true
    target_object_types: [Student, Contract, Credit]
    preconditions:
      - check: "No active Contract or cancellation completed"
        policy_ref: null
    results:
      - Student deactivated (soft delete)
      - Remaining Credit expired
    state_transitions: []
    side_effects:
      - Withdrawal confirmation email sent
      - 30-day retention scheduled
    source_code: "AuthController.withdraw()"

  # SESSION
  - id: act_book_session
    name: BookSession
    display_name: Lesson booking
    domain: session
    actor: student
    mutating: true
    target_object_types: [Session, Booking, Credit, AvailabilitySlot]
    preconditions:
      - check: "Available Credit remaining"
        policy_ref: null
      - check: "Selected AvailabilitySlot is not booked"
        policy_ref: null
    results:
      - Session created (PENDING)
      - Booking created
      - AvailabilitySlot occupied
    state_transitions:
      - "Session: → PENDING"
    side_effects:
      - Instructor matching queue registered
    source_code: "SessionGateway.bookSession()"

  - id: act_cancel_session
    name: CancelSession
    display_name: Lesson cancellation
    domain: session
    actor: student
    mutating: true
    target_object_types: [Session, Credit, Booking]
    preconditions:
      - check: "Session status is PENDING or CONFIRMED"
        policy_ref: null
      - check: "Free if cancellation time is before CANCELLATION_DEADLINE_HOURS(4)"
        policy_ref: CANCELLATION_DEADLINE_HOURS
    results:
      - Session CANCELLED
      - Credit restored (on free cancellation)
      - Booking cancelled
      - AvailabilitySlot released
    state_transitions:
      - "Session: CONFIRMED → CANCELLED"
    side_effects:
      - Cancellation notification sent
    source_code: "SessionGateway.cancelSession()"

  - id: act_complete_session
    name: CompleteSession
    display_name: Lesson completion
    domain: session
    actor: system
    mutating: true
    target_object_types: [Session, Assessment]
    preconditions:
      - check: "Session status is IN_PROGRESS"
        policy_ref: null
    results:
      - Session COMPLETED
      - Assessment created (QUEUED)
    state_transitions:
      - "Session: IN_PROGRESS → COMPLETED"
    side_effects:
      - AI assessment pipeline triggered
      - Lesson completion notification
    source_code: "SessionGateway.completeSession()"

  - id: act_reschedule_session
    name: RescheduleSession
    display_name: Lesson reschedule
    domain: session
    actor: student
    mutating: true
    target_object_types: [Session, Booking, AvailabilitySlot]
    preconditions:
      - check: "reschedule_count < MAX_RESCHEDULE_COUNT(2)"
        policy_ref: MAX_RESCHEDULE_COUNT
      - check: "Session status is CONFIRMED"
        policy_ref: null
    results:
      - Existing Booking cancelled
      - New Booking created
      - reschedule_count incremented
    state_transitions: []
    side_effects:
      - Schedule change notification
    source_code: "SessionGateway.rescheduleSession()"

  - id: act_mark_no_show
    name: MarkNoShow
    display_name: No-show processing
    domain: session
    actor: system
    mutating: true
    target_object_types: [Session]
    preconditions:
      - check: "NOSHOW_TIMEOUT_MINUTES(10) minutes exceeded in CONFIRMED status"
        policy_ref: null
    results:
      - Session NO_SHOW
    state_transitions:
      - "Session: CONFIRMED → NO_SHOW"
    side_effects:
      - No-show notification sent
    source_code: "SessionGateway.markNoShow()"

  # PAYMENT
  - id: act_initiate_payment
    name: InitiatePayment
    display_name: Payment initiation
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Payment]
    preconditions:
      - check: "Valid payment method exists"
        policy_ref: null
    results:
      - Payment created (INITIATED)
    state_transitions:
      - "Payment: → INITIATED"
    side_effects:
      - PG payment request
    source_code: "PaymentProcessor.initiate()"

  - id: act_capture_payment
    name: CapturePayment
    display_name: Payment capture
    domain: billing
    actor: system
    mutating: true
    target_object_types: [Payment, Credit, Contract]
    preconditions:
      - check: "Payment status is AUTHORIZED"
        policy_ref: null
    results:
      - Payment CAPTURED
      - Credit issuance
      - Contract activated (when applicable)
    state_transitions:
      - "Payment: AUTHORIZED → CAPTURED"
    side_effects:
      - Payment completion notification
      - Receipt email
    source_code: "PaymentProcessor.capture()"

  - id: act_refund_payment
    name: RefundPayment
    display_name: Payment refund
    domain: billing
    actor: admin
    mutating: true
    target_object_types: [Payment, Credit]
    preconditions:
      - check: "Payment status is CAPTURED"
        policy_ref: null
    results:
      - Payment REFUNDED
      - Credit retrieval
    state_transitions:
      - "Payment: CAPTURED → REFUNDED"
    side_effects:
      - PG refund API called
      - Refund notification
    source_code: "PaymentProcessor.refund()"

  - id: act_retry_payment
    name: RetryPayment
    display_name: Payment retry
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Payment]
    preconditions:
      - check: "Previous Payment is in FAILED status"
        policy_ref: null
    results:
      - New Payment created (INITIATED)
    state_transitions:
      - "Payment: → INITIATED"
    side_effects:
      - PG payment retry request
    source_code: "PaymentProcessor.retry()"

  # SUBSCRIPTION
  - id: act_create_contract
    name: CreateContract
    display_name: Subscription contract creation
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Contract, Payment]
    preconditions:
      - check: "Selected Subscription is active"
        policy_ref: null
    results:
      - Contract created (TRIAL)
      - Payment triggered
    state_transitions:
      - "Contract: → TRIAL"
    side_effects:
      - Trial Credit issued
    source_code: "ContractService.create()"

  - id: act_pause_contract
    name: PauseContract
    display_name: Subscription pause
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Contract]
    preconditions:
      - check: "Contract status is ACTIVE"
        policy_ref: null
      - check: "pause_count < MAX_PAUSE_COUNT(2)"
        policy_ref: MAX_PAUSE_COUNT
    results:
      - Contract PAUSED
      - Next billing date postponed
    state_transitions:
      - "Contract: ACTIVE → PAUSED"
    side_effects:
      - Pause notification
    source_code: "ContractService.pause()"

  - id: act_resume_contract
    name: ResumeContract
    display_name: Subscription resume
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Contract]
    preconditions:
      - check: "Contract status is PAUSED"
        policy_ref: null
    results:
      - Contract ACTIVE
      - Next billing date recalculated
    state_transitions:
      - "Contract: PAUSED → ACTIVE"
    side_effects:
      - Resume notification
    source_code: "ContractService.resume()"

  - id: act_cancel_contract
    name: CancelContract
    display_name: Subscription cancellation
    domain: billing
    actor: student
    mutating: true
    target_object_types: [Contract, Payment]
    preconditions:
      - check: "Contract status is ACTIVE"
        policy_ref: null
    results:
      - Contract CANCELLED
      - Prorated refund calculation
    state_transitions:
      - "Contract: ACTIVE → CANCELLED"
    side_effects:
      - Prorated refund triggered
      - Cancellation notification
    source_code: "ContractService.cancel()"

  - id: act_renew_contract
    name: RenewContract
    display_name: Subscription renewal
    domain: billing
    actor: system
    mutating: true
    target_object_types: [Contract, Payment, Credit]
    preconditions:
      - check: "Contract status is ACTIVE"
        policy_ref: null
      - check: "Expiration date reached"
        policy_ref: null
    results:
      - Auto payment triggered
      - Credit issuance
      - Next billing date updated
    state_transitions: []
    side_effects:
      - Payment notification
      - Renewal completion notification
    source_code: "ContractService.renew()"

  # COUPON
  - id: act_issue_coupon
    name: IssueCoupon
    display_name: Coupon issuance
    domain: promotion
    actor: system
    mutating: true
    target_object_types: [Coupon, CouponTemplate]
    preconditions:
      - check: "CouponTemplate is active"
        policy_ref: null
      - check: "Issue limit not exceeded"
        policy_ref: null
    results:
      - Coupon created
    state_transitions: []
    side_effects:
      - Coupon issuance notification
    source_code: "CouponService.issue()"

  - id: act_apply_coupon
    name: ApplyCoupon
    display_name: Coupon application
    domain: promotion
    actor: student
    mutating: true
    target_object_types: [Coupon, Payment]
    preconditions:
      - check: "Coupon is unused"
        policy_ref: null
      - check: "Coupon not expired"
        policy_ref: null
      - check: "Minimum purchase amount met"
        policy_ref: null
    results:
      - Coupon marked as used
      - Payment discount_amount applied
    state_transitions: []
    side_effects: []
    source_code: "CouponService.apply()"

  # QUERIES (15, mutating: false)
  - id: act_get_student_profile
    name: GetStudentProfile
    display_name: Get student profile
    domain: account
    actor: student
    mutating: false
    target_object_types: [Student]
    source_code: "StudentController.getProfile()"

  - id: act_get_instructor_profile
    name: GetInstructorProfile
    display_name: Get instructor profile
    domain: account
    actor: student
    mutating: false
    target_object_types: [Instructor]
    source_code: "InstructorController.getProfile()"

  - id: act_list_sessions
    name: ListSessions
    display_name: List lessons
    domain: session
    actor: student
    mutating: false
    target_object_types: [Session, Instructor, Course]
    source_code: "SessionController.list()"

  - id: act_get_session_detail
    name: GetSessionDetail
    display_name: Get lesson detail
    domain: session
    actor: student
    mutating: false
    target_object_types: [Session, Instructor, Course, Assessment]
    source_code: "SessionController.detail()"

  - id: act_list_contracts
    name: ListContracts
    display_name: List subscription contracts
    domain: billing
    actor: student
    mutating: false
    target_object_types: [Contract, Subscription]

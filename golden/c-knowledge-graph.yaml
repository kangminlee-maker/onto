        type: list
        required: true
        description: "Credit remaining check -> Time slot selection -> Instructor matching -> Booking creation -> Session creation"

  - name: PaymentFlow
    entity_type: flow
    domain: billing
    description: Flow from subscription product payment to credit issuance
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Student, Payment, PaymentCard, Coupon, Credit, Contract, Subscription]"
      - name: external_dependencies
        type: list
        required: false
        description: "[PG payment API]"
      - name: steps
        type: list
        required: true
        description: "Product selection/coupon application -> Payment INITIATED -> PG authentication -> Settlement capture -> Credit issuance -> Contract activation"

  - name: SubscriptionRenewalFlow
    entity_type: flow
    domain: billing
    description: Subscription auto-renewal flow
    properties:

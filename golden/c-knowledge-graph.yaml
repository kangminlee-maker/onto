# ============================================================
# ENTITIES — command (20건)
# ============================================================
  # AUTH
  - name: RegisterStudent
    entity_type: command
    domain: account
    description: 학생 회원가입. Student 생성 및 체험 Credit 발급
    properties:
      - name: actor
        type: string
        required: true
        description: "anonymous"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: LoginStudent
    entity_type: command
    domain: account
    description: 학생 로그인. 인증 토큰 발급
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: LogoutStudent
    entity_type: command
    domain: account
    description: 학생 로그아웃. 인증 토큰 무효화
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: WithdrawStudent
    entity_type: command
    domain: account
    description: 학생 탈퇴. Student 비활성화 및 잔여 Credit 소멸
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student, Contract, Credit]"

  # SESSION
  - name: BookSession
    entity_type: command
    domain: session
    description: 수업 예약. Session/Booking 생성, Credit 차감
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Booking, Credit, AvailabilitySlot]"

  - name: CancelSession
    entity_type: command
    domain: session
    description: 수업 취소. Session CANCELLED, Credit 복원 (무료 취소 시)
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Credit, Booking]"

  - name: CompleteSession
    entity_type: command
    domain: session
    description: 수업 완료. Session COMPLETED, Assessment 생성
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Assessment]"

  - name: RescheduleSession
    entity_type: command
    domain: session
    description: 수업 일정 변경. 기존 Booking 취소 후 새 Booking 생성
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Booking, AvailabilitySlot]"

  - name: MarkNoShow
    entity_type: command
    domain: session
    description: 미참석 처리. NOSHOW_TIMEOUT_MINUTES 초과 시 NO_SHOW
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Session]"

  # PAYMENT
  - name: InitiatePayment
    entity_type: command
    domain: billing
    description: 결제 시작. Payment 생성 (INITIATED)
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Payment]"

  - name: CapturePayment
    entity_type: command
    domain: billing
    description: 결제 확정. Payment CAPTURED, Credit 발급
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Payment, Credit, Contract]"

  - name: RefundPayment
    entity_type: command
    domain: billing
    description: 결제 환불. Payment REFUNDED, Credit 회수
    properties:
      - name: actor
        type: string
        required: true
        description: "admin"
      - name: target_entities
        type: list
        required: true
        description: "[Payment, Credit]"

  - name: RetryPayment
    entity_type: command
    domain: billing
    description: 결제 재시도. FAILED 상태의 Payment에 대해 새 Payment 생성
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Payment]"

  # SUBSCRIPTION
  - name: CreateContract
    entity_type: command
    domain: billing
    description: 구독 계약 생성. Contract 생성 (TRIAL), 결제 트리거
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Contract, Payment]"

  - name: PauseContract
    entity_type: command
    domain: billing
    description: 구독 일시 정지. Contract PAUSED, 다음 결제일 연기
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Contract]"

  - name: ResumeContract
    entity_type: command
    domain: billing
    description: 구독 재개. Contract ACTIVE, 다음 결제일 재계산
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Contract]"

  - name: CancelContract
    entity_type: command
    domain: billing
    description: 구독 해지. Contract CANCELLED, 비례 환불 계산
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Contract, Payment]"

  - name: RenewContract
    entity_type: command
    domain: billing
    description: 구독 갱신. 자동 결제 트리거, Credit 발급
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Contract, Payment, Credit]"

  # COUPON
  - name: IssueCoupon
    entity_type: command
    domain: promotion
    description: 쿠폰 발급. CouponTemplate 기반 Coupon 생성
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Coupon, CouponTemplate]"

  - name: ApplyCoupon
    entity_type: command
    domain: promotion
    description: 쿠폰 적용. Coupon 사용 처리, Payment 할인 반영
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Coupon, Payment]"


---
# EduConnect — Knowledge Graph Ontology
# canonical.yaml converted to Entity, Relation, Property structure
# Note: This is a fictional domain and unrelated to any real service

meta:
  schema: Knowledge Graph
  domain: EduConnect
  version: 1
  source: golden/canonical.yaml
  created: 2026-03-26

# ============================================================
# ENTITIES — domain_object (15)
# ============================================================
entities:
  # --- domain_object ---
  - name: Student
    entity_type: domain_object
    domain: account
    description: Student. Primary user of the platform
    normalization_status: normalized
    db_table: users
    code_mapping:
      canonical: Student
      code_entity: User
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: email
        type: string
        required: true
        description: Email (login ID)
      - name: name
        type: string
        required: true
        description: Display name
      - name: phone
        type: string
        required: false
        description: Phone number
      - name: language
        type: enum
        required: true
        description: Target learning language
        enum_values: [EN, JP, KR, CN]
      - name: timezone
        type: string
        required: true
        description: Timezone (IANA)
      - name: registered_at
        type: datetime
        required: true
        description: Registration datetime
      - name: is_active
        type: boolean
        required: true
        description: Active status

  - name: Instructor
    entity_type: domain_object
    domain: account
    description: Instructor. Educator who conducts lessons
    normalization_status: normalized
    db_table: instructors
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Display name
      - name: email
        type: string
        required: true
        description: Email
      - name: tier
        type: enum
        required: true
        description: Instructor tier
        enum_values: [STANDARD, PREMIUM, ELITE]
      - name: language
        type: enum
        required: true
        description: Available teaching language
        enum_values: [EN, JP, KR, CN]
      - name: bio
        type: text
        required: false
        description: Bio
      - name: rating
        type: decimal
        required: false
        description: Average rating (1.0~5.0)
      - name: is_available
        type: boolean
        required: true
        description: Currently available

  - name: Session
    entity_type: domain_object
    domain: session
    description: Lesson session. 1:1 lesson unit between student and instructor
    normalization_status: normalized
    db_table: sessions
    code_mapping:
      canonical: Session
      code_entity: Lesson
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: instructor_id
        type: bigint
        required: false
        description: Instructor FK (null when PENDING)
      - name: course_id
        type: bigint
        required: true
        description: Course FK
      - name: credit_id
        type: bigint
        required: false
        description: Used credit FK
      - name: status
        type: enum
        required: true
        description: Session status
        enum_values: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      - name: scheduled_at
        type: datetime
        required: true
        description: Scheduled time
      - name: started_at
        type: datetime
        required: false
        description: Actual start time
      - name: ended_at
        type: datetime
        required: false
        description: Actual end time
      - name: reschedule_count
        type: integer
        required: true
        description: Reschedule count
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: Instructor assignment and credit deduction
          side_effects: [Credit deduction, Student/instructor notification sent]
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: Lesson start time reached
          side_effects: [WebRTC session created]
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: Lesson completed normally
          side_effects: [Assessment QUEUED created, Lesson completion notification]
        - from: CONFIRMED
          to: CANCELLED
          trigger: Student or instructor cancellation
          guard: ["Free cancellation if CANCELLATION_DEADLINE_HOURS(4) hours before lesson start"]
          side_effects: [Credit restoration, Cancellation notification sent]
        - from: CONFIRMED
          to: NO_SHOW
          trigger: No connection for over 10 minutes
          guard: ["NOSHOW_TIMEOUT_MINUTES=10"]
          side_effects: [No-show notification sent]

  - name: Course
    entity_type: domain_object
    domain: session
    description: Course. Category and curriculum definition for lessons
    normalization_status: normalized
    db_table: courses
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Course name
      - name: category
        type: enum
        required: true
        description: Course category
        enum_values: [BASIC_CONVERSATION, BUSINESS, EXAM_PREP, FREE_TALK]
      - name: language
        type: enum
        required: true
        description: Target language
        enum_values: [EN, JP, KR, CN]
      - name: description
        type: text
        required: false
        description: Course description
      - name: level
        type: integer
        required: true
        description: Difficulty level (1~10)
      - name: is_active
        type: boolean
        required: true
        description: Active status

  - name: Credit
    entity_type: domain_object
    domain: billing
    description: Credit. Manages lesson availability units with dual tracking by minutes/count
    normalization_status: normalized
    db_table: credits
    code_mapping:
      canonical: Credit
      code_entity: Ticket
      legacy_aliases: [Token, Point]
      fk_variants: [credit_id, ticket_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: payment_id
        type: bigint
        required: false
        description: Payment FK (null for trial credits)
      - name: contract_id
        type: bigint
        required: false
        description: Subscription contract FK
      - name: total_count
        type: integer
        required: true
        description: Total issued count
      - name: used_count
        type: integer
        required: true
        description: Used count
      - name: total_minutes
        type: integer
        required: true
        description: Total issued minutes
      - name: used_minutes
        type: integer
        required: true
        description: Used minutes
      - name: expires_at
        type: datetime
        required: true
        description: Expiration datetime
      - name: issued_at
        type: datetime
        required: true
        description: Issuance datetime

  - name: Subscription
    entity_type: domain_object
    domain: billing
    description: Subscription product definition. Product template with price, included credits, etc.
    normalization_status: normalized
    db_table: subscriptions
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Product name
      - name: price
        type: decimal
        required: true
        description: Monthly price
      - name: credit_count
        type: integer
        required: true
        description: Included lesson count
      - name: credit_minutes
        type: integer
        required: true
        description: Included lesson minutes
      - name: duration_days
        type: integer
        required: true
        description: Subscription duration (days)
      - name: is_active
        type: boolean
        required: true
        description: Currently on sale

  - name: Contract
    entity_type: domain_object
    domain: billing
    description: Subscription contract. Contract instance where a student subscribes to a specific subscription product
    normalization_status: normalized
    db_table: contracts
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: subscription_id
        type: bigint
        required: true
        description: Subscription product FK
      - name: card_id
        type: bigint
        required: false
        description: Payment card FK
      - name: status
        type: enum
        required: true
        description: Contract status
        enum_values: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      - name: started_at
        type: datetime
        required: true
        description: Contract start date
      - name: expires_at
        type: datetime
        required: true
        description: Contract expiration date
      - name: next_billing_at
        type: datetime
        required: false
        description: Next billing date
      - name: pause_count
        type: integer
        required: true
        description: Pause count
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: First payment processing completed
          side_effects: [Credit issuance, Activation notification]
        - from: ACTIVE
          to: PAUSED
          trigger: Student pause request
          guard: ["MAX_PAUSE_COUNT=2"]
          side_effects: [Next billing date postponed, Pause notification]
        - from: PAUSED
          to: ACTIVE
          trigger: Resume request
          side_effects: [Next billing date recalculated, Resume notification]
        - from: ACTIVE
          to: EXPIRED
          trigger: Period expired, no renewal
          side_effects: [Expiration notification]
        - from: ACTIVE
          to: CANCELLED
          trigger: Student cancellation request
          side_effects: [Prorated refund calculation, Cancellation notification]
        - from: CANCELLED
          to: TERMINATED
          trigger: Refund processing completed
          guard: ["Terminated after 30-day retention period"]
          side_effects: [Data retention marking]

  - name: Payment
    entity_type: domain_object
    domain: billing
    description: Payment. Payment transaction via PG integration
    normalization_status: normalized
    db_table: payments
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: contract_id
        type: bigint
        required: false
        description: Subscription contract FK
      - name: amount
        type: decimal
        required: true
        description: Payment amount
      - name: discount_amount
        type: decimal
        required: true
        description: Discount amount
      - name: method
        type: enum
        required: true
        description: Payment method
        enum_values: [CREDIT_CARD, BANK_TRANSFER, MOBILE_PAY]
      - name: status
        type: enum
        required: true
        description: Payment status
        enum_values: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      - name: pg_transaction_id
        type: string
        required: false
        description: PG transaction ID
      - name: created_at
        type: datetime
        required: true
        description: Payment creation datetime
      - name: captured_at
        type: datetime
        required: false
        description: Settlement capture datetime
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG authentication successful
          side_effects: [PG authentication token stored]
        - from: AUTHORIZED
          to: CAPTURED
          trigger: Settlement captured
          side_effects: [Credit issuance triggered, Contract activation triggered, Payment completion notification]
        - from: CAPTURED
          to: REFUNDED
          trigger: Full refund request
          side_effects: [PG refund API called, Credit retrieval, Refund notification]
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: Partial refund request
          side_effects: [PG partial refund API called, Partial refund notification]
        - from: AUTHORIZED
          to: FAILED
          trigger: PG authentication failed
          side_effects: [Payment failure notification]

  - name: PaymentCard
    entity_type: domain_object
    domain: billing
    description: Registered card. Payment card information registered by the student
    normalization_status: normalized
    db_table: payment_cards
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: card_number_masked
        type: string
        required: true
        description: Masked card number
      - name: card_brand
        type: string
        required: true
        description: Card brand (VISA, MASTER, etc.)
      - name: billing_key
        type: string
        required: true
        description: PG billing key
      - name: is_default
        type: boolean
        required: true
        description: Default payment method
      - name: registered_at
        type: datetime
        required: true
        description: Registration datetime

  - name: Coupon
    entity_type: domain_object
    domain: promotion
    description: Issued coupon. Coupon instance issued to a specific student
    normalization_status: normalized
    db_table: coupons
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: template_id
        type: bigint
        required: true
        description: Coupon template FK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: payment_id
        type: bigint
        required: false
        description: Used payment FK (null if unused)
      - name: code
        type: string
        required: true
        description: Coupon code
      - name: is_used
        type: boolean
        required: true
        description: Usage status
      - name: issued_at
        type: datetime
        required: true
        description: Issuance datetime
      - name: expires_at
        type: datetime
        required: true
        description: Expiration datetime

  - name: CouponTemplate
    entity_type: domain_object
    domain: promotion
    description: Coupon definition. Template for coupon type, discount rules, etc.
    normalization_status: normalized
    db_table: coupon_templates
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Coupon name
      - name: category
        type: enum
        required: true
        description: Coupon category
        enum_values: [WELCOME, REFERRAL, SEASONAL, LOYALTY, RECOVERY]
      - name: discount_type
        type: enum
        required: true
        description: Discount type
        enum_values: [PERCENTAGE, FIXED_AMOUNT]
      - name: discount_value
        type: decimal
        required: true
        description: Discount value (% for percentage, KRW for fixed amount)
      - name: min_purchase_amount
        type: decimal
        required: false
        description: Minimum purchase amount
      - name: max_issue_count
        type: integer
        required: false
        description: Maximum issue count
      - name: is_active
        type: boolean
        required: true
        description: Active status

  - name: Assessment
    entity_type: domain_object
    domain: assessment
    description: AI learning assessment. AI-based assessment report auto-generated after lesson completion
    normalization_status: normalized
    db_table: assessments
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: Lesson session FK
      - name: stage
        type: enum
        required: true
        description: Processing stage
        enum_values: [QUEUED, TRANSCRIBING, ANALYZING, COMPLETE, ERROR]
      - name: transcript
        type: text
        required: false
        description: Lesson transcript text
      - name: score
        type: decimal
        required: false
        description: Overall score (0~100)
      - name: feedback
        type: text
        required: false
        description: AI feedback content
      - name: created_at
        type: datetime
        required: true
        description: Creation datetime
      - name: completed_at
        type: datetime
        required: false
        description: Assessment completion datetime

  - name: Booking
    entity_type: domain_object
    domain: session
    description: Booking schedule. Booking record linking session and availability slot
    normalization_status: normalized
    db_table: bookings
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: Lesson session FK
      - name: slot_id
        type: bigint
        required: true
        description: Availability slot FK
      - name: booked_at
        type: datetime
        required: true
        description: Booking datetime
      - name: cancelled_at
        type: datetime
        required: false
        description: Cancellation datetime

  - name: AvailabilitySlot
    entity_type: domain_object
    domain: session
    description: Instructor availability slot. Time range when instructor can conduct lessons
    normalization_status: normalized
    db_table: availability_slots
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: instructor_id
        type: bigint
        required: true
        description: Instructor FK
      - name: start_time
        type: datetime
        required: true
        description: Start time
      - name: end_time
        type: datetime
        required: true
        description: End time
      - name: is_booked
        type: boolean
        required: true
        description: Booking occupied
      - name: day_of_week
        type: integer
        required: true
        description: Day of week (1=Mon ~ 7=Sun)

  - name: Notification
    entity_type: domain_object
    domain: notification
    description: Notification. Notification message delivered from system to user
    normalization_status: normalized
    db_table: notifications
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: recipient_id
        type: bigint
        required: true
        description: Recipient FK (student or instructor)
      - name: recipient_type
        type: string
        required: true
        description: "Recipient type (Student | Instructor)"
      - name: title
        type: string
        required: true
        description: Notification title
      - name: body
        type: text
        required: true
        description: Notification body
      - name: channel
        type: string
        required: true
        description: "Channel (PUSH | EMAIL | SMS)"
      - name: is_read
        type: boolean
        required: true
        description: Read status
      - name: sent_at
        type: datetime
        required: true
        description: Sent datetime

  # --- enum entities (10) ---
  - name: Language
    entity_type: enum
    domain: shared

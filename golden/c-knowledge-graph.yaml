    entity_type: enum
    domain: session
    description: Course category
    values:
      - value: BASIC_CONVERSATION
        description: Basic conversation
      - value: BUSINESS
        description: Business
      - value: EXAM_PREP
        description: Exam preparation
      - value: FREE_TALK
        description: Free talk

# ============================================================
# ENTITIES — command (20)
# ============================================================
  # AUTH
  - name: RegisterStudent
    entity_type: command
    domain: account
    description: Student registration. Creates Student and issues trial Credit
    properties:
      - name: actor
        type: string
        required: true
        description: "anonymous"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: LoginStudent
    entity_type: command
    domain: account
    description: Student login. Issues authentication token
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: LogoutStudent
    entity_type: command
    domain: account
    description: Student logout. Invalidates authentication token
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student]"

  - name: WithdrawStudent
    entity_type: command
    domain: account
    description: Student withdrawal. Deactivates Student and expires remaining Credit
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Student, Contract, Credit]"

  # SESSION
  - name: BookSession
    entity_type: command
    domain: session
    description: Lesson booking. Creates Session/Booking, deducts Credit
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Booking, Credit, AvailabilitySlot]"

  - name: CancelSession
    entity_type: command
    domain: session
    description: Lesson cancellation. Session CANCELLED, Credit restored (on free cancellation)
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Credit, Booking]"

  - name: CompleteSession
    entity_type: command
    domain: session
    description: Lesson completion. Session COMPLETED, Assessment created
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Assessment]"

  - name: RescheduleSession
    entity_type: command
    domain: session
    description: Lesson reschedule. Cancels existing Booking and creates new Booking
    properties:
      - name: actor
        type: string
        required: true
        description: "student"
      - name: target_entities
        type: list
        required: true
        description: "[Session, Booking, AvailabilitySlot]"

  - name: MarkNoShow
    entity_type: command
    domain: session
    description: No-show processing. Marked NO_SHOW when NOSHOW_TIMEOUT_MINUTES exceeded
    properties:
      - name: actor
        type: string
        required: true
        description: "system"
      - name: target_entities
        type: list
        required: true
        description: "[Session]"

  # PAYMENT
  - name: InitiatePayment
    entity_type: command
    domain: billing
    description: Payment initiation. Creates Payment (INITIATED)
    properties:
      - name: actor
        type: string

# ============================================================
# PROPERTIES — actor (5) + policy (5)
# ============================================================
properties:
  # Actors
  - name: student
    property_type: actor
    description: Student. Primary actor for lesson booking, payment, subscription, etc.

  - name: instructor
    property_type: actor
    description: Instructor. Actor for availability slot registration, lesson delivery, etc.

  - name: admin
    property_type: actor
    description: Admin. Actor for operational actions such as refunds, coupon issuance, etc.

  - name: system
    property_type: actor
    description: System. Actor for automated actions such as auto-renewal, no-show processing, AI assessment, etc.

  - name: anonymous
    property_type: actor
    description: Unauthenticated user. Only registration is allowed

  # Policy Constants
  - name: CANCELLATION_DEADLINE_HOURS
    property_type: policy
    description: Free cancellation hours before lesson start
    value: "4 hours"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [session_cancel_guard]

  - name: SESSION_DURATION_MINUTES
    property_type: policy
    description: Default duration per lesson
    value: "30 minutes"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: []

  - name: MAX_RESCHEDULE_COUNT
    property_type: policy
    description: Maximum reschedule count per session
    value: "2 count"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [session_reschedule_guard]

  - name: TRIAL_CREDIT_COUNT
    property_type: policy
    description: Free trial lesson count
    value: "1 count"
    changeable: false
    source_code: "config/policies.yml"
    used_by_guard: []

  - name: REFERRAL_DISCOUNT_PERCENT
    property_type: policy
    description: Referral discount rate
    value: "15 percent"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [coupon_referral_guard]

  - name: NOSHOW_TIMEOUT_MINUTES
    property_type: policy
    description: No-show timeout. Marked as NO_SHOW if no connection exceeds this time in CONFIRMED status
    value: "10 minutes"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [noshow_timeout_guard]

  - name: MAX_PAUSE_COUNT
    property_type: policy
    description: Maximum pause count allowed per subscription contract
    value: "2 count"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [contract_pause_guard]

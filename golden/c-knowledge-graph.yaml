# ============================================================
# PROPERTIES — actor (5개) + policy (5개)
# ============================================================
properties:
  # Actors
  - name: student
    property_type: actor
    description: 수강생. 수업 예약, 결제, 구독 등의 주요 행위 주체

  - name: instructor
    property_type: actor
    description: 강사. 가용 시간대 등록, 수업 진행 등의 행위 주체

  - name: admin
    property_type: actor
    description: 관리자. 환불, 쿠폰 발급 등 운영 행위 주체

  - name: system
    property_type: actor
    description: 시스템. 자동 갱신, 미참석 처리, AI 평가 등 자동화 행위 주체

  - name: anonymous
    property_type: actor
    description: 미인증 사용자. 회원가입만 가능

  # Policy Constants
  - name: CANCELLATION_DEADLINE_HOURS
    property_type: policy
    description: 수업 시작 전 무료 취소 가능 시간
    value: "4 hours"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [session_cancel_guard]

  - name: SESSION_DURATION_MINUTES
    property_type: policy
    description: 1회 수업 기본 시간
    value: "30 minutes"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: []

  - name: MAX_RESCHEDULE_COUNT
    property_type: policy
    description: 세션당 최대 일정 변경 횟수
    value: "2 count"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [session_reschedule_guard]

  - name: TRIAL_CREDIT_COUNT
    property_type: policy
    description: 체험 수업 무료 제공 횟수
    value: "1 count"
    changeable: false
    source_code: "config/policies.yml"
    used_by_guard: []

  - name: REFERRAL_DISCOUNT_PERCENT
    property_type: policy
    description: 추천인 할인율
    value: "15 percent"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [coupon_referral_guard]

  - name: NOSHOW_TIMEOUT_MINUTES
    property_type: policy
    description: 미참석 판정 시간. CONFIRMED 상태에서 이 시간 초과 미접속 시 NO_SHOW 처리
    value: "10 minutes"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [noshow_timeout_guard]

  - name: MAX_PAUSE_COUNT
    property_type: policy
    description: 구독 계약당 최대 일시 정지 허용 횟수
    value: "2 count"
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: [contract_pause_guard]

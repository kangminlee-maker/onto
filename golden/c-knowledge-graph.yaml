---
# EduConnect — Knowledge Graph 온톨로지
# canonical.yaml을 Entity, Relation, Property 구조로 변환
# 주의: 가상 도메인이며 실제 서비스와 무관합니다

meta:
  schema: Knowledge Graph
  domain: EduConnect
  version: 1
  source: golden/canonical.yaml
  created: 2026-03-26

# ============================================================
# ENTITIES — domain_object (15개)
# ============================================================
entities:
  # --- domain_object ---
  - name: Student
    entity_type: domain_object
    domain: account
    description: 수강생. 플랫폼의 주요 사용자
    normalization_status: normalized
    db_table: users
    code_mapping:
      canonical: Student
      code_entity: User
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: email
        type: string
        required: true
        description: 이메일 (로그인 ID)
      - name: name
        type: string
        required: true
        description: 표시 이름
      - name: phone
        type: string
        required: false
        description: 전화번호
      - name: language
        type: enum
        required: true
        description: 학습 대상 언어
        enum_values: [EN, JP, KR, CN]
      - name: timezone
        type: string
        required: true
        description: 시간대 (IANA)
      - name: registered_at
        type: datetime
        required: true
        description: 가입일시
      - name: is_active
        type: boolean
        required: true
        description: 활성 여부

  - name: Instructor
    entity_type: domain_object
    domain: account
    description: 강사. 수업을 진행하는 교육자
    normalization_status: normalized
    db_table: instructors
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 표시 이름
      - name: email
        type: string
        required: true
        description: 이메일
      - name: tier
        type: enum
        required: true
        description: 강사 등급
        enum_values: [STANDARD, PREMIUM, ELITE]
      - name: language
        type: enum
        required: true
        description: 교육 가능 언어
        enum_values: [EN, JP, KR, CN]
      - name: bio
        type: text
        required: false
        description: 자기소개
      - name: rating
        type: decimal
        required: false
        description: 평균 평점 (1.0~5.0)
      - name: is_available
        type: boolean
        required: true
        description: 현재 활동 가능 여부

  - name: Session
    entity_type: domain_object
    domain: session
    description: 수업 세션. 학생과 강사 간 1:1 수업 단위
    normalization_status: normalized
    db_table: sessions
    code_mapping:
      canonical: Session
      code_entity: Lesson
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: instructor_id
        type: bigint
        required: false
        description: 강사 FK (PENDING 시 null)
      - name: course_id
        type: bigint
        required: true
        description: 교육 과정 FK
      - name: credit_id
        type: bigint
        required: false
        description: 사용된 수업권 FK
      - name: status
        type: enum
        required: true
        description: 세션 상태
        enum_values: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      - name: scheduled_at
        type: datetime
        required: true
        description: 예정 시각
      - name: started_at
        type: datetime
        required: false
        description: 실제 시작 시각
      - name: ended_at
        type: datetime
        required: false
        description: 실제 종료 시각
      - name: reschedule_count
        type: integer
        required: true
        description: 일정 변경 횟수
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: 강사 배정 및 수업권 차감
          side_effects: [Credit 차감, 학생/강사 알림 발송]
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: 수업 시작 시각 도달
          side_effects: [WebRTC 세션 생성]
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: 수업 정상 종료
          side_effects: [Assessment QUEUED 생성, 수업 완료 알림]
        - from: CONFIRMED
          to: CANCELLED
          trigger: 학생 또는 강사 취소
          guard: ["CANCELLATION_DEADLINE_HOURS(4)시간 전이면 무료 취소"]
          side_effects: [Credit 복원, 취소 알림 발송]
        - from: CONFIRMED
          to: NO_SHOW
          trigger: 접속 없이 10분 초과
          guard: ["NOSHOW_TIMEOUT_MINUTES=10"]
          side_effects: [미참석 알림 발송]

  - name: Course
    entity_type: domain_object
    domain: session
    description: 교육 과정. 수업의 카테고리 및 커리큘럼 정의
    normalization_status: normalized
    db_table: courses
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 과정명
      - name: category
        type: enum
        required: true
        description: 과정 분류
        enum_values: [BASIC_CONVERSATION, BUSINESS, EXAM_PREP, FREE_TALK]
      - name: language
        type: enum
        required: true
        description: 대상 언어
        enum_values: [EN, JP, KR, CN]
      - name: description
        type: text
        required: false
        description: 과정 설명
      - name: level
        type: integer
        required: true
        description: 난이도 (1~10)
      - name: is_active
        type: boolean
        required: true
        description: 활성 여부

  - name: Credit
    entity_type: domain_object
    domain: billing
    description: 수업권. 분/횟수 이중 추적으로 수업 이용 가능 단위를 관리
    normalization_status: normalized
    db_table: credits
    code_mapping:
      canonical: Credit
      code_entity: Ticket
      legacy_aliases: [Token, Point]
      fk_variants: [credit_id, ticket_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: payment_id
        type: bigint
        required: false
        description: 결제 FK (체험권은 null)
      - name: contract_id
        type: bigint
        required: false
        description: 구독 계약 FK
      - name: total_count
        type: integer
        required: true
        description: 발급된 총 횟수
      - name: used_count
        type: integer
        required: true
        description: 사용된 횟수
      - name: total_minutes
        type: integer
        required: true
        description: 발급된 총 분수
      - name: used_minutes
        type: integer
        required: true
        description: 사용된 분수
      - name: expires_at
        type: datetime
        required: true
        description: 만료일시
      - name: issued_at
        type: datetime
        required: true
        description: 발급일시

  - name: Subscription
    entity_type: domain_object
    domain: billing
    description: 구독 상품 정의. 가격, 포함 크레딧 등 상품 템플릿
    normalization_status: normalized
    db_table: subscriptions
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 상품명
      - name: price
        type: decimal
        required: true
        description: 월 가격
      - name: credit_count
        type: integer
        required: true
        description: 포함 수업 횟수
      - name: credit_minutes
        type: integer
        required: true
        description: 포함 수업 분수
      - name: duration_days
        type: integer
        required: true
        description: 구독 기간 (일)
      - name: is_active
        type: boolean
        required: true
        description: 현재 판매 중 여부

  - name: Contract
    entity_type: domain_object
    domain: billing
    description: 구독 계약. 학생이 특정 구독 상품에 가입한 계약 인스턴스
    normalization_status: normalized
    db_table: contracts
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: subscription_id
        type: bigint
        required: true
        description: 구독 상품 FK
      - name: card_id
        type: bigint
        required: false
        description: 결제 카드 FK
      - name: status
        type: enum
        required: true
        description: 계약 상태
        enum_values: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      - name: started_at
        type: datetime
        required: true
        description: 계약 시작일
      - name: expires_at
        type: datetime
        required: true
        description: 계약 만료일
      - name: next_billing_at
        type: datetime
        required: false
        description: 다음 결제일
      - name: pause_count
        type: integer
        required: true
        description: 일시 정지 횟수
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: 첫 결제 처리 완료
          side_effects: [Credit 발급, 활성화 알림]
        - from: ACTIVE
          to: PAUSED
          trigger: 학생 일시 정지 요청
          guard: ["MAX_PAUSE_COUNT=2"]
          side_effects: [다음 결제일 연기, 정지 알림]
        - from: PAUSED
          to: ACTIVE
          trigger: 재개 요청
          side_effects: [다음 결제일 재계산, 재개 알림]
        - from: ACTIVE
          to: EXPIRED
          trigger: 기간 만료, 갱신 없음
          side_effects: [만기 알림]
        - from: ACTIVE
          to: CANCELLED
          trigger: 학생 해지 요청
          side_effects: [비례 환불 계산, 해지 알림]
        - from: CANCELLED
          to: TERMINATED
          trigger: 환불 처리 완료
          guard: ["30일 보존 기간 후 종료"]
          side_effects: [데이터 보존 마킹]

  - name: Payment
    entity_type: domain_object
    domain: billing
    description: 결제. PG 연동을 통한 결제 트랜잭션
    normalization_status: normalized
    db_table: payments
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: contract_id
        type: bigint
        required: false
        description: 구독 계약 FK
      - name: amount
        type: decimal
        required: true
        description: 결제 금액
      - name: discount_amount
        type: decimal
        required: true
        description: 할인 금액
      - name: method
        type: enum
        required: true
        description: 결제 수단
        enum_values: [CREDIT_CARD, BANK_TRANSFER, MOBILE_PAY]
      - name: status
        type: enum
        required: true
        description: 결제 상태
        enum_values: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      - name: pg_transaction_id
        type: string
        required: false
        description: PG사 거래 ID
      - name: created_at
        type: datetime
        required: true
        description: 결제 생성일시
      - name: captured_at
        type: datetime
        required: false
        description: 정산 확정일시
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG 인증 성공
          side_effects: [PG사 인증 토큰 저장]
        - from: AUTHORIZED
          to: CAPTURED
          trigger: 정산 확정
          side_effects: [Credit 발급 트리거, Contract 활성화 트리거, 결제 완료 알림]
        - from: CAPTURED
          to: REFUNDED
          trigger: 전액 환불 요청
          side_effects: [PG사 환불 API 호출, Credit 회수, 환불 알림]
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: 부분 환불 요청
          side_effects: [PG사 부분 환불 API 호출, 부분 환불 알림]
        - from: AUTHORIZED
          to: FAILED
          trigger: PG 인증 실패
          side_effects: [결제 실패 알림]

  - name: PaymentCard
    entity_type: domain_object
    domain: billing
    description: 등록 카드. 학생이 등록한 결제 카드 정보
    normalization_status: normalized
    db_table: payment_cards
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: card_number_masked
        type: string
        required: true
        description: 마스킹된 카드 번호
      - name: card_brand
        type: string
        required: true
        description: 카드 브랜드 (VISA, MASTER 등)
      - name: billing_key
        type: string
        required: true
        description: PG사 빌링키
      - name: is_default
        type: boolean
        required: true
        description: 기본 결제 수단 여부
      - name: registered_at
        type: datetime
        required: true
        description: 등록일시

  - name: Coupon
    entity_type: domain_object
    domain: promotion
    description: 발행된 쿠폰. 특정 학생에게 발급된 쿠폰 인스턴스
    normalization_status: normalized
    db_table: coupons
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: template_id
        type: bigint
        required: true
        description: 쿠폰 정의 FK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: payment_id
        type: bigint
        required: false
        description: 사용된 결제 FK (미사용 시 null)
      - name: code
        type: string
        required: true
        description: 쿠폰 코드
      - name: is_used
        type: boolean
        required: true
        description: 사용 여부
      - name: issued_at
        type: datetime
        required: true
        description: 발급일시
      - name: expires_at
        type: datetime
        required: true
        description: 만료일시

  - name: CouponTemplate
    entity_type: domain_object
    domain: promotion
    description: 쿠폰 정의. 쿠폰의 유형, 할인 규칙 등 템플릿
    normalization_status: normalized
    db_table: coupon_templates
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 쿠폰 이름
      - name: category
        type: enum
        required: true
        description: 쿠폰 분류
        enum_values: [WELCOME, REFERRAL, SEASONAL, LOYALTY, RECOVERY]
      - name: discount_type
        type: enum
        required: true
        description: 할인 유형
        enum_values: [PERCENTAGE, FIXED_AMOUNT]
      - name: discount_value
        type: decimal
        required: true
        description: 할인 값 (비율이면 %, 정액이면 원)
      - name: min_purchase_amount
        type: decimal
        required: false
        description: 최소 결제 금액
      - name: max_issue_count
        type: integer
        required: false
        description: 최대 발급 수
      - name: is_active
        type: boolean
        required: true
        description: 활성 여부

  - name: Assessment
    entity_type: domain_object
    domain: assessment
    description: AI 학습 평가. 수업 완료 후 자동 생성되는 AI 기반 평가 리포트
    normalization_status: normalized
    db_table: assessments
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: 수업 세션 FK
      - name: stage
        type: enum
        required: true
        description: 처리 단계
        enum_values: [QUEUED, TRANSCRIBING, ANALYZING, COMPLETE, ERROR]
      - name: transcript
        type: text
        required: false
        description: 수업 전사 텍스트
      - name: score
        type: decimal
        required: false
        description: 종합 점수 (0~100)
      - name: feedback
        type: text
        required: false
        description: AI 피드백 내용
      - name: created_at
        type: datetime
        required: true
        description: 생성일시
      - name: completed_at
        type: datetime
        required: false
        description: 평가 완료일시

  - name: Booking
    entity_type: domain_object
    domain: session
    description: 예약 스케줄. 세션과 가용 시간대를 연결하는 예약 레코드
    normalization_status: normalized
    db_table: bookings
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: 수업 세션 FK
      - name: slot_id
        type: bigint
        required: true
        description: 가용 시간대 FK
      - name: booked_at
        type: datetime
        required: true
        description: 예약일시
      - name: cancelled_at
        type: datetime
        required: false
        description: 취소일시

  - name: AvailabilitySlot
    entity_type: domain_object
    domain: session
    description: 강사 가용 시간대. 강사가 수업 가능한 시간 구간
    normalization_status: normalized
    db_table: availability_slots
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: instructor_id
        type: bigint
        required: true
        description: 강사 FK
      - name: start_time
        type: datetime
        required: true
        description: 시작 시각
      - name: end_time
        type: datetime
        required: true
        description: 종료 시각
      - name: is_booked
        type: boolean
        required: true
        description: 예약 점유 여부
      - name: day_of_week
        type: integer
        required: true
        description: 요일 (1=월 ~ 7=일)

  - name: Notification
    entity_type: domain_object
    domain: notification
    description: 알림. 시스템에서 사용자에게 전달하는 알림 메시지
    normalization_status: normalized
    db_table: notifications
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: recipient_id
        type: bigint
        required: true
        description: 수신자 FK (학생 또는 강사)
      - name: recipient_type
        type: string
        required: true
        description: "수신자 유형 (Student | Instructor)"
      - name: title
        type: string
        required: true
        description: 알림 제목
      - name: body
        type: text
        required: true
        description: 알림 내용
      - name: channel
        type: string
        required: true
        description: "채널 (PUSH | EMAIL | SMS)"
      - name: is_read
        type: boolean
        required: true
        description: 읽음 여부
      - name: sent_at
        type: datetime
        required: true
        description: 발송일시

  # --- enum entities (10개) ---
  - name: Language
    entity_type: enum
    domain: shared
    description: 지원 언어
    values:
      - value: EN
        description: 영어
      - value: JP
        description: 일본어
      - value: KR
        description: 한국어
      - value: CN
        description: 중국어

  - name: SessionStatus
    entity_type: enum
    domain: session
    description: 수업 세션 상태
    values:
      - value: PENDING
        description: 대기 중
      - value: CONFIRMED
        description: 확정됨
      - value: IN_PROGRESS
        description: 진행 중
      - value: COMPLETED
        description: 정상 종료
      - value: CANCELLED

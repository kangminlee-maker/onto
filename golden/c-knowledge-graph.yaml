# ============================================================
# ENTITIES — flow (5건)
# ============================================================
  - name: SessionBookingFlow
    entity_type: flow
    domain: session
    description: 학생이 수업을 예약하는 전체 흐름
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Student, Credit, Instructor, AvailabilitySlot, Booking, Session]"
      - name: external_dependencies
        type: list
        required: false
        description: "[WebRTC 서버]"
      - name: steps
        type: list
        required: true
        description: "Credit 잔여 확인 → 시간대 선택 → 강사 매칭 → Booking 생성 → Session 생성"

  - name: PaymentFlow
    entity_type: flow
    domain: billing
    description: 구독 상품 결제부터 수업권 발급까지의 흐름
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Student, Payment, PaymentCard, Coupon, Credit, Contract, Subscription]"
      - name: external_dependencies
        type: list
        required: false
        description: "[PG사 결제 API]"
      - name: steps
        type: list
        required: true
        description: "상품 선택/쿠폰 적용 → Payment INITIATED → PG 인증 → 정산 확정 → Credit 발급 → Contract 활성화"

  - name: SubscriptionRenewalFlow
    entity_type: flow
    domain: billing
    description: 구독 자동 갱신 흐름
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Contract, Payment, PaymentCard, Credit, Subscription]"
      - name: external_dependencies
        type: list
        required: false
        description: "[PG사 정기 결제 API]"
      - name: steps
        type: list
        required: true
        description: "만기 도래 확인 → 자동 결제 → Credit 발급 → 다음 결제일 갱신"

  - name: SessionCompletionFlow
    entity_type: flow
    domain: session
    description: 수업 종료 후 평가 및 알림까지의 흐름
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Session, Assessment, Notification, Student, Instructor]"
      - name: external_dependencies
        type: list
        required: false
        description: "[AI 분석 서비스 (STT, NLP)]"
      - name: steps
        type: list
        required: true
        description: "수업 종료 → Assessment 생성 → 음성 전사 → 리포트 생성 → 알림 발송"

  - name: NewStudentOnboardingFlow
    entity_type: flow
    domain: account
    description: 신규 학생 가입부터 첫 수업 예약까지의 온보딩 흐름
    properties:
      - name: involved_entities
        type: list
        required: true
        description: "[Student, Credit, Coupon, CouponTemplate, Booking, Session]"
      - name: external_dependencies
        type: list
        required: false
        description: "[]"
      - name: steps
        type: list
        required: true
        description: "회원가입 → 체험 Credit 발급 → Welcome 쿠폰 발급 → 첫 수업 예약 → 온보딩 완료 알림"

# ============================================================
# RELATIONS (40개)
# ============================================================
relations:
  - from: Student
    to: Session
    type: has_many
    name: 수강
    cardinality: "1:N"
    fk_column: sessions.student_id

  - from: Instructor
    to: Session
    type: has_many
    name: 진행
    cardinality: "1:N"
    fk_column: sessions.instructor_id

  - from: Session
    to: Course
    type: belongs_to
    name: 소속
    cardinality: "N:1"
    fk_column: sessions.course_id

  - from: Session
    to: Credit
    type: belongs_to
    name: 사용
    cardinality: "N:1"
    fk_column: sessions.credit_id

  - from: Student
    to: Credit
    type: has_many
    name: 보유
    cardinality: "1:N"
    fk_column: credits.student_id

  - from: Credit
    to: Payment
    type: belongs_to
    name: 구매
    cardinality: "N:1"
    fk_column: credits.payment_id

  - from: Credit
    to: Contract
    type: belongs_to
    name: 발급
    cardinality: "N:1"
    fk_column: credits.contract_id

  - from: Student
    to: Contract
    type: has_many
    name: 계약
    cardinality: "1:N"
    fk_column: contracts.student_id

  - from: Contract
    to: Subscription
    type: belongs_to
    name: 기반
    cardinality: "N:1"
    fk_column: contracts.subscription_id

  - from: Contract
    to: PaymentCard
    type: belongs_to
    name: 결제수단
    cardinality: "N:1"
    fk_column: contracts.card_id

  - from: Student
    to: PaymentCard
    type: has_many
    name: 등록
    cardinality: "1:N"
    fk_column: payment_cards.student_id

  - from: Student
    to: Payment
    type: has_many
    name: 결제
    cardinality: "1:N"
    fk_column: payments.student_id

  - from: Payment
    to: Contract
    type: belongs_to
    name: 계약
    cardinality: "N:1"
    fk_column: payments.contract_id

  - from: Contract
    to: Payment
    type: has_many
    name: 결제내역
    cardinality: "1:N"
    fk_column: payments.contract_id

  - from: Coupon
    to: CouponTemplate
    type: belongs_to
    name: 정의
    cardinality: "N:1"
    fk_column: coupons.template_id

  - from: Coupon
    to: Student
    type: belongs_to
    name: 대상자
    cardinality: "N:1"
    fk_column: coupons.student_id

  - from: Student
    to: Coupon
    type: has_many
    name: 보유쿠폰
    cardinality: "1:N"
    fk_column: coupons.student_id

  - from: Coupon
    to: Payment
    type: belongs_to
    name: 적용
    cardinality: "N:1"
    fk_column: coupons.payment_id

  - from: Session
    to: Assessment
    type: has_one
    name: 평가
    cardinality: "1:1"
    fk_column: assessments.session_id

  - from: Session
    to: Booking
    type: has_one
    name: 예약
    cardinality: "1:1"
    fk_column: bookings.session_id

  - from: Instructor
    to: AvailabilitySlot
    type: has_many
    name: 가용
    cardinality: "1:N"
    fk_column: availability_slots.instructor_id

  - from: Booking
    to: AvailabilitySlot
    type: belongs_to
    name: 점유
    cardinality: "N:1"
    fk_column: bookings.slot_id

  - from: Student
    to: Notification
    type: has_many
    name: 수신
    cardinality: "1:N"
    fk_column: "notifications.recipient_id (recipient_type=Student)"

  - from: Instructor
    to: Notification
    type: has_many
    name: 수신
    cardinality: "1:N"
    fk_column: "notifications.recipient_id (recipient_type=Instructor)"

  - from: Session
    to: Student
    type: belongs_to
    name: 수강생
    cardinality: "N:1"
    fk_column: sessions.student_id

  - from: Session
    to: Instructor

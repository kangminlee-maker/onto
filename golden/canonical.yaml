    domain: billing
    actor: admin
    target_entities: [Payment, Credit]
    preconditions:
      - check: "Payment 상태가 CAPTURED"
        policy_ref: null
    results:
      - Payment REFUNDED
      - Credit 회수
    state_transitions:
      - "Payment: CAPTURED → REFUNDED"
    side_effects:
      - PG사 환불 API 호출
      - 환불 알림
    source_code: "PaymentProcessor.refund()"

  - id: cmd_retry_payment
    name: RetryPayment
    display_name: 결제 재시도
    domain: billing
    actor: student
    target_entities: [Payment]
    preconditions:
      - check: "이전 Payment가 FAILED 상태"
        policy_ref: null
    results:
      - 새 Payment 생성 (INITIATED)
    state_transitions:
      - "Payment: → INITIATED"
    side_effects:
      - PG사 결제 재요청
    source_code: "PaymentProcessor.retry()"

  # SUBSCRIPTION
  - id: cmd_create_contract
    name: CreateContract
    display_name: 구독 계약 생성
    domain: billing
    actor: student
    target_entities: [Contract, Payment]
    preconditions:
      - check: "선택한 Subscription이 활성 상태"

    db_table: bookings
    domain: session
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: session_id
        type: bigint
        nullable: false
        description: 수업 세션 FK
      - name: slot_id
        type: bigint
        nullable: false
        description: 가용 시간대 FK
      - name: booked_at
        type: datetime
        nullable: false

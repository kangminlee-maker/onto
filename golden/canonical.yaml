        type: string
        nullable: false
        description: 알림 제목
      - name: body
        type: text
        nullable: false
        description: 알림 내용
      - name: channel
        type: string
        nullable: false
        description: "채널 (PUSH | EMAIL | SMS)"
      - name: is_read
        type: boolean
        nullable: false
        description: 읽음 여부
      - name: sent_at
        type: datetime
        nullable: false
        description: 발송일시

# ============================================================
# POLICY CONSTANTS (5개)
# ============================================================
policy_constants:
  - id: CANCELLATION_DEADLINE_HOURS
    value: 4
    unit: hours
    description: 수업 시작 전 무료 취소 가능 시간
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard:
      - session_cancel_guard

  - id: SESSION_DURATION_MINUTES
    value: 30
    unit: minutes
    description: 1회 수업 기본 시간
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard: []

  - id: MAX_RESCHEDULE_COUNT
    value: 2
    unit: count
    description: 세션당 최대 일정 변경 횟수
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard:
      - session_reschedule_guard

  - id: TRIAL_CREDIT_COUNT
    value: 1
    unit: count
    description: 체험 수업 무료 제공 횟수
    changeable: false
    source_code: "config/policies.yml"
    used_by_guard: []

  - id: REFERRAL_DISCOUNT_PERCENT
    value: 15
    unit: percent
    description: 추천인 할인율
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard:
      - coupon_referral_guard

  - id: NOSHOW_TIMEOUT_MINUTES
    value: 10
    unit: minutes
    description: 미참석 판정 시간. CONFIRMED 상태에서 이 시간 초과 미접속 시 NO_SHOW 처리
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard:
      - noshow_timeout_guard

  - id: MAX_PAUSE_COUNT
    value: 2
    unit: count
    description: 구독 계약당 최대 일시 정지 허용 횟수
    changeable: true
    source_code: "config/policies.yml"
    used_by_guard:
      - contract_pause_guard

# ============================================================
# CROSS-ENTITY GUARDS
# ============================================================
cross_entity_guards:
  - id: session_cancel_guard
    source_entity: Session
    target_entity: Credit
    target_transition: "Session.CONFIRMED → CANCELLED"
    check: "현재 시각이 scheduled_at - CANCELLATION_DEADLINE_HOURS 이전인지 확인"
    description: 취소 무료 기한 내 여부에 따라 Credit 복원 여부 결정
    source_code: "SessionGateway.validateCancellation()"

  - id: session_reschedule_guard
    source_entity: Session
    target_entity: Session
    target_transition: "Session.CONFIRMED → CONFIRMED (reschedule)"
    check: "reschedule_count < MAX_RESCHEDULE_COUNT"
    description: 최대 일정 변경 횟수 초과 검증
    source_code: "SessionGateway.validateReschedule()"

  - id: contract_pause_guard
    source_entity: Contract
    target_entity: Contract
    target_transition: "Contract.ACTIVE → PAUSED"
    check: "pause_count < MAX_PAUSE_COUNT(2)"
    description: 최대 일시 정지 횟수 초과 검증
    source_code: "ContractService.validatePause()"

  - id: noshow_timeout_guard
    source_entity: Session
    target_entity: Session
    target_transition: "Session.CONFIRMED → NO_SHOW"
    check: "접속 없이 NOSHOW_TIMEOUT_MINUTES(10)분 초과"
    description: 미참석 판정 시간 초과 검증
    source_code: "SessionGateway.checkNoShowTimeout()"

  - id: coupon_referral_guard
    source_entity: Coupon
    target_entity: Payment
    target_transition: null
    check: "REFERRAL 카테고리 쿠폰의 할인율이 REFERRAL_DISCOUNT_PERCENT 이내"
    description: 추천인 할인율 상한 검증
    source_code: "CouponService.validateReferralDiscount()"

# ============================================================
# COMMANDS (20개)
# ============================================================
commands:
  # AUTH

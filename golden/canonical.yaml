---
# EduConnect 온라인 교육 플랫폼 — Canonical Ontology
# 스키마 중립 형태의 범용 golden example
# 주의: 가상 도메인이며 실제 서비스와 무관합니다

meta:
  domain: EduConnect
  description: 1:1 온라인 교육 플랫폼. 학생-강사 매칭, 수업 세션, 구독/결제, AI 평가를 지원
  version: 1
  created: 2026-03-26

# ============================================================
# ENUMS (10개)
# ============================================================
enums:
  - name: Language
    description: 지원 언어
    values:
      - value: EN
        description: 영어
      - value: JP
        description: 일본어
      - value: KR
        description: 한국어
      - value: CN
        description: 중국어

  - name: SessionStatus
    description: 수업 세션 상태
    values:
      - value: PENDING
        description: 대기 중 (강사 미배정)
      - value: CONFIRMED
        description: 확정됨 (강사 배정, 수업권 차감 완료)
      - value: IN_PROGRESS
        description: 수업 진행 중
      - value: COMPLETED
        description: 수업 정상 종료
      - value: CANCELLED
        description: 취소됨 (수업권 복원)
      - value: NO_SHOW
        description: 미참석 (10분 초과 미접속)

  - name: InstructorTier
    description: 강사 등급
    values:
      - value: STANDARD
        description: 일반 강사
      - value: PREMIUM
        description: 상급 강사
      - value: ELITE
        description: 최상급 강사

  - name: PaymentMethod
    description: 결제 수단
    values:
      - value: CREDIT_CARD
        description: 신용카드
      - value: BANK_TRANSFER
        description: 계좌이체
      - value: MOBILE_PAY
        description: 모바일 결제

  - name: PaymentStatus
    description: 결제 상태
    values:
      - value: INITIATED
        description: 결제 시작
      - value: AUTHORIZED
        description: PG 인증 완료
      - value: CAPTURED
        description: 정산 확정
      - value: FAILED
        description: PG 인증 실패
      - value: REFUNDED
        description: 전액 환불
      - value: PARTIALLY_REFUNDED
        description: 부분 환불

  - name: ContractStatus
    description: 구독 계약 상태
    values:
      - value: TRIAL
        description: 체험 기간
      - value: ACTIVE
        description: 활성
      - value: PAUSED
        description: 일시 정지 (최대 2회)
      - value: EXPIRED
        description: 만료 (갱신 없음)
      - value: CANCELLED
        description: 해지 (비례 환불)
      - value: TERMINATED
        description: 종료 (환불 처리 완료, 30일 보존)

  - name: CouponCategory
    description: 쿠폰 분류
    values:
      - value: WELCOME
        description: 가입 환영
      - value: REFERRAL
        description: 추천인
      - value: SEASONAL
        description: 시즌 이벤트
      - value: LOYALTY
        description: 장기 이용
      - value: RECOVERY
        description: 이탈 방지

  - name: DiscountType
    description: 할인 유형
    values:
      - value: PERCENTAGE
        description: 비율 할인
      - value: FIXED_AMOUNT
        description: 정액 할인

  - name: AssessmentStage
    description: AI 평가 처리 단계
    values:
      - value: QUEUED
        description: 대기열
      - value: TRANSCRIBING
        description: 음성 → 텍스트 변환 중
      - value: ANALYZING
        description: 분석 중
      - value: COMPLETE
        description: 완료
      - value: ERROR
        description: 오류 발생

  - name: CourseCategory
    description: 교육 과정 분류
    values:
      - value: BASIC_CONVERSATION
        description: 기초 회화
      - value: BUSINESS
        description: 비즈니스
      - value: EXAM_PREP
        description: 시험 대비
      - value: FREE_TALK
        description: 자유 회화

# ============================================================
# ENTITIES (15개)
# ============================================================
entities:
  - name: Student
    description: 수강생. 플랫폼의 주요 사용자
    db_table: users
    domain: account
    code_mapping:
      canonical: Student
      code_entity: User
      db_table: users
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: email
        type: string
        nullable: false
        description: 이메일 (로그인 ID)
      - name: name
        type: string
        nullable: false
        description: 표시 이름
      - name: phone
        type: string
        nullable: true
        description: 전화번호
      - name: language
        type: enum
        nullable: false
        description: 학습 대상 언어
        enum_ref: Language
      - name: timezone
        type: string
        nullable: false
        description: 시간대 (IANA)
      - name: registered_at
        type: datetime
        nullable: false
        description: 가입일시
      - name: is_active
        type: boolean
        nullable: false
        description: 활성 여부

  - name: Instructor
    description: 강사. 수업을 진행하는 교육자
    db_table: instructors
    domain: account
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      db_table: instructors
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: 표시 이름
      - name: email
        type: string
        nullable: false
        description: 이메일
      - name: tier
        type: enum
        nullable: false
        description: 강사 등급
        enum_ref: InstructorTier
      - name: language
        type: enum
        nullable: false
        description: 교육 가능 언어
        enum_ref: Language
      - name: bio
        type: text
        nullable: true
        description: 자기소개
      - name: rating
        type: decimal
        nullable: true
        description: 평균 평점 (1.0~5.0)
      - name: is_available
        type: boolean
        nullable: false
        description: 현재 활동 가능 여부

  - name: Session
    description: 수업 세션. 학생과 강사 간 1:1 수업 단위
    db_table: sessions
    domain: session
    code_mapping:
      canonical: Session
      code_entity: Lesson
      db_table: lessons
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: instructor_id
        type: bigint
        nullable: true
        description: 강사 FK (PENDING 시 null)
      - name: course_id
        type: bigint
        nullable: false
        description: 교육 과정 FK
      - name: credit_id
        type: bigint
        nullable: true
        description: 사용된 수업권 FK
      - name: status
        type: enum
        nullable: false
        description: 세션 상태
        enum_ref: SessionStatus
      - name: scheduled_at
        type: datetime
        nullable: false
        description: 예정 시각
      - name: started_at
        type: datetime
        nullable: true
        description: 실제 시작 시각
      - name: ended_at
        type: datetime
        nullable: true
        description: 실제 종료 시각
      - name: reschedule_count
        type: integer
        nullable: false
        description: 일정 변경 횟수
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: 강사 배정 및 수업권 차감
          guard: null
          side_effects:
            - Credit 차감
            - 학생/강사 알림 발송
          source_code: "SessionGateway.confirmSession()"
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: 수업 시작 시각 도달
          guard: null
          side_effects:
            - WebRTC 세션 생성
          source_code: "SessionGateway.startSession()"
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: 수업 정상 종료
          guard: null
          side_effects:
            - Assessment QUEUED 생성
            - 수업 완료 알림
          source_code: "SessionGateway.completeSession()"
        - from: CONFIRMED
          to: CANCELLED
          trigger: 학생 또는 강사 취소
          guard:
            - "취소 시점이 수업 시작 CANCELLATION_DEADLINE_HOURS(4)시간 전이면 무료 취소"
          side_effects:
            - Credit 복원
            - 취소 알림 발송
          source_code: "SessionGateway.cancelSession()"
        - from: CONFIRMED
          to: NO_SHOW
          trigger: 접속 없이 NOSHOW_TIMEOUT_MINUTES(10)분 초과
          guard:
            - "NOSHOW_TIMEOUT_MINUTES=10"
          side_effects:
            - 미참석 알림 발송
            - Credit 미복원 (정책에 따라 다름)
          source_code: "SessionGateway.markNoShow()"

  - name: Course
    description: 교육 과정. 수업의 카테고리 및 커리큘럼 정의
    db_table: courses
    domain: session
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: 과정명
      - name: category
        type: enum
        nullable: false
        description: 과정 분류
        enum_ref: CourseCategory
      - name: language
        type: enum
        nullable: false
        description: 대상 언어
        enum_ref: Language
      - name: description
        type: text
        nullable: true
        description: 과정 설명
      - name: level
        type: integer
        nullable: false
        description: 난이도 (1~10)
      - name: is_active
        type: boolean
        nullable: false
        description: 활성 여부

  - name: Credit
    description: 수업권. 분/횟수 이중 추적으로 수업 이용 가능 단위를 관리
    db_table: credits
    domain: billing
    code_mapping:
      canonical: Credit
      code_entity: Ticket
      db_table: credits
      legacy_aliases: [Token, Point]
      fk_variants: [credit_id, ticket_id]
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: payment_id
        type: bigint
        nullable: true
        description: 결제 FK (체험권은 null)
      - name: contract_id
        type: bigint
        nullable: true
        description: 구독 계약 FK
      - name: total_count
        type: integer
        nullable: false
        description: 발급된 총 횟수
      - name: used_count
        type: integer
        nullable: false
        description: 사용된 횟수
      - name: total_minutes
        type: integer
        nullable: false
        description: 발급된 총 분수
      - name: used_minutes
        type: integer
        nullable: false
        description: 사용된 분수
      - name: expires_at
        type: datetime
        nullable: false
        description: 만료일시
      - name: issued_at
        type: datetime
        nullable: false
        description: 발급일시

  - name: Subscription
    description: 구독 상품 정의. 가격, 포함 크레딧 등 상품 템플릿
    db_table: subscriptions
    domain: billing
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: 상품명
      - name: price
        type: decimal
        nullable: false
        description: 월 가격
      - name: credit_count
        type: integer
        nullable: false
        description: 포함 수업 횟수
      - name: credit_minutes
        type: integer
        nullable: false
        description: 포함 수업 분수
      - name: duration_days
        type: integer
        nullable: false
        description: 구독 기간 (일)
      - name: is_active
        type: boolean
        nullable: false
        description: 현재 판매 중 여부

  - name: Contract
    description: 구독 계약. 학생이 특정 구독 상품에 가입한 계약 인스턴스
    db_table: contracts
    domain: billing
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      db_table: contracts
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: subscription_id
        type: bigint
        nullable: false
        description: 구독 상품 FK
      - name: card_id
        type: bigint
        nullable: true
        description: 결제 카드 FK
      - name: status
        type: enum
        nullable: false
        description: 계약 상태
        enum_ref: ContractStatus
      - name: started_at
        type: datetime
        nullable: false
        description: 계약 시작일
      - name: expires_at
        type: datetime
        nullable: false
        description: 계약 만료일
      - name: next_billing_at
        type: datetime
        nullable: true
        description: 다음 결제일
      - name: pause_count
        type: integer
        nullable: false
        description: 일시 정지 횟수
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: 첫 결제 처리 완료
          guard: null
          side_effects:
            - Credit 발급
            - 활성화 알림
          source_code: "ContractService.activate()"
        - from: ACTIVE
          to: PAUSED
          trigger: 학생 일시 정지 요청
          guard:
            - "MAX_PAUSE_COUNT=2 (현재 pause_count < 2)"
          side_effects:
            - 다음 결제일 연기
            - 정지 알림
          source_code: "ContractService.pause()"
        - from: PAUSED
          to: ACTIVE
          trigger: 재개 요청
          guard: null
          side_effects:
            - 다음 결제일 재계산
            - 재개 알림
          source_code: "ContractService.resume()"
        - from: ACTIVE
          to: EXPIRED
          trigger: 기간 만료, 갱신 없음
          guard: null
          side_effects:
            - 만기 알림
          source_code: "ContractService.expire()"
        - from: ACTIVE
          to: CANCELLED
          trigger: 학생 해지 요청
          guard: null
          side_effects:
            - 비례 환불 계산
            - 해지 알림
          source_code: "ContractService.cancel()"
        - from: CANCELLED
          to: TERMINATED
          trigger: 환불 처리 완료
          guard:
            - "30일 보존 기간 후 종료"
          side_effects:
            - 데이터 보존 마킹
          source_code: "ContractService.terminate()"

  - name: Payment
    description: 결제. PG 연동을 통한 결제 트랜잭션
    db_table: payments
    domain: billing
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: contract_id
        type: bigint
        nullable: true
        description: 구독 계약 FK
      - name: amount
        type: decimal
        nullable: false
        description: 결제 금액
      - name: discount_amount
        type: decimal
        nullable: false
        description: 할인 금액
      - name: method
        type: enum
        nullable: false
        description: 결제 수단
        enum_ref: PaymentMethod
      - name: status
        type: enum
        nullable: false
        description: 결제 상태
        enum_ref: PaymentStatus
      - name: pg_transaction_id
        type: string
        nullable: true
        description: PG사 거래 ID
      - name: created_at
        type: datetime
        nullable: false
        description: 결제 생성일시
      - name: captured_at
        type: datetime
        nullable: true
        description: 정산 확정일시
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG 인증 성공
          guard: null
          side_effects:
            - PG사 인증 토큰 저장
          source_code: "PaymentProcessor.authorize()"
        - from: AUTHORIZED
          to: CAPTURED
          trigger: 정산 확정
          guard: null
          side_effects:
            - Credit 발급 트리거
            - Contract 활성화 트리거
            - 결제 완료 알림
          source_code: "PaymentProcessor.capture()"
        - from: CAPTURED
          to: REFUNDED
          trigger: 전액 환불 요청
          guard: null
          side_effects:
            - PG사 환불 API 호출
            - Credit 회수
            - 환불 알림
          source_code: "PaymentProcessor.refund()"
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: 부분 환불 요청
          guard: null
          side_effects:
            - PG사 부분 환불 API 호출
            - 부분 환불 알림
          source_code: "PaymentProcessor.partialRefund()"
        - from: AUTHORIZED
          to: FAILED
          trigger: PG 인증 실패
          guard: null
          side_effects:
            - 결제 실패 알림
          source_code: "PaymentProcessor.handleFailure()"

  - name: PaymentCard
    description: 등록 카드. 학생이 등록한 결제 카드 정보
    db_table: payment_cards
    domain: billing
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: card_number_masked
        type: string
        nullable: false
        description: 마스킹된 카드 번호
      - name: card_brand
        type: string
        nullable: false
        description: 카드 브랜드 (VISA, MASTER 등)
      - name: billing_key
        type: string
        nullable: false
        description: PG사 빌링키
      - name: is_default
        type: boolean
        nullable: false
        description: 기본 결제 수단 여부
      - name: registered_at
        type: datetime
        nullable: false
        description: 등록일시

  - name: Coupon
    description: 발행된 쿠폰. 특정 학생에게 발급된 쿠폰 인스턴스
    db_table: coupons
    domain: promotion
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: template_id
        type: bigint
        nullable: false
        description: 쿠폰 정의 FK
      - name: student_id
        type: bigint
        nullable: false
        description: 수강생 FK
      - name: payment_id
        type: bigint
        nullable: true
        description: 사용된 결제 FK (미사용 시 null)
      - name: code
        type: string
        nullable: false
        description: 쿠폰 코드
      - name: is_used
        type: boolean
        nullable: false
        description: 사용 여부
      - name: issued_at
        type: datetime
        nullable: false
        description: 발급일시
      - name: expires_at
        type: datetime
        nullable: false
        description: 만료일시

  - name: CouponTemplate
    description: 쿠폰 정의. 쿠폰의 유형, 할인 규칙 등 템플릿
    db_table: coupon_templates
    domain: promotion
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: name
        type: string
        nullable: false
        description: 쿠폰 이름
      - name: category
        type: enum
        nullable: false
        description: 쿠폰 분류
        enum_ref: CouponCategory
      - name: discount_type
        type: enum
        nullable: false
        description: 할인 유형
        enum_ref: DiscountType
      - name: discount_value
        type: decimal
        nullable: false
        description: 할인 값 (비율이면 %, 정액이면 원)
      - name: min_purchase_amount
        type: decimal

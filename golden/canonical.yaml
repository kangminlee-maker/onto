        policy_ref: null
    results:
      - Student 레코드 생성
      - 체험 Credit 발급 (TRIAL_CREDIT_COUNT=1)
    state_transitions: []
    side_effects:
      - 가입 환영 이메일 발송
      - Welcome 쿠폰 자동 발급
    source_code: "AuthController.register()"

  - id: cmd_login_student
    name: LoginStudent
    display_name: 학생 로그인
    domain: account
    actor: student
    target_entities: [Student]
    preconditions:
      - check: "이메일/비밀번호 일치"
        policy_ref: null
    results:
      - 인증 토큰 발급
    state_transitions: []
    side_effects: []
    source_code: "AuthController.login()"

  - id: cmd_logout_student
    name: LogoutStudent
    display_name: 학생 로그아웃
    domain: account
    actor: student
    target_entities: [Student]
    preconditions: []
    results:
      - 인증 토큰 무효화
    state_transitions: []
    side_effects: []
    source_code: "AuthController.logout()"

  - id: cmd_withdraw_student
    name: WithdrawStudent
    display_name: 학생 탈퇴
    domain: account
    actor: student
    target_entities: [Student, Contract, Credit]
    preconditions:
      - check: "활성 Contract가 없거나 해지 완료"
        policy_ref: null
    results:
      - Student 비활성화 (soft delete)
      - 잔여 Credit 소멸
    state_transitions: []
    side_effects:
      - 탈퇴 확인 이메일 발송
      - 30일 보존 스케줄링
    source_code: "AuthController.withdraw()"

  # SESSION
  - id: cmd_book_session
    name: BookSession
    display_name: 수업 예약
    domain: session
    actor: student
    target_entities: [Session, Booking, Credit, AvailabilitySlot]
    preconditions:
      - check: "사용 가능한 Credit 잔여 존재"
        policy_ref: null
      - check: "선택한 AvailabilitySlot이 미예약 상태"
        policy_ref: null
    results:
      - Session 생성 (PENDING)
      - Booking 생성
      - AvailabilitySlot 점유
    state_transitions:
      - "Session: → PENDING"
    side_effects:
      - 강사 매칭 큐 등록
    source_code: "SessionGateway.bookSession()"

  - id: cmd_cancel_session
    name: CancelSession
    display_name: 수업 취소
    domain: session
    actor: student
    target_entities: [Session, Credit, Booking]
    preconditions:
      - check: "Session 상태가 PENDING 또는 CONFIRMED"
        policy_ref: null
      - check: "취소 시점이 CANCELLATION_DEADLINE_HOURS(4) 전이면 무료"
        policy_ref: CANCELLATION_DEADLINE_HOURS
    results:
      - Session CANCELLED
      - Credit 복원 (무료 취소 시)
      - Booking 취소 처리
      - AvailabilitySlot 해제
    state_transitions:
      - "Session: CONFIRMED → CANCELLED"
    side_effects:
      - 취소 알림 발송
    source_code: "SessionGateway.cancelSession()"

  - id: cmd_complete_session
    name: CompleteSession
    display_name: 수업 완료
    domain: session
    actor: system
    target_entities: [Session, Assessment]
    preconditions:
      - check: "Session 상태가 IN_PROGRESS"
        policy_ref: null
    results:
      - Session COMPLETED
      - Assessment 생성 (QUEUED)
    state_transitions:
      - "Session: IN_PROGRESS → COMPLETED"
    side_effects:
      - AI 평가 파이프라인 트리거
      - 수업 완료 알림
    source_code: "SessionGateway.completeSession()"

  - id: cmd_reschedule_session
    name: RescheduleSession
    display_name: 수업 일정 변경
    domain: session
    actor: student
    target_entities: [Session, Booking, AvailabilitySlot]
    preconditions:
      - check: "reschedule_count < MAX_RESCHEDULE_COUNT(2)"
        policy_ref: MAX_RESCHEDULE_COUNT
      - check: "Session 상태가 CONFIRMED"
        policy_ref: null
    results:
      - 기존 Booking 취소
      - 새 Booking 생성
      - reschedule_count 증가
    state_transitions: []
    side_effects:
      - 일정 변경 알림
    source_code: "SessionGateway.rescheduleSession()"

  - id: cmd_mark_no_show
    name: MarkNoShow
    display_name: 미참석 처리
    domain: session
    actor: system
    target_entities: [Session]
    preconditions:
      - check: "CONFIRMED 상태에서 NOSHOW_TIMEOUT_MINUTES(10)분 초과"
        policy_ref: null
    results:
      - Session NO_SHOW
    state_transitions:
      - "Session: CONFIRMED → NO_SHOW"
    side_effects:
      - 미참석 알림 발송
    source_code: "SessionGateway.markNoShow()"

  # PAYMENT
  - id: cmd_initiate_payment
    name: InitiatePayment
    display_name: 결제 시작
    domain: billing
    actor: student
    target_entities: [Payment]
    preconditions:
      - check: "유효한 결제 수단 존재"
        policy_ref: null
    results:
      - Payment 생성 (INITIATED)
    state_transitions:
      - "Payment: → INITIATED"
    side_effects:
      - PG사 결제 요청
    source_code: "PaymentProcessor.initiate()"

  - id: cmd_capture_payment
    name: CapturePayment
    display_name: 결제 확정
    domain: billing
    actor: system
    target_entities: [Payment, Credit, Contract]
    preconditions:
      - check: "Payment 상태가 AUTHORIZED"
        policy_ref: null
    results:
      - Payment CAPTURED
      - Credit 발급
      - Contract 활성화 (해당 시)
    state_transitions:
      - "Payment: AUTHORIZED → CAPTURED"
    side_effects:
      - 결제 완료 알림
      - 영수증 이메일
    source_code: "PaymentProcessor.capture()"

  - id: cmd_refund_payment
    name: RefundPayment

    state_transitions:
      - "Contract: PAUSED → ACTIVE"
    side_effects:
      - 재개 알림
    source_code: "ContractService.resume()"

  - id: cmd_cancel_contract
    name: CancelContract
    display_name: 구독 해지
    domain: billing
    actor: student
    target_entities: [Contract, Payment]
    preconditions:
      - check: "Contract 상태가 ACTIVE"
        policy_ref: null
    results:
      - Contract CANCELLED

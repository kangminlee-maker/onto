# ============================================================
# DOMAIN FLOWS (5개)
# ============================================================
domain_flows:
  - name: SessionBookingFlow
    description: 학생이 수업을 예약하는 전체 흐름
    external_dependencies:
      - WebRTC 서버 (수업 시작 시)
    involved_entities: [Student, Credit, Instructor, AvailabilitySlot, Booking, Session]
    steps:
      - step: 1
        action: Credit 잔여 확인
        actor: system
        description: 학생의 사용 가능한 수업권 잔여를 확인
      - step: 2
        action: 시간대 선택
        actor: student
        description: 가용 시간대 목록에서 원하는 시간 선택
      - step: 3
        action: 강사 매칭
        actor: system
        description: 선택 시간대의 강사를 배정
      - step: 4
        action: Booking 생성
        actor: system
        description: 예약 레코드 생성 및 AvailabilitySlot 점유
      - step: 5
        action: Session 생성
        actor: system
        description: "Session(PENDING) 생성 → 강사 배정 시 CONFIRMED"

  - name: PaymentFlow
    description: 구독 상품 결제부터 수업권 발급까지의 흐름
    external_dependencies:
      - PG사 결제 API
    involved_entities: [Student, Payment, PaymentCard, Coupon, Credit, Contract, Subscription]
    steps:
      - step: 1
        action: 상품 선택 및 쿠폰 적용
        actor: student
        description: 구독 상품 선택 후 보유 쿠폰 적용
      - step: 2
        action: Payment INITIATED
        actor: system
        description: 결제 레코드 생성
      - step: 3
        action: PG 인증 요청
        actor: system
        description: PG사에 결제 인증 요청 (AUTHORIZED)
      - step: 4
        action: 정산 확정
        actor: system
        description: PG 인증 성공 시 CAPTURED
      - step: 5
        action: Credit 발급
        actor: system
        description: 구독 상품에 정의된 수업권 발급
      - step: 6
        action: Contract 활성화
        actor: system
        description: "Contract TRIAL → ACTIVE"

  - name: SubscriptionRenewalFlow
    description: 구독 자동 갱신 흐름
    external_dependencies:
      - PG사 정기 결제 API
    involved_entities: [Contract, Payment, PaymentCard, Credit, Subscription]
    steps:
      - step: 1
        action: 만기 도래 확인
        actor: system
        description: next_billing_at 도래한 Contract 검색
      - step: 2
        action: 자동 결제
        actor: system
        description: 등록 카드로 정기 결제 실행
      - step: 3
        action: Credit 발급
        actor: system
        description: 갱신 분량의 수업권 발급
      - step: 4
        action: 다음 결제일 갱신
        actor: system
        description: next_billing_at 업데이트

  - name: SessionCompletionFlow
    description: 수업 종료 후 평가 및 알림까지의 흐름
    external_dependencies:
      - AI 분석 서비스 (STT, NLP)
    involved_entities: [Session, Assessment, Notification, Student, Instructor]
    steps:
      - step: 1
        action: 수업 종료
        actor: system
        description: "Session IN_PROGRESS → COMPLETED"
      - step: 2
        action: Assessment 생성
        actor: system
        description: Assessment(QUEUED) 생성 및 AI 파이프라인 트리거
      - step: 3
        action: 음성 전사
        actor: system
        description: "QUEUED → TRANSCRIBING → ANALYZING"
      - step: 4
        action: 리포트 생성
        actor: system
        description: "ANALYZING → COMPLETE, 점수 및 피드백 기록"
      - step: 5
        action: 알림 발송
        actor: system
        description: 학생에게 평가 완료 알림

  - name: NewStudentOnboardingFlow
    description: 신규 학생 가입부터 첫 수업 예약까지의 온보딩 흐름
    external_dependencies: []
    involved_entities: [Student, Credit, Coupon, CouponTemplate, Booking, Session]
    steps:
      - step: 1
        action: 회원가입
        actor: student
        description: RegisterStudent 실행, Student 생성
      - step: 2
        action: 체험 Credit 발급
        actor: system
        description: "TRIAL_CREDIT_COUNT(1)회 체험 수업권 자동 발급"
      - step: 3
        action: Welcome 쿠폰 발급
        actor: system
        description: WELCOME 카테고리 쿠폰 자동 발급
      - step: 4
        action: 첫 수업 예약
        actor: student
        description: 체험 수업권으로 SessionBookingFlow 실행
      - step: 5
        action: 온보딩 완료 알림
        actor: system
        description: 온보딩 가이드 알림 발송

# ============================================================
# CODE MAPPING GLOSSARY (5개)
# ============================================================
code_mapping_glossary:
  - canonical: Session
    code_entity: Lesson
    db_table: lessons
    aliases: [Class, Lecture]
    note: "코드에서는 Lesson으로 사용하나, 도메인 용어는 Session이 정규 이름"

  - canonical: Instructor
    code_entity: Tutor
    db_table: instructors
    aliases: [Teacher, Coach]
    note: "DB는 instructors이나 코드 클래스명은 Tutor"

  - canonical: Student
    code_entity: User
    db_table: users
    aliases: [Learner, Member]
    note: "시스템 전반에서 User로 사용되나 도메인 정규 이름은 Student"

  - canonical: Credit
    code_entity: Ticket
    db_table: credits
    aliases: [Token, Point]
    note: "레거시에서 Token, Point 등으로 혼용, 정규 이름은 Credit"

  - canonical: Contract
    code_entity: SubscriptionMapping
    db_table: contracts
    aliases: [Plan, Agreement]
    note: "코드에서 SubscriptionMapping이란 긴 이름으로 사용, 정규화하여 Contract로 통일"

  - name: Notification
    description: 알림. 시스템에서 사용자에게 전달하는 알림 메시지
    db_table: notifications
    domain: notification
    properties:
      - name: id
        type: bigint
        nullable: false
        description: PK
      - name: recipient_id
        type: bigint
        nullable: false

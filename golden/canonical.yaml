      - name: start_time
        type: datetime
        nullable: false
        description: 시작 시각
      - name: end_time
        type: datetime
        nullable: false
        description: 종료 시각
      - name: is_booked
        type: boolean
        nullable: false
        description: 예약 점유 여부
      - name: day_of_week
        type: integer
        nullable: false

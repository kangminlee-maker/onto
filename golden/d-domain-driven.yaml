# ============================================================
# VALUE OBJECTS — Enums (10개)
# ============================================================
value_objects:
  - name: Language
    type: enum
    description: 지원 언어
    values: [EN, JP, KR, CN]

  - name: SessionStatus
    type: enum
    description: 수업 세션 상태
    values: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]

  - name: InstructorTier
    type: enum
    description: 강사 등급
    values: [STANDARD, PREMIUM, ELITE]

  - name: PaymentMethod
    type: enum
    description: 결제 수단
    values: [CREDIT_CARD, BANK_TRANSFER, MOBILE_PAY]

  - name: PaymentStatus
    type: enum
    description: 결제 상태
    values: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]

  - name: ContractStatus
    type: enum
    description: 구독 계약 상태
    values: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]

  - name: CouponCategory
    type: enum
    description: 쿠폰 분류
    values: [WELCOME, REFERRAL, SEASONAL, LOYALTY, RECOVERY]

  - name: DiscountType
    type: enum
    description: 할인 유형
    values: [PERCENTAGE, FIXED_AMOUNT]

  - name: AssessmentStage
    type: enum
    description: AI 평가 처리 단계
    values: [QUEUED, TRANSCRIBING, ANALYZING, COMPLETE, ERROR]

  - name: CourseCategory
    type: enum
    description: 교육 과정 분류
    values: [BASIC_CONVERSATION, BUSINESS, EXAM_PREP, FREE_TALK]

# ============================================================
# DOMAIN EVENTS (16개 — 상태 전이 기반)
# ============================================================
domain_events:
  # Session Events
  - id: evt_session_confirmed
    name: SessionConfirmed
    aggregate: SessionAggregate
    trigger: 강사 배정 및 수업권 차감
    from_state: [PENDING]
    to_state: CONFIRMED
    guard: []
    side_effects: [Credit 차감, 학생/강사 알림 발송]
    source_code: "SessionGateway.confirmSession()"

  - id: evt_session_started
    name: SessionStarted
    aggregate: SessionAggregate
    trigger: 수업 시작 시각 도달
    from_state: [CONFIRMED]
    to_state: IN_PROGRESS
    guard: []
    side_effects: [WebRTC 세션 생성]
    source_code: "SessionGateway.startSession()"

  - id: evt_session_completed
    name: SessionCompleted
    aggregate: SessionAggregate
    trigger: 수업 정상 종료
    from_state: [IN_PROGRESS]
    to_state: COMPLETED
    guard: []
    side_effects: [Assessment QUEUED 생성, 수업 완료 알림]
    source_code: "SessionGateway.completeSession()"

  - id: evt_session_cancelled
    name: SessionCancelled
    aggregate: SessionAggregate
    trigger: 학생 또는 강사 취소
    from_state: [CONFIRMED]
    to_state: CANCELLED
    guard:
      - "취소 시점이 CANCELLATION_DEADLINE_HOURS(4)시간 전이면 무료 취소"
    side_effects: [Credit 복원, 취소 알림 발송]
    source_code: "SessionGateway.cancelSession()"

  - id: evt_session_no_show
    name: SessionNoShow
    aggregate: SessionAggregate
    trigger: 접속 없이 10분 초과
    from_state: [CONFIRMED]
    to_state: NO_SHOW
    guard:
      - "NOSHOW_TIMEOUT_MINUTES=10"
    side_effects: [미참석 알림 발송]
    source_code: "SessionGateway.markNoShow()"

  # Contract Events
  - id: evt_contract_activated
    name: ContractActivated
    aggregate: ContractAggregate
    trigger: 첫 결제 처리 완료
    from_state: [TRIAL]
    to_state: ACTIVE
    guard: []
    side_effects: [Credit 발급, 활성화 알림]
    source_code: "ContractService.activate()"

  - id: evt_contract_paused
    name: ContractPaused
    aggregate: ContractAggregate
    trigger: 학생 일시 정지 요청
    from_state: [ACTIVE]
    to_state: PAUSED
    guard:
      - "MAX_PAUSE_COUNT=2 (현재 pause_count < 2)"
    side_effects: [다음 결제일 연기, 정지 알림]
    source_code: "ContractService.pause()"

  - id: evt_contract_resumed
    name: ContractResumed
    aggregate: ContractAggregate
    trigger: 재개 요청
    from_state: [PAUSED]
    to_state: ACTIVE
    guard: []
    side_effects: [다음 결제일 재계산, 재개 알림]
    source_code: "ContractService.resume()"

  - id: evt_contract_expired
    name: ContractExpired
    aggregate: ContractAggregate
    trigger: 기간 만료, 갱신 없음
    from_state: [ACTIVE]
    to_state: EXPIRED
    guard: []
    side_effects: [만기 알림]
    source_code: "ContractService.expire()"

  - id: evt_contract_cancelled
    name: ContractCancelled
    aggregate: ContractAggregate
    trigger: 학생 해지 요청
    from_state: [ACTIVE]
    to_state: CANCELLED
    guard: []
    side_effects: [비례 환불 계산, 해지 알림]
    source_code: "ContractService.cancel()"

  - id: evt_contract_terminated
    name: ContractTerminated
    aggregate: ContractAggregate
    trigger: 환불 처리 완료
    from_state: [CANCELLED]
    to_state: TERMINATED
    guard:
      - "30일 보존 기간 후 종료"
    side_effects: [데이터 보존 마킹]
    source_code: "ContractService.terminate()"

  # Payment Events
  - id: evt_payment_authorized
    name: PaymentAuthorized
    aggregate: PaymentAggregate
    trigger: PG 인증 성공
    from_state: [INITIATED]
    to_state: AUTHORIZED
    guard: []
    side_effects: [PG사 인증 토큰 저장]
    source_code: "PaymentProcessor.authorize()"

  - id: evt_payment_captured
    name: PaymentCaptured
    aggregate: PaymentAggregate
    trigger: 정산 확정
    from_state: [AUTHORIZED]
    to_state: CAPTURED
    guard: []
    side_effects: [Credit 발급 트리거, Contract 활성화 트리거, 결제 완료 알림]
    source_code: "PaymentProcessor.capture()"

  - id: evt_payment_refunded
    name: PaymentRefunded
    aggregate: PaymentAggregate
    trigger: 전액 환불 요청
    from_state: [CAPTURED]
    to_state: REFUNDED
    guard: []
    side_effects: [PG사 환불 API 호출, Credit 회수, 환불 알림]
    source_code: "PaymentProcessor.refund()"

  - id: evt_payment_partially_refunded
    name: PaymentPartiallyRefunded
    aggregate: PaymentAggregate
    trigger: 부분 환불 요청
    from_state: [CAPTURED]
    to_state: PARTIALLY_REFUNDED
    guard: []
    side_effects: [PG사 부분 환불 API 호출, 부분 환불 알림]
    source_code: "PaymentProcessor.partialRefund()"

  - id: evt_payment_failed
    name: PaymentFailed
    aggregate: PaymentAggregate
    trigger: PG 인증 실패
    from_state: [AUTHORIZED]
    to_state: FAILED
    guard: []
    side_effects: [결제 실패 알림]
    source_code: "PaymentProcessor.handleFailure()"


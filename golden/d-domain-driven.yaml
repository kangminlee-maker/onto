---
# EduConnect — Domain-Driven Design 온톨로지
# canonical.yaml을 Bounded Context, Aggregate, Entity, ValueObject,
# DomainEvent, Command, Query, Saga, Relationship 구조로 변환
# 주의: 가상 도메인이며 실제 서비스와 무관합니다

meta:
  schema: Domain-Driven Design
  domain: EduConnect
  version: 1
  source: golden/canonical.yaml
  created: 2026-03-26

# ============================================================
# BOUNDED CONTEXTS (5개)
# ============================================================
bounded_contexts:
  - name: AccountContext
    description: 학생/강사 계정 관리. 인증, 프로필, 가입/탈퇴를 담당
    domains: [account]

  - name: SessionContext
    description: 수업 세션 관리. 예약, 수업 진행, 일정 관리를 담당
    domains: [session]

  - name: BillingContext
    description: 결제/구독 관리. 수업권, 구독 계약, 결제 처리를 담당
    domains: [billing]

  - name: PromotionContext
    description: 프로모션 관리. 쿠폰 정의, 발급, 적용을 담당
    domains: [promotion]

  - name: AssessmentContext
    description: AI 학습 평가. 수업 후 자동 평가 및 리포트 생성을 담당
    domains: [assessment]

# ============================================================
# AGGREGATES (5개 — Session, Contract, Payment, Student, Instructor)
# ============================================================
aggregates:
  - name: SessionAggregate
    bounded_context: SessionContext
    root_entity: Session
    description: 수업 세션 Aggregate. Session을 루트로 Booking을 포함. 수업 생명주기 관리
    db_table: sessions
    code_mapping:
      canonical: Session
      code_entity: Lesson
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
      note: "코드에서는 Lesson으로 사용하나, 도메인 용어는 Session이 정규 이름"
    properties:
      - name: id
        display_name: 세션 ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: 수강생 ID
        type: bigint
        required: true
        description: 수강생 FK
      - name: instructor_id
        display_name: 강사 ID
        type: bigint
        required: false
        description: 강사 FK (PENDING 시 null)
      - name: course_id
        display_name: 교육 과정 ID
        type: bigint
        required: true
        description: 교육 과정 FK
      - name: credit_id
        display_name: 수업권 ID
        type: bigint
        required: false
        description: 사용된 수업권 FK
      - name: status
        display_name: 세션 상태
        type: enum
        required: true
        description: 세션 상태
        enum_ref: SessionStatus
      - name: scheduled_at
        display_name: 예정 시각
        type: datetime
        required: true
        description: 예정 시각
      - name: started_at
        display_name: 시작 시각
        type: datetime
        required: false
        description: 실제 시작 시각
      - name: ended_at
        display_name: 종료 시각
        type: datetime
        required: false
        description: 실제 종료 시각
      - name: reschedule_count
        display_name: 일정 변경 횟수
        type: integer
        required: true
        description: 일정 변경 횟수
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: 강사 배정 및 수업권 차감
          side_effects: [Credit 차감, 학생/강사 알림 발송]
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: 수업 시작 시각 도달
          side_effects: [WebRTC 세션 생성]
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: 수업 정상 종료
          side_effects: [Assessment QUEUED 생성, 수업 완료 알림]
        - from: CONFIRMED
          to: CANCELLED
          trigger: 학생 또는 강사 취소
          guard: ["CANCELLATION_DEADLINE_HOURS(4)시간 전이면 무료 취소"]
          side_effects: [Credit 복원, 취소 알림 발송]
        - from: CONFIRMED
          to: NO_SHOW
          trigger: 접속 없이 10분 초과
          guard: ["NOSHOW_TIMEOUT_MINUTES=10"]
          side_effects: [미참석 알림 발송]
    invariants:
      - "reschedule_count는 MAX_RESCHEDULE_COUNT(2)를 초과할 수 없음"
      - "CONFIRMED 상태에서만 취소/미참석 전이 가능"
      - "IN_PROGRESS에서만 COMPLETED 전이 가능"

  - name: ContractAggregate
    bounded_context: BillingContext
    root_entity: Contract
    description: 구독 계약 Aggregate. Contract를 루트로 Credit 발급을 관리
    db_table: contracts
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
      note: "코드에서 SubscriptionMapping이란 긴 이름으로 사용, 정규화하여 Contract로 통일"
    properties:
      - name: id
        display_name: 계약 ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: 수강생 ID
        type: bigint
        required: true
        description: 수강생 FK
      - name: subscription_id
        display_name: 구독 상품 ID
        type: bigint
        required: true
        description: 구독 상품 FK
      - name: card_id
        display_name: 결제 카드 ID
        type: bigint
        required: false
        description: 결제 카드 FK
      - name: status
        display_name: 계약 상태
        type: enum
        required: true
        description: 계약 상태
        enum_ref: ContractStatus
      - name: started_at
        display_name: 계약 시작일
        type: datetime
        required: true
        description: 계약 시작일
      - name: expires_at
        display_name: 계약 만료일
        type: datetime
        required: true
        description: 계약 만료일
      - name: next_billing_at
        display_name: 다음 결제일
        type: datetime
        required: false
        description: 다음 결제일
      - name: pause_count
        display_name: 정지 횟수
        type: integer
        required: true
        description: 일시 정지 횟수
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: 첫 결제 처리 완료
          side_effects: [Credit 발급, 활성화 알림]
        - from: ACTIVE
          to: PAUSED
          trigger: 학생 일시 정지 요청
          guard: ["MAX_PAUSE_COUNT=2"]
          side_effects: [다음 결제일 연기, 정지 알림]
        - from: PAUSED
          to: ACTIVE
          trigger: 재개 요청
          side_effects: [다음 결제일 재계산, 재개 알림]
        - from: ACTIVE
          to: EXPIRED
          trigger: 기간 만료, 갱신 없음
          side_effects: [만기 알림]
        - from: ACTIVE
          to: CANCELLED
          trigger: 학생 해지 요청
          side_effects: [비례 환불 계산, 해지 알림]
        - from: CANCELLED
          to: TERMINATED
          trigger: 환불 처리 완료
          guard: ["30일 보존 기간 후 종료"]
          side_effects: [데이터 보존 마킹]
    invariants:
      - "pause_count는 MAX_PAUSE_COUNT(2)를 초과할 수 없음"
      - "TRIAL에서는 ACTIVE로만 전이 가능"
      - "TERMINATED는 최종 상태"

  - name: PaymentAggregate
    bounded_context: BillingContext
    root_entity: Payment
    description: 결제 Aggregate. PG 연동 결제 트랜잭션 생명주기 관리
    db_table: payments
    properties:
      - name: id
        display_name: 결제 ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: 수강생 ID
        type: bigint
        required: true
        description: 수강생 FK
      - name: contract_id
        display_name: 계약 ID
        type: bigint
        required: false
        description: 구독 계약 FK
      - name: amount
        display_name: 결제 금액
        type: decimal
        required: true
        description: 결제 금액
      - name: discount_amount
        display_name: 할인 금액
        type: decimal
        required: true
        description: 할인 금액
      - name: method
        display_name: 결제 수단
        type: enum
        required: true
        description: 결제 수단
        enum_ref: PaymentMethod
      - name: status
        display_name: 결제 상태
        type: enum
        required: true
        description: 결제 상태
        enum_ref: PaymentStatus
      - name: pg_transaction_id
        display_name: PG 거래 ID
        type: string
        required: false
        description: PG사 거래 ID
      - name: created_at
        display_name: 생성일시
        type: datetime
        required: true
        description: 결제 생성일시
      - name: captured_at
        display_name: 정산 확정일시
        type: datetime
        required: false
        description: 정산 확정일시
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG 인증 성공
          side_effects: [PG사 인증 토큰 저장]
        - from: AUTHORIZED
          to: CAPTURED
          trigger: 정산 확정
          side_effects: [Credit 발급 트리거, Contract 활성화 트리거, 결제 완료 알림]
        - from: CAPTURED
          to: REFUNDED
          trigger: 전액 환불 요청
          side_effects: [PG사 환불 API 호출, Credit 회수, 환불 알림]
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: 부분 환불 요청
          side_effects: [PG사 부분 환불 API 호출, 부분 환불 알림]
        - from: AUTHORIZED
          to: FAILED
          trigger: PG 인증 실패
          side_effects: [결제 실패 알림]
    invariants:
      - "FAILED, REFUNDED는 최종 상태"
      - "CAPTURED에서만 환불(전액/부분) 전이 가능"

  - name: StudentAggregate
    bounded_context: AccountContext
    root_entity: Student
    description: 학생 Aggregate. 학생 계정과 관련 PaymentCard를 관리
    db_table: users
    code_mapping:
      canonical: Student
      code_entity: User
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
      note: "시스템 전반에서 User로 사용되나 도메인 정규 이름은 Student"
    properties:
      - name: id
        display_name: 학생 ID
        type: bigint
        required: true
        description: PK
      - name: email
        display_name: 이메일
        type: string
        required: true
        description: 이메일 (로그인 ID)
      - name: name
        display_name: 이름
        type: string
        required: true
        description: 표시 이름
      - name: phone
        display_name: 전화번호
        type: string
        required: false
        description: 전화번호
      - name: language
        display_name: 학습 언어
        type: enum
        required: true
        description: 학습 대상 언어
        enum_ref: Language
      - name: timezone
        display_name: 시간대
        type: string
        required: true
        description: 시간대 (IANA)
      - name: registered_at
        display_name: 가입일시
        type: datetime
        required: true
        description: 가입일시
      - name: is_active
        display_name: 활성 여부
        type: boolean
        required: true
        description: 활성 여부
    invariants:
      - "탈퇴 시 활성 Contract가 없어야 함"
      - "email은 시스템 내 고유해야 함"

  - name: InstructorAggregate
    bounded_context: AccountContext
    root_entity: Instructor
    description: 강사 Aggregate. 강사 프로필과 가용 시간대를 관리
    db_table: instructors
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
      note: "DB는 instructors이나 코드 클래스명은 Tutor"
    properties:
      - name: id
        display_name: 강사 ID
        type: bigint
        required: true
        description: PK
      - name: name
        display_name: 이름
        type: string
        required: true
        description: 표시 이름
      - name: email
        display_name: 이메일
        type: string
        required: true
        description: 이메일
      - name: tier
        display_name: 등급
        type: enum
        required: true
        description: 강사 등급
        enum_ref: InstructorTier
      - name: language
        display_name: 교육 언어
        type: enum
        required: true
        description: 교육 가능 언어
        enum_ref: Language
      - name: bio
        display_name: 자기소개
        type: text
        required: false
        description: 자기소개
      - name: rating
        display_name: 평점
        type: decimal
        required: false
        description: 평균 평점 (1.0~5.0)
      - name: is_available
        display_name: 활동 가능
        type: boolean
        required: true
        description: 현재 활동 가능 여부
    invariants:
      - "rating은 1.0~5.0 범위"

# ============================================================
# ENTITIES — Aggregate 내 하위 또는 독립 엔티티 (10개)
# ============================================================
entities:
  - name: Booking
    bounded_context: SessionContext
    aggregate: SessionAggregate
    domain: session
    description: 예약 스케줄. Session Aggregate 내 하위 엔티티
    db_table: bookings
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: 수업 세션 FK
      - name: slot_id
        type: bigint
        required: true
        description: 가용 시간대 FK
      - name: booked_at
        type: datetime
        required: true
        description: 예약일시
      - name: cancelled_at
        type: datetime
        required: false
        description: 취소일시

  - name: AvailabilitySlot
    bounded_context: SessionContext
    aggregate: InstructorAggregate
    domain: session
    description: 강사 가용 시간대. Instructor Aggregate 내 하위 엔티티
    db_table: availability_slots
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: instructor_id
        type: bigint
        required: true
        description: 강사 FK
      - name: start_time
        type: datetime
        required: true
        description: 시작 시각
      - name: end_time
        type: datetime
        required: true
        description: 종료 시각
      - name: is_booked
        type: boolean
        required: true
        description: 예약 점유 여부
      - name: day_of_week
        type: integer
        required: true
        description: 요일 (1=월 ~ 7=일)

  - name: Course
    bounded_context: SessionContext
    aggregate: null
    domain: session
    description: 교육 과정. 독립 엔티티 (참조 데이터)
    db_table: courses
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 과정명
      - name: category
        type: enum
        required: true
        description: 과정 분류
        enum_ref: CourseCategory
      - name: language
        type: enum
        required: true
        description: 대상 언어
        enum_ref: Language
      - name: description
        type: text
        required: false
        description: 과정 설명
      - name: level
        type: integer
        required: true
        description: 난이도 (1~10)
      - name: is_active
        type: boolean
        required: true
        description: 활성 여부

  - name: Credit
    bounded_context: BillingContext
    aggregate: ContractAggregate
    domain: billing
    description: 수업권. Contract Aggregate의 하위 엔티티로 발급 관리
    db_table: credits
    code_entity: Ticket
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: payment_id
        type: bigint
        required: false
        description: 결제 FK (체험권은 null)
      - name: contract_id
        type: bigint
        required: false
        description: 구독 계약 FK
      - name: total_count
        type: integer
        required: true
        description: 발급된 총 횟수
      - name: used_count
        type: integer
        required: true
        description: 사용된 횟수
      - name: total_minutes
        type: integer
        required: true
        description: 발급된 총 분수
      - name: used_minutes
        type: integer
        required: true
        description: 사용된 분수
      - name: expires_at
        type: datetime
        required: true
        description: 만료일시
      - name: issued_at
        type: datetime
        required: true
        description: 발급일시

  - name: Subscription
    bounded_context: BillingContext
    aggregate: null
    domain: billing
    description: 구독 상품 정의. 독립 엔티티 (참조 데이터)
    db_table: subscriptions
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: 상품명
      - name: price
        type: decimal
        required: true
        description: 월 가격
      - name: credit_count
        type: integer
        required: true
        description: 포함 수업 횟수
      - name: credit_minutes
        type: integer
        required: true
        description: 포함 수업 분수
      - name: duration_days
        type: integer
        required: true
        description: 구독 기간 (일)
      - name: is_active
        type: boolean
        required: true
        description: 현재 판매 중 여부

  - name: PaymentCard
    bounded_context: BillingContext
    aggregate: StudentAggregate
    domain: billing
    description: 등록 카드. Student Aggregate의 하위 엔티티
    db_table: payment_cards
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: card_number_masked
        type: string
        required: true
        description: 마스킹된 카드 번호
      - name: card_brand
        type: string
        required: true
        description: 카드 브랜드 (VISA, MASTER 등)
      - name: billing_key
        type: string
        required: true
        description: PG사 빌링키
      - name: is_default
        type: boolean
        required: true
        description: 기본 결제 수단 여부
      - name: registered_at
        type: datetime
        required: true
        description: 등록일시

  - name: Coupon
    bounded_context: PromotionContext
    aggregate: null
    domain: promotion
    description: 발행된 쿠폰. 독립 엔티티
    db_table: coupons
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: template_id
        type: bigint
        required: true
        description: 쿠폰 정의 FK
      - name: student_id
        type: bigint
        required: true
        description: 수강생 FK
      - name: payment_id
        type: bigint
        required: false
        description: 사용된 결제 FK (미사용 시 null)
      - name: code
        type: string
        required: true
        description: 쿠폰 코드
      - name: is_used
        type: boolean
        required: true
        description: 사용 여부
      - name: issued_at
        type: datetime
        required: true
        description: 발급일시
      - name: expires_at
        type: datetime
        required: true
        description: 만료일시

  - name: CouponTemplate
    bounded_context: PromotionContext
    aggregate: null
    domain: promotion
    description: 쿠폰 정의. 독립 엔티티 (참조 데이터)
    db_table: coupon_templates
    properties:
      - name: id
        type: bigint
        required: true

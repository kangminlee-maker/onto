---
# EduConnect — Domain-Driven Design Ontology
# canonical.yaml converted to Bounded Context, Aggregate, Entity, ValueObject,
# DomainEvent, Command, Query, Saga, Relationship structure
# Note: This is a fictional domain and unrelated to any real service

meta:
  schema: Domain-Driven Design
  domain: EduConnect
  version: 1
  source: golden/canonical.yaml
  created: 2026-03-26

# ============================================================
# BOUNDED CONTEXTS (5)
# ============================================================
bounded_contexts:
  - name: AccountContext
    description: Student/instructor account management. Responsible for authentication, profiles, registration/withdrawal
    domains: [account]

  - name: SessionContext
    description: Lesson session management. Responsible for booking, lesson delivery, and schedule management
    domains: [session]

  - name: BillingContext
    description: Payment/subscription management. Responsible for credits, subscription contracts, and payment processing
    domains: [billing]

  - name: PromotionContext
    description: Promotion management. Responsible for coupon definition, issuance, and application
    domains: [promotion]

  - name: AssessmentContext
    description: AI learning assessment. Responsible for auto-assessment and report generation after lessons
    domains: [assessment]

# ============================================================
# AGGREGATES (5 — Session, Contract, Payment, Student, Instructor)
# ============================================================
aggregates:
  - name: SessionAggregate
    bounded_context: SessionContext
    root_entity: Session
    description: Lesson session Aggregate. Contains Booking with Session as root. Manages lesson lifecycle
    db_table: sessions
    code_mapping:
      canonical: Session
      code_entity: Lesson
      legacy_aliases: [Class, Lecture]
      fk_variants: [session_id, lesson_id]
      note: "Lesson is used in code, but Session is the canonical domain term"
    properties:
      - name: id
        display_name: Session ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: Student ID
        type: bigint
        required: true
        description: Student FK
      - name: instructor_id
        display_name: Instructor ID
        type: bigint
        required: false
        description: Instructor FK (null when PENDING)
      - name: course_id
        display_name: Course ID
        type: bigint
        required: true
        description: Course FK
      - name: credit_id
        display_name: Credit ID
        type: bigint
        required: false
        description: Used credit FK
      - name: status
        display_name: Session status
        type: enum
        required: true
        description: Session status
        enum_ref: SessionStatus
      - name: scheduled_at
        display_name: Scheduled time
        type: datetime
        required: true
        description: Scheduled time
      - name: started_at
        display_name: Start time
        type: datetime
        required: false
        description: Actual start time
      - name: ended_at
        display_name: End time
        type: datetime
        required: false
        description: Actual end time
      - name: reschedule_count
        display_name: Reschedule count
        type: integer
        required: true
        description: Reschedule count
    state_machine:
      field: status
      states: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
      transitions:
        - from: PENDING
          to: CONFIRMED
          trigger: Instructor assignment and credit deduction
          side_effects: [Credit deduction, Student/instructor notification sent]
        - from: CONFIRMED
          to: IN_PROGRESS
          trigger: Lesson start time reached
          side_effects: [WebRTC session created]
        - from: IN_PROGRESS
          to: COMPLETED
          trigger: Lesson completed normally
          side_effects: [Assessment QUEUED created, Lesson completion notification]
        - from: CONFIRMED
          to: CANCELLED
          trigger: Student or instructor cancellation
          guard: ["Free cancellation if CANCELLATION_DEADLINE_HOURS(4) hours before lesson start"]
          side_effects: [Credit restoration, Cancellation notification sent]
        - from: CONFIRMED
          to: NO_SHOW
          trigger: No connection for over 10 minutes
          guard: ["NOSHOW_TIMEOUT_MINUTES=10"]
          side_effects: [No-show notification sent]
    invariants:
      - "reschedule_count cannot exceed MAX_RESCHEDULE_COUNT(2)"
      - "Cancellation/no-show transition only allowed from CONFIRMED status"
      - "COMPLETED transition only allowed from IN_PROGRESS"

  - name: ContractAggregate
    bounded_context: BillingContext
    root_entity: Contract
    description: Subscription contract Aggregate. Manages Credit issuance with Contract as root
    db_table: contracts
    code_mapping:
      canonical: Contract
      code_entity: SubscriptionMapping
      legacy_aliases: [Plan, Agreement]
      fk_variants: [contract_id, subscription_mapping_id]
      note: "SubscriptionMapping is the long name in code; normalized to Contract"
    properties:
      - name: id
        display_name: Contract ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: Student ID
        type: bigint
        required: true
        description: Student FK
      - name: subscription_id
        display_name: Subscription product ID
        type: bigint
        required: true
        description: Subscription product FK
      - name: card_id
        display_name: Payment card ID
        type: bigint
        required: false
        description: Payment card FK
      - name: status
        display_name: Contract status
        type: enum
        required: true
        description: Contract status
        enum_ref: ContractStatus
      - name: started_at
        display_name: Contract start date
        type: datetime
        required: true
        description: Contract start date
      - name: expires_at
        display_name: Contract expiration date
        type: datetime
        required: true
        description: Contract expiration date
      - name: next_billing_at
        display_name: Next billing date
        type: datetime
        required: false
        description: Next billing date
      - name: pause_count
        display_name: Pause count
        type: integer
        required: true
        description: Pause count
    state_machine:
      field: status
      states: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]
      transitions:
        - from: TRIAL
          to: ACTIVE
          trigger: First payment processing completed
          side_effects: [Credit issuance, Activation notification]
        - from: ACTIVE
          to: PAUSED
          trigger: Student pause request
          guard: ["MAX_PAUSE_COUNT=2"]
          side_effects: [Next billing date postponed, Pause notification]
        - from: PAUSED
          to: ACTIVE
          trigger: Resume request
          side_effects: [Next billing date recalculated, Resume notification]
        - from: ACTIVE
          to: EXPIRED
          trigger: Period expired, no renewal
          side_effects: [Expiration notification]
        - from: ACTIVE
          to: CANCELLED
          trigger: Student cancellation request
          side_effects: [Prorated refund calculation, Cancellation notification]
        - from: CANCELLED
          to: TERMINATED
          trigger: Refund processing completed
          guard: ["Terminated after 30-day retention period"]
          side_effects: [Data retention marking]
    invariants:
      - "pause_count cannot exceed MAX_PAUSE_COUNT(2)"
      - "From TRIAL, only transition to ACTIVE is allowed"
      - "TERMINATED is a terminal state"

  - name: PaymentAggregate
    bounded_context: BillingContext
    root_entity: Payment
    description: Payment Aggregate. Manages PG-integrated payment transaction lifecycle
    db_table: payments
    properties:
      - name: id
        display_name: Payment ID
        type: bigint
        required: true
        description: PK
      - name: student_id
        display_name: Student ID
        type: bigint
        required: true
        description: Student FK
      - name: contract_id
        display_name: Contract ID
        type: bigint
        required: false
        description: Subscription contract FK
      - name: amount
        display_name: Payment amount
        type: decimal
        required: true
        description: Payment amount
      - name: discount_amount
        display_name: Discount amount
        type: decimal
        required: true
        description: Discount amount
      - name: method
        display_name: Payment method
        type: enum
        required: true
        description: Payment method
        enum_ref: PaymentMethod
      - name: status
        display_name: Payment status
        type: enum
        required: true
        description: Payment status
        enum_ref: PaymentStatus
      - name: pg_transaction_id
        display_name: PG transaction ID
        type: string
        required: false
        description: PG transaction ID
      - name: created_at
        display_name: Creation datetime
        type: datetime
        required: true
        description: Payment creation datetime
      - name: captured_at
        display_name: Settlement capture datetime
        type: datetime
        required: false
        description: Settlement capture datetime
    state_machine:
      field: status
      states: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      transitions:
        - from: INITIATED
          to: AUTHORIZED
          trigger: PG authentication successful
          side_effects: [PG authentication token stored]
        - from: AUTHORIZED
          to: CAPTURED
          trigger: Settlement captured
          side_effects: [Credit issuance triggered, Contract activation triggered, Payment completion notification]
        - from: CAPTURED
          to: REFUNDED
          trigger: Full refund request
          side_effects: [PG refund API called, Credit retrieval, Refund notification]
        - from: CAPTURED
          to: PARTIALLY_REFUNDED
          trigger: Partial refund request
          side_effects: [PG partial refund API called, Partial refund notification]
        - from: AUTHORIZED
          to: FAILED
          trigger: PG authentication failed
          side_effects: [Payment failure notification]
    invariants:
      - "FAILED, REFUNDED are terminal states"
      - "Refund (full/partial) transition only allowed from CAPTURED"

  - name: StudentAggregate
    bounded_context: AccountContext
    root_entity: Student
    description: Student Aggregate. Manages student account and related PaymentCards
    db_table: users
    code_mapping:
      canonical: Student
      code_entity: User
      legacy_aliases: [Learner, Member]
      fk_variants: [student_id, user_id, learner_id]
      note: "User is used throughout the system, but Student is the canonical domain term"
    properties:
      - name: id
        display_name: Student ID
        type: bigint
        required: true
        description: PK
      - name: email
        display_name: Email
        type: string
        required: true
        description: Email (login ID)
      - name: name
        display_name: Name
        type: string
        required: true
        description: Display name
      - name: phone
        display_name: Phone number
        type: string
        required: false
        description: Phone number
      - name: language
        display_name: Learning language
        type: enum
        required: true
        description: Target learning language
        enum_ref: Language
      - name: timezone
        display_name: Timezone
        type: string
        required: true
        description: Timezone (IANA)
      - name: registered_at
        display_name: Registration datetime
        type: datetime
        required: true
        description: Registration datetime
      - name: is_active
        display_name: Active status
        type: boolean
        required: true
        description: Active status
    invariants:
      - "No active Contract must exist at withdrawal"
      - "Email must be unique within the system"

  - name: InstructorAggregate
    bounded_context: AccountContext
    root_entity: Instructor
    description: Instructor Aggregate. Manages instructor profile and availability slots
    db_table: instructors
    code_mapping:
      canonical: Instructor
      code_entity: Tutor
      legacy_aliases: [Teacher, Coach]
      fk_variants: [instructor_id, tutor_id]
      note: "DB is instructors but code class name is Tutor"
    properties:
      - name: id
        display_name: Instructor ID
        type: bigint
        required: true
        description: PK
      - name: name
        display_name: Name
        type: string
        required: true
        description: Display name
      - name: email
        display_name: Email
        type: string
        required: true
        description: Email
      - name: tier
        display_name: Tier
        type: enum
        required: true
        description: Instructor tier
        enum_ref: InstructorTier
      - name: language
        display_name: Teaching language
        type: enum
        required: true
        description: Available teaching language
        enum_ref: Language
      - name: bio
        display_name: Bio
        type: text
        required: false
        description: Bio
      - name: rating
        display_name: Rating
        type: decimal
        required: false
        description: Average rating (1.0~5.0)
      - name: is_available
        display_name: Available
        type: boolean
        required: true
        description: Currently available
    invariants:
      - "Rating must be in range 1.0~5.0"

# ============================================================
# ENTITIES — Sub-entities within Aggregates or independent entities (10)
# ============================================================
entities:
  - name: Booking
    bounded_context: SessionContext
    aggregate: SessionAggregate
    domain: session
    description: Booking schedule. Sub-entity within Session Aggregate
    db_table: bookings
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: Lesson session FK
      - name: slot_id
        type: bigint
        required: true
        description: Availability slot FK
      - name: booked_at
        type: datetime
        required: true
        description: Booking datetime
      - name: cancelled_at
        type: datetime
        required: false
        description: Cancellation datetime

  - name: AvailabilitySlot
    bounded_context: SessionContext
    aggregate: InstructorAggregate
    domain: session
    description: Instructor availability slot. Sub-entity within Instructor Aggregate
    db_table: availability_slots
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: instructor_id
        type: bigint
        required: true
        description: Instructor FK
      - name: start_time
        type: datetime
        required: true
        description: Start time
      - name: end_time
        type: datetime
        required: true
        description: End time
      - name: is_booked
        type: boolean
        required: true
        description: Booking occupied
      - name: day_of_week
        type: integer
        required: true
        description: Day of week (1=Mon ~ 7=Sun)

  - name: Course
    bounded_context: SessionContext
    aggregate: null
    domain: session
    description: Course. Independent entity (reference data)
    db_table: courses
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Course name
      - name: category
        type: enum
        required: true
        description: Course category
        enum_ref: CourseCategory
      - name: language
        type: enum
        required: true
        description: Target language
        enum_ref: Language
      - name: description
        type: text
        required: false
        description: Course description
      - name: level
        type: integer
        required: true
        description: Difficulty level (1~10)
      - name: is_active
        type: boolean
        required: true
        description: Active status

  - name: Credit
    bounded_context: BillingContext
    aggregate: ContractAggregate
    domain: billing
    description: Credit. Managed as sub-entity of Contract Aggregate for issuance
    db_table: credits
    code_entity: Ticket
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: payment_id
        type: bigint
        required: false
        description: Payment FK (null for trial credits)
      - name: contract_id
        type: bigint
        required: false
        description: Subscription contract FK
      - name: total_count
        type: integer
        required: true
        description: Total issued count
      - name: used_count
        type: integer
        required: true
        description: Used count
      - name: total_minutes
        type: integer
        required: true
        description: Total issued minutes
      - name: used_minutes
        type: integer
        required: true
        description: Used minutes
      - name: expires_at
        type: datetime
        required: true
        description: Expiration datetime
      - name: issued_at
        type: datetime
        required: true
        description: Issuance datetime

  - name: Subscription
    bounded_context: BillingContext
    aggregate: null
    domain: billing
    description: Subscription product definition. Independent entity (reference data)
    db_table: subscriptions
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Product name
      - name: price
        type: decimal
        required: true
        description: Monthly price
      - name: credit_count
        type: integer
        required: true
        description: Included lesson count
      - name: credit_minutes
        type: integer
        required: true
        description: Included lesson minutes
      - name: duration_days
        type: integer
        required: true
        description: Subscription duration (days)
      - name: is_active
        type: boolean
        required: true
        description: Currently on sale

  - name: PaymentCard
    bounded_context: BillingContext
    aggregate: StudentAggregate
    domain: billing
    description: Registered card. Sub-entity within Student Aggregate
    db_table: payment_cards
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: card_number_masked
        type: string
        required: true
        description: Masked card number
      - name: card_brand
        type: string
        required: true
        description: Card brand (VISA, MASTER, etc.)
      - name: billing_key
        type: string
        required: true
        description: PG billing key
      - name: is_default
        type: boolean
        required: true
        description: Default payment method
      - name: registered_at
        type: datetime
        required: true
        description: Registration datetime

  - name: Coupon
    bounded_context: PromotionContext
    aggregate: null
    domain: promotion
    description: Issued coupon. Independent entity
    db_table: coupons
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: template_id
        type: bigint
        required: true
        description: Coupon template FK
      - name: student_id
        type: bigint
        required: true
        description: Student FK
      - name: payment_id
        type: bigint
        required: false
        description: Used payment FK (null if unused)
      - name: code
        type: string
        required: true
        description: Coupon code
      - name: is_used
        type: boolean
        required: true
        description: Usage status
      - name: issued_at
        type: datetime
        required: true
        description: Issuance datetime
      - name: expires_at
        type: datetime
        required: true
        description: Expiration datetime

  - name: CouponTemplate
    bounded_context: PromotionContext
    aggregate: null
    domain: promotion
    description: Coupon definition. Independent entity (reference data)
    db_table: coupon_templates
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: name
        type: string
        required: true
        description: Coupon name
      - name: category
        type: enum
        required: true
        description: Coupon category
        enum_ref: CouponCategory
      - name: discount_type
        type: enum
        required: true
        description: Discount type
        enum_ref: DiscountType
      - name: discount_value
        type: decimal
        required: true
        description: Discount value
      - name: min_purchase_amount
        type: decimal
        required: false
        description: Minimum purchase amount
      - name: max_issue_count
        type: integer
        required: false
        description: Maximum issue count
      - name: is_active
        type: boolean
        required: true
        description: Active status

  - name: Assessment
    bounded_context: AssessmentContext
    aggregate: null
    domain: assessment
    description: AI learning assessment. Independent entity
    db_table: assessments
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: session_id
        type: bigint
        required: true
        description: Lesson session FK
      - name: stage
        type: enum
        required: true
        description: Processing stage
        enum_ref: AssessmentStage
      - name: transcript
        type: text
        required: false
        description: Lesson transcript text
      - name: score
        type: decimal
        required: false
        description: Overall score (0~100)
      - name: feedback
        type: text
        required: false
        description: AI feedback content
      - name: created_at
        type: datetime
        required: true
        description: Creation datetime
      - name: completed_at
        type: datetime
        required: false
        description: Assessment completion datetime

  - name: Notification
    bounded_context: AccountContext
    aggregate: null
    domain: notification
    description: Notification. Independent entity
    db_table: notifications
    normalization_status: normalized
    properties:
      - name: id
        type: bigint
        required: true
        description: PK
      - name: recipient_id
        type: bigint
        required: true
        description: Recipient FK (student or instructor)
      - name: recipient_type
        type: string
        required: true
        description: "Recipient type (Student | Instructor)"
      - name: title
        type: string
        required: true
        description: Notification title
      - name: body
        type: text
        required: true
        description: Notification body
      - name: channel
        type: string
        required: true
        description: "Channel (PUSH | EMAIL | SMS)"
      - name: is_read
        type: boolean
        required: true
        description: Read status
      - name: sent_at
        type: datetime
        required: true
        description: Sent datetime

# ============================================================
# VALUE OBJECTS — Enums (10)
# ============================================================
value_objects:
  - name: Language
    type: enum
    description: Supported languages
    values: [EN, JP, KR, CN]

  - name: SessionStatus
    type: enum
    description: Lesson session status
    values: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]

  - name: InstructorTier
    type: enum
    description: Instructor tier
    values: [STANDARD, PREMIUM, ELITE]

  - name: PaymentMethod
    type: enum
    description: Payment method
    values: [CREDIT_CARD, BANK_TRANSFER, MOBILE_PAY]

  - name: PaymentStatus
    type: enum
    description: Payment status
    values: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]

  - name: ContractStatus
    type: enum
    description: Subscription contract status
    values: [TRIAL, ACTIVE, PAUSED, EXPIRED, CANCELLED, TERMINATED]

  - name: CouponCategory
    type: enum
    description: Coupon category
    values: [WELCOME, REFERRAL, SEASONAL, LOYALTY, RECOVERY]

  - name: DiscountType
    type: enum
    description: Discount type
    values: [PERCENTAGE, FIXED_AMOUNT]

  - name: AssessmentStage
    type: enum
    description: AI assessment processing stage
    values: [QUEUED, TRANSCRIBING, ANALYZING, COMPLETE, ERROR]

  - name: CourseCategory
    type: enum
    description: Course category
    values: [BASIC_CONVERSATION, BUSINESS, EXAM_PREP, FREE_TALK]

# ============================================================
# DOMAIN EVENTS (16 — state transition based)
# ============================================================
domain_events:
  # Session Events
  - id: evt_session_confirmed
    name: SessionConfirmed
    aggregate: SessionAggregate
    trigger: Instructor assignment and credit deduction
    from_state: [PENDING]
    to_state: CONFIRMED
    guard: []
    side_effects: [Credit deduction, Student/instructor notification sent]
    source_code: "SessionGateway.confirmSession()"

  - id: evt_session_started
    name: SessionStarted
    aggregate: SessionAggregate
    trigger: Lesson start time reached
    from_state: [CONFIRMED]
    to_state: IN_PROGRESS
    guard: []
    side_effects: [WebRTC session created]
    source_code: "SessionGateway.startSession()"

  - id: evt_session_completed
    name: SessionCompleted
    aggregate: SessionAggregate
    trigger: Lesson completed normally
    from_state: [IN_PROGRESS]
    to_state: COMPLETED
    guard: []
    side_effects: [Assessment QUEUED created, Lesson completion notification]
    source_code: "SessionGateway.completeSession()"

  - id: evt_session_cancelled
    name: SessionCancelled
    aggregate: SessionAggregate
    trigger: Student or instructor cancellation
    from_state: [CONFIRMED]
    to_state: CANCELLED
    guard:
      - "Free cancellation if cancellation time is CANCELLATION_DEADLINE_HOURS(4) hours before lesson start"
    side_effects: [Credit restoration, Cancellation notification sent]
    source_code: "SessionGateway.cancelSession()"

  - id: evt_session_no_show
    name: SessionNoShow
    aggregate: SessionAggregate
    trigger: No connection for over 10 minutes
    from_state: [CONFIRMED]
    to_state: NO_SHOW
    guard:
      - "NOSHOW_TIMEOUT_MINUTES=10"
    side_effects: [No-show notification sent]
    source_code: "SessionGateway.markNoShow()"

  # Contract Events
  - id: evt_contract_activated
    name: ContractActivated
    aggregate: ContractAggregate
    trigger: First payment processing completed
    from_state: [TRIAL]
    to_state: ACTIVE
    guard: []
    side_effects: [Credit issuance, Activation notification]
    source_code: "ContractService.activate()"

  - id: evt_contract_paused
    name: ContractPaused
    aggregate: ContractAggregate
    trigger: Student pause request
    from_state: [ACTIVE]
    to_state: PAUSED
    guard:
      - "MAX_PAUSE_COUNT=2 (current pause_count < 2)"
    side_effects: [Next billing date postponed, Pause notification]
    source_code: "ContractService.pause()"

  - id: evt_contract_resumed
    name: ContractResumed
    aggregate: ContractAggregate
    trigger: Resume request
    from_state: [PAUSED]
    to_state: ACTIVE
    guard: []
    side_effects: [Next billing date recalculated, Resume notification]
    source_code: "ContractService.resume()"

  - id: evt_contract_expired
    name: ContractExpired
    aggregate: ContractAggregate
    trigger: Period expired, no renewal
    from_state: [ACTIVE]
    to_state: EXPIRED
    guard: []
    side_effects: [Expiration notification]
    source_code: "ContractService.expire()"

  - id: evt_contract_cancelled
    name: ContractCancelled
    aggregate: ContractAggregate
    trigger: Student cancellation request
    from_state: [ACTIVE]
    to_state: CANCELLED
    guard: []
    side_effects: [Prorated refund calculation, Cancellation notification]
    source_code: "ContractService.cancel()"

  - id: evt_contract_terminated
    name: ContractTerminated
    aggregate: ContractAggregate
    trigger: Refund processing completed
    from_state: [CANCELLED]
    to_state: TERMINATED
    guard:
      - "Terminated after 30-day retention period"
    side_effects: [Data retention marking]
    source_code: "ContractService.terminate()"

  # Payment Events
  - id: evt_payment_authorized
    name: PaymentAuthorized
    aggregate: PaymentAggregate
    trigger: PG authentication successful
    from_state: [INITIATED]
    to_state: AUTHORIZED
    guard: []
    side_effects: [PG authentication token stored]
    source_code: "PaymentProcessor.authorize()"

  - id: evt_payment_captured
    name: PaymentCaptured
    aggregate: PaymentAggregate
    trigger: Settlement captured
    from_state: [AUTHORIZED]
    to_state: CAPTURED
    guard: []
    side_effects: [Credit issuance triggered, Contract activation triggered, Payment completion notification]
    source_code: "PaymentProcessor.capture()"

  - id: evt_payment_refunded
    name: PaymentRefunded
    aggregate: PaymentAggregate
    trigger: Full refund request
    from_state: [CAPTURED]
    to_state: REFUNDED
    guard: []
    side_effects: [PG refund API called, Credit retrieval, Refund notification]
    source_code: "PaymentProcessor.refund()"

  - id: evt_payment_partially_refunded
    name: PaymentPartiallyRefunded
    aggregate: PaymentAggregate
    trigger: Partial refund request
    from_state: [CAPTURED]
    to_state: PARTIALLY_REFUNDED
    guard: []
    side_effects: [PG partial refund API called, Partial refund notification]
    source_code: "PaymentProcessor.partialRefund()"

  - id: evt_payment_failed
    name: PaymentFailed
    aggregate: PaymentAggregate
    trigger: PG authentication failed
    from_state: [AUTHORIZED]
    to_state: FAILED
    guard: []
    side_effects: [Payment failure notification]
    source_code: "PaymentProcessor.handleFailure()"


# ============================================================
# SAGAS (5개 — Domain Flows를 DDD Saga로 변환)
# ============================================================
sagas:
  - name: SessionBookingSaga
    description: 학생이 수업을 예약하는 전체 흐름. 여러 Aggregate를 가로지르는 프로세스
    external_dependencies:
      - WebRTC 서버 (수업 시작 시)
    involved_aggregates: [StudentAggregate, SessionAggregate, InstructorAggregate, ContractAggregate]
    involved_entities: [Credit, AvailabilitySlot, Booking]
    steps:
      - step: 1
        action: Credit 잔여 확인
        aggregate: ContractAggregate
        description: 학생의 사용 가능한 수업권 잔여를 확인
      - step: 2
        action: 시간대 선택
        aggregate: InstructorAggregate
        description: 가용 시간대 목록에서 원하는 시간 선택
      - step: 3
        action: 강사 매칭
        aggregate: InstructorAggregate
        description: 선택 시간대의 강사를 배정
      - step: 4
        action: Booking 생성
        aggregate: SessionAggregate
        description: 예약 레코드 생성 및 AvailabilitySlot 점유
      - step: 5
        action: Session 생성
        aggregate: SessionAggregate
        description: "Session(PENDING) 생성 → 강사 배정 시 CONFIRMED"

  - name: PaymentSaga
    description: 구독 상품 결제부터 수업권 발급까지의 흐름
    external_dependencies:
      - PG사 결제 API
    involved_aggregates: [StudentAggregate, PaymentAggregate, ContractAggregate]
    involved_entities: [Coupon, Credit, Subscription]
    steps:
      - step: 1
        action: 상품 선택 및 쿠폰 적용
        aggregate: null
        description: 구독 상품 선택 후 보유 쿠폰 적용
      - step: 2
        action: Payment INITIATED
        aggregate: PaymentAggregate
        description: 결제 레코드 생성
      - step: 3
        action: PG 인증 요청
        aggregate: PaymentAggregate
        description: PG사에 결제 인증 요청 (AUTHORIZED)
      - step: 4
        action: 정산 확정
        aggregate: PaymentAggregate
        description: PG 인증 성공 시 CAPTURED
      - step: 5
        action: Credit 발급
        aggregate: ContractAggregate
        description: 구독 상품에 정의된 수업권 발급
      - step: 6
        action: Contract 활성화
        aggregate: ContractAggregate
        description: "Contract TRIAL → ACTIVE"

  - name: SubscriptionRenewalSaga
    description: 구독 자동 갱신 흐름
    external_dependencies:
      - PG사 정기 결제 API
    involved_aggregates: [ContractAggregate, PaymentAggregate]
    involved_entities: [PaymentCard, Credit, Subscription]
    steps:
      - step: 1
        action: 만기 도래 확인
        aggregate: ContractAggregate
        description: next_billing_at 도래한 Contract 검색
      - step: 2
        action: 자동 결제
        aggregate: PaymentAggregate
        description: 등록 카드로 정기 결제 실행
      - step: 3
        action: Credit 발급
        aggregate: ContractAggregate
        description: 갱신 분량의 수업권 발급
      - step: 4
        action: 다음 결제일 갱신
        aggregate: ContractAggregate
        description: next_billing_at 업데이트

  - name: SessionCompletionSaga
    description: 수업 종료 후 평가 및 알림까지의 흐름
    external_dependencies:
      - AI 분석 서비스 (STT, NLP)
    involved_aggregates: [SessionAggregate]
    involved_entities: [Assessment, Notification]
    steps:
      - step: 1
        action: 수업 종료
        aggregate: SessionAggregate
        description: "Session IN_PROGRESS → COMPLETED"
      - step: 2
        action: Assessment 생성
        aggregate: null
        description: Assessment(QUEUED) 생성 및 AI 파이프라인 트리거
      - step: 3
        action: 음성 전사
        aggregate: null
        description: "QUEUED → TRANSCRIBING → ANALYZING"
      - step: 4
        action: 리포트 생성
        aggregate: null
        description: "ANALYZING → COMPLETE, 점수 및 피드백 기록"
      - step: 5
        action: 알림 발송
        aggregate: null
        description: 학생에게 평가 완료 알림

  - name: NewStudentOnboardingSaga
    description: 신규 학생 가입부터 첫 수업 예약까지의 온보딩 흐름
    external_dependencies: []
    involved_aggregates: [StudentAggregate, ContractAggregate, SessionAggregate]
    involved_entities: [Credit, Coupon, CouponTemplate, Booking]
    steps:
      - step: 1
        action: 회원가입
        aggregate: StudentAggregate
        description: RegisterStudent 실행, Student 생성
      - step: 2
        action: 체험 Credit 발급
        aggregate: ContractAggregate
        description: "TRIAL_CREDIT_COUNT(1)회 체험 수업권 자동 발급"
      - step: 3
        action: Welcome 쿠폰 발급
        aggregate: null
        description: WELCOME 카테고리 쿠폰 자동 발급
      - step: 4
        action: 첫 수업 예약
        aggregate: SessionAggregate
        description: 체험 수업권으로 SessionBookingSaga 실행
      - step: 5
        action: 온보딩 완료 알림
        aggregate: null
        description: 온보딩 가이드 알림 발송


name: Action-Centric (Palantir style)
version: 1
description: Action-centric practical ontology structure. Defines domain objects with ObjectType, actions with ActionType, and relationships with LinkType.
golden_reference: golden/b-action-centric.yaml
sections:
  - name: enums
    description: List of enumeration values used in the domain
    fields:
      - name: name
        type: string
        required: true
        description: Enum name
      - name: description
        type: string
        required: true
        description: Enum meaning
      - name: source
        type: object
        required: false
        description: Source code location (distinguished by frontend, backend keys)
      - name: notes
        type: string
        required: false
        description: Implementation notes
      - name: values
        type: list
        required: true
        description: "Enum value list. Each item has {value, description}, optionally including code"

  - name: object_types
    description: Core object type definitions of the domain
    fields:
      - name: name
        type: string
        required: true
        description: Object type name
      - name: domain
        type: string
        required: true
        description: Owning domain
      - name: description
        type: string
        required: true
        description: Object description
      - name: db_table
        type: string
        required: false
        description: Mapped DB table name
      - name: normalization_status
        type: enum
        required: false
        description: "Normalization status (legacy | partial | normalized)"
      - name: code_mapping
        type: object
        required: false
        description: "Code mapping info. Includes canonical (canonical name), legacy_aliases (legacy aliases), code_entity (code entity name), db_table, fk_variants (FK variants)"
      - name: source
        type: object
        required: false
        description: "Source location (distinguished by backend.entity, backend.table, frontend keys)"
      - name: properties
        type: list
        required: true
        description: "Object property list. Each item has {name, type, nullable, description}, optionally including enum_ref"
      - name: state_machine
        type: object
        required: false
        description: "State machine definition. Includes field (state field), states (state list), transitions (transition rules)"
      - name: notes
        type: list
        required: false
        description: Implementation reference notes list

  - name: link_types
    description: Relationship definition between objects
    fields:
      - name: id
        type: string
        required: true
        description: Relationship identifier
      - name: from
        type: string
        required: true
        description: Source object
      - name: to
        type: string
        required: true
        description: Target object
      - name: type
        type: string
        required: true
        description: Relationship type (Korean name)
      - name: cardinality
        type: string
        required: true
        description: "Cardinality (1:1, 1:N, N:1, N:M)"
      - name: fk_column
        type: string
        required: false
        description: FK column path
      - name: description
        type: string
        required: true
        description: Relationship description

  - name: actors
    description: Definition of actors who perform actions in the system (action-types.yaml)
    fields:
      - name: id
        type: string
        required: true
        description: Actor identifier
      - name: description
        type: string
        required: true
        description: Actor description

  - name: action_types
    description: Domain action definitions. Distinguishes Command (mutating) and Query (read-only) (action-types.yaml)
    fields:
      - name: id
        type: string
        required: true
        description: Action identifier
      - name: name
        type: string
        required: true
        description: Action name (PascalCase)
      - name: display_name
        type: string
        required: true
        description: Action display name
      - name: domain
        type: string
        required: true
        description: Owning domain
      - name: actor
        type: string
        required: true
        description: Action actor
      - name: mutating
        type: enum
        required: true
        description: "Whether it is a mutating action (true: Command, false: Query)"
      - name: target_object_types
        type: list
        required: true
        description: Target ObjectType list
      - name: preconditions
        type: list
        required: false
        description: "Precondition list. Each item includes {check, policy_ref}"
      - name: results
        type: list
        required: false
        description: Action result description
      - name: state_transitions
        type: list
        required: false
        description: Triggered state transitions
      - name: side_effects
        type: list
        required: false
        description: Side effects (external API calls, etc.)
      - name: source_code
        type: string
        required: false
        description: Source code location

  - name: functions
    description: Domain rules and cross-entity constraint definitions (object-types.yaml)
    fields:
      - name: policy_constants
        type: list
        required: false
        description: "Policy constant list. Each item includes {id, value, unit, description, changeable, source_code, used_by_guard}"
      - name: cross_entity_guards
        type: list
        required: false
        description: "Cross-entity guard list. Each item includes {id, source_entity, target_entity, target_transition, check, description, source_code}"

  - name: domain_flows
    description: Domain workflow definitions
    fields:
      - name: name
        type: string
        required: true
        description: Flow name
      - name: description
        type: string
        required: true
        description: Flow description
      - name: external_dependencies
        type: list
        required: false
        description: External dependency systems
      - name: steps
        type: list
        required: true
        description: Flow step list (in order)
      - name: involved_entities
        type: list
        required: true
        description: Related entity list

name: Knowledge Graph
version: 1
description: Simple graph-structured knowledge graph ontology. Classifies entities by entity_type, expresses relationships with Relations, and auxiliary attributes such as actors/policies with Properties.
golden_reference: golden/c-knowledge-graph.yaml
sections:
  - name: entities
    description: "Domain entity definition. Types distinguished by entity_type (domain_object, enum, state_machine, etc.)"
    fields:
      - name: name
        type: string
        required: true
        description: Entity name
      - name: entity_type
        type: enum
        required: true
        description: "Entity type (domain_object | enum | state_machine | mapping_table | command | query | flow, etc.)"
      - name: domain
        type: string
        required: true
        description: Owning domain
      - name: description
        type: string
        required: true
        description: Entity description
      - name: normalization_status
        type: enum
        required: false
        description: "Normalization status (legacy | partial | normalized)"
      - name: db_table
        type: string
        required: false
        description: Mapped DB table name
      - name: code_mapping
        type: object
        required: false
        description: "Code mapping info. Includes canonical (canonical name), code_entity (code entity name), legacy_aliases (legacy aliases), fk_variants (FK variants)"
      - name: properties
        type: list
        required: true
        description: "Entity property list. Each item has {name, type, required, description}, optionally including enum_values"
      - name: state_machine
        type: object
        required: false
        description: "State machine definition. Includes field (state field), states (state list), transitions (transition rules)"
      - name: notes
        type: list
        required: false
        description: Implementation reference notes list
      - name: values
        type: list
        required: false
        description: "Value list for enum entity_type. Each item has {value, description}, optionally including code"

  - name: relations
    description: Relationship definition between entities
    fields:
      - name: from
        type: string
        required: true
        description: Source entity
      - name: to
        type: string
        required: true
        description: Target entity
      - name: type
        type: enum
        required: true
        description: "Relationship type (has_many | has_one | belongs_to | cross_entity_guard)"
      - name: name
        type: string
        required: false
        description: Relationship name
      - name: cardinality
        type: string
        required: true
        description: "Cardinality (1:1, 1:N, N:1, N:M)"
      - name: fk_column
        type: string
        required: false
        description: FK column path

  - name: properties
    description: "Definition of auxiliary properties such as actors, policy constants"
    fields:
      - name: name
        type: string
        required: true
        description: Property name
      - name: property_type
        type: enum
        required: true
        description: "Property type (actor | policy)"
      - name: description
        type: string
        required: true
        description: Property description
      - name: value
        type: string
        required: false
        description: Policy constant value (when property_type is policy)
      - name: changeable
        type: enum
        required: false
        description: "Whether changeable (true | false). Used for policy type"
      - name: source_code
        type: string
        required: false
        description: Source code location
      - name: used_by_guard
        type: list
        required: false
        description: List of guard IDs that reference this policy

name: Domain-Driven
version: 1
description: DDD-based ontology structure. Divides domain boundaries with Bounded Context, manages lifecycle with Aggregate, and expresses actions and flows with Domain Event/Command/Query/Saga.
golden_reference: golden/d-domain-driven.yaml
sections:
  - name: bounded_contexts
    description: Domain boundary definition. Groups related domains into one context
    fields:
      - name: name
        type: string
        required: true
        description: Bounded context name
      - name: description
        type: string
        required: true
        description: Description of the scope managed by the context
      - name: domains
        type: list
        required: true
        description: List of included domains

  - name: aggregates
    description: "Aggregate Root defines. State machine, boundary unit for domain invariants"
    fields:
      - name: name
        type: string
        required: true
        description: Aggregate name
      - name: bounded_context
        type: string
        required: true
        description: Owning Bounded Context
      - name: root_entity
        type: string
        required: true
        description: Aggregate Root entity
      - name: description
        type: string
        required: true
        description: Aggregate description
      - name: db_table
        type: string
        required: false
        description: Mapped DB table name
      - name: code_mapping
        type: object
        required: false
        description: "Code mapping info. Includes canonical, legacy_aliases, code_entity, fk_variants, note"
      - name: properties
        type: list
        required: true
        description: "Property list. Each item has {name, display_name, type, required, description}, optionally including enum_ref"
      - name: state_machine
        type: object
        required: false
        description: "State machine. Includes field (state field), states (state list), transitions (transition rules)"
      - name: invariants
        type: list
        required: false
        description: Domain invariant list

  - name: entities
    description: "Independent entities not included in Aggregates, or sub-entities within Aggregates"
    fields:
      - name: name
        type: string
        required: true
        description: Entity name
      - name: bounded_context
        type: string
        required: true
        description: Owning Bounded Context
      - name: aggregate
        type: string
        required: false
        description: "Owning Aggregate (independent entity if null)"
      - name: domain
        type: string
        required: true
        description: Owning domain
      - name: description
        type: string
        required: true
        description: Entity description
      - name: db_table
        type: string
        required: false
        description: Mapped DB table name
      - name: normalization_status
        type: enum
        required: false
        description: "Normalization status (legacy | partial | normalized)"
      - name: code_entity
        type: string
        required: false
        description: Code entity name (when different from canonical name)
      - name: properties
        type: list
        required: true
        description: "Property list. Each item has {name, type, required, description}, optionally including enum_ref"

  - name: policy_constants
    description: Domain policy constant definitions. Configuration values used for invariant validation
    fields:
      - name: id
        type: string
        required: true
        description: Policy constant identifier
      - name: value
        type: any
        required: true
        description: Policy constant value
      - name: unit
        type: string
        required: true
        description: "Unit of value (hours, minutes, count, percent, etc.)"
      - name: description
        type: string
        required: true
        description: Policy constant description
      - name: changeable
        type: boolean
        required: true
        description: Whether changeable during operation
      - name: source_code
        type: string
        required: false
        description: Source code location
      - name: used_by_guard
        type: list
        required: false
        description: List of guard IDs that reference this policy

  - name: value_objects
    description: "Value object definition. Mainly enum type, enumeration values used within the domain"
    fields:
      - name: name
        type: string
        required: true
        description: Value object name
      - name: type
        type: enum
        required: true
        description: "Value object type (enum)"
      - name: description
        type: string
        required: true
        description: Value object description
      - name: values
        type: list
        required: true
        description: Enumeration value list

  - name: domain_events
    description: Domain event definition. Represents Aggregate state transitions as events
    fields:
      - name: id
        type: string
        required: true
        description: Event identifier
      - name: name
        type: string
        required: true
        description: Event name (PascalCase)
      - name: aggregate
        type: string
        required: true
        description: Aggregate where the event occurs
      - name: trigger
        type: string
        required: true
        description: Event trigger condition
      - name: from_state
        type: list
        required: true
        description: Pre-transition state list
      - name: to_state
        type: string
        required: true
        description: Post-transition state
      - name: guard
        type: list
        required: false
        description: Precondition (guard) list
      - name: side_effects
        type: list
        required: false
        description: Side effect list
      - name: source_code
        type: string
        required: false
        description: Source code location

  - name: commands
    description: Domain command definition. Actions that modify state
    fields:
      - name: id
        type: string
        required: true
        description: Command identifier
      - name: name
        type: string
        required: true
        description: Command name (PascalCase)
      - name: display_name
        type: string
        required: true
        description: Command display name
      - name: actor
        type: string
        required: true
        description: Command execution actor
      - name: target_aggregate
        type: string
        required: false
        description: "Target Aggregate (action outside Aggregate if null)"
      - name: preconditions
        type: list
        required: false
        description: Precondition list
      - name: emits_events
        type: list
        required: false
        description: List of emitted domain event IDs
      - name: source_code
        type: string
        required: false
        description: Source code location

  - name: queries
    description: Domain query definition. Read-only actions
    fields:
      - name: id
        type: string
        required: true
        description: Query identifier
      - name: name
        type: string
        required: true
        description: Query name
      - name: domain
        type: string
        required: true
        description: Owning domain
      - name: target_entities
        type: list
        required: false
        description: Target entity list for query
      - name: endpoint
        type: string
        required: false
        description: API endpoint
      - name: actor
        type: string
        required: true
        description: Query execution actor

  - name: sagas
    description: Workflow spanning multiple Aggregates (Saga/Process Manager)
    fields:
      - name: name
        type: string
        required: true
        description: Saga name
      - name: description
        type: string
        required: true
        description: Saga description
      - name: external_dependencies
        type: list
        required: false
        description: External dependency systems
      - name: involved_aggregates
        type: list
        required: true
        description: Related Aggregate list
      - name: involved_entities
        type: list
        required: false
        description: Related entity list
      - name: steps
        type: list
        required: true
        description: Saga step list (in order)

  - name: relationships
    description: Relationship definition between entities/Aggregates
    fields:
      - name: from
        type: string
        required: true
        description: Source entity
      - name: to
        type: string
        required: true
        description: Target entity
      - name: type
        type: string
        required: true
        description: Relationship name
      - name: cardinality
        type: string
        required: true
        description: "Cardinality (1:1, 1:N, N:1, N:M)"
      - name: fk_column
        type: string
        required: false
        description: FK column path

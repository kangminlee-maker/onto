name: Domain-Driven
version: 1
description: DDD 기반 온톨로지 구조. Bounded Context로 도메인 경계를 나누고, Aggregate로 생명주기를 관리하며, Domain Event/Command/Query/Saga로 행위와 흐름을 표현합니다.
golden_reference: golden/d-domain-driven.yaml
sections:
  - name: bounded_contexts
    description: 도메인 경계 정의. 관련 도메인들을 하나의 맥락으로 묶음
    fields:
      - name: name
        type: string
        required: true
        description: 바운디드 컨텍스트 이름
      - name: description
        type: string
        required: true
        description: 컨텍스트가 담당하는 범위 설명
      - name: domains
        type: list
        required: true
        description: 포함된 도메인 목록

  - name: aggregates
    description: "Aggregate Root 정의. 상태 머신, 도메인 불변식(invariant)의 경계 단위"
    fields:
      - name: name
        type: string
        required: true
        description: Aggregate 이름
      - name: bounded_context
        type: string
        required: true
        description: 소속 Bounded Context
      - name: root_entity
        type: string
        required: true
        description: Aggregate Root 엔티티
      - name: description
        type: string
        required: true
        description: Aggregate 설명
      - name: db_table
        type: string
        required: false
        description: 매핑된 DB 테이블명
      - name: code_mapping
        type: object
        required: false
        description: "코드 매핑 정보. canonical, legacy_aliases, code_entity, fk_variants, note 포함"
      - name: properties
        type: list
        required: true
        description: "속성 목록. 각 항목은 {name, display_name, type, required, description}이며, 선택적으로 enum_ref를 포함"
      - name: state_machine
        type: object
        required: false
        description: "상태 머신. field(상태 필드), states(상태 목록), transitions(전이 규칙) 포함"
      - name: invariants
        type: list
        required: false
        description: 도메인 불변식 목록

  - name: entities
    description: "Aggregate에 포함되지 않는 독립 엔티티, 또는 Aggregate 내 하위 엔티티"
    fields:
      - name: name
        type: string
        required: true
        description: 엔티티 이름
      - name: bounded_context
        type: string
        required: true
        description: 소속 Bounded Context
      - name: aggregate
        type: string
        required: false
        description: "소속 Aggregate (null이면 독립 엔티티)"
      - name: domain
        type: string
        required: true
        description: 소속 도메인
      - name: description
        type: string
        required: true
        description: 엔티티 설명
      - name: db_table
        type: string
        required: false
        description: 매핑된 DB 테이블명
      - name: normalization_status
        type: enum
        required: false
        description: "정규화 상태 (legacy | partial | normalized)"
      - name: code_entity
        type: string
        required: false
        description: 코드상 엔티티명 (정규 이름과 다를 경우)
      - name: properties
        type: list
        required: true
        description: "속성 목록. 각 항목은 {name, type, required, description}이며, 선택적으로 enum_ref를 포함"

  - name: policy_constants
    description: 도메인 정책 상수 정의. 불변식 검증에 사용되는 설정 값
    fields:
      - name: id
        type: string
        required: true
        description: 정책 상수 식별자
      - name: value
        type: any
        required: true
        description: 정책 상수 값
      - name: unit
        type: string
        required: true
        description: "값의 단위 (hours, minutes, count, percent 등)"
      - name: description
        type: string
        required: true
        description: 정책 상수 설명
      - name: changeable
        type: boolean
        required: true
        description: 운영 중 변경 가능 여부
      - name: source_code
        type: string
        required: false
        description: 소스 코드 위치
      - name: used_by_guard
        type: list
        required: false
        description: 이 정책을 참조하는 가드 ID 목록

  - name: value_objects
    description: "값 객체 정의. 주로 enum 유형으로, 도메인 내에서 사용되는 열거형 값"
    fields:
      - name: name
        type: string
        required: true
        description: 값 객체 이름
      - name: type
        type: enum
        required: true
        description: "값 객체 유형 (enum)"
      - name: description
        type: string
        required: true
        description: 값 객체 설명
      - name: values
        type: list
        required: true
        description: 열거형 값 목록

  - name: domain_events
    description: 도메인 이벤트 정의. Aggregate의 상태 전이를 이벤트로 표현
    fields:
      - name: id
        type: string
        required: true
        description: 이벤트 식별자
      - name: name
        type: string
        required: true
        description: 이벤트 이름 (PascalCase)
      - name: aggregate
        type: string
        required: true
        description: 이벤트가 발생하는 Aggregate
      - name: trigger
        type: string
        required: true
        description: 이벤트 트리거 조건
      - name: from_state
        type: list
        required: true
        description: 전이 이전 상태 목록
      - name: to_state
        type: string
        required: true
        description: 전이 이후 상태
      - name: guard
        type: list
        required: false
        description: 사전 조건 (가드) 목록
      - name: side_effects
        type: list
        required: false
        description: 부수 효과 목록
      - name: source_code
        type: string
        required: false
        description: 소스 코드 위치

  - name: commands
    description: 도메인 커맨드 정의. 상태를 변경하는 행위
    fields:
      - name: id
        type: string
        required: true
        description: 커맨드 식별자
      - name: name
        type: string
        required: true
        description: 커맨드 이름 (PascalCase)
      - name: display_name
        type: string
        required: true
        description: 커맨드 표시 이름 (한국어)
      - name: actor
        type: string
        required: true
        description: 커맨드 실행 주체
      - name: target_aggregate
        type: string
        required: false
        description: "대상 Aggregate (null이면 Aggregate 외부 행위)"
      - name: preconditions
        type: list
        required: false
        description: 사전 조건 목록
      - name: emits_events
        type: list
        required: false
        description: 발생시키는 도메인 이벤트 ID 목록
      - name: source_code
        type: string
        required: false
        description: 소스 코드 위치

  - name: queries
    description: 도메인 쿼리 정의. 읽기 전용 행위
    fields:
      - name: id
        type: string
        required: true
        description: 쿼리 식별자
      - name: name
        type: string
        required: true
        description: 쿼리 이름 (한국어)
      - name: domain
        type: string
        required: true
        description: 소속 도메인
      - name: target_entities
        type: list
        required: false
        description: 조회 대상 엔티티 목록
      - name: endpoint
        type: string
        required: false
        description: API 엔드포인트
      - name: actor
        type: string
        required: true
        description: 쿼리 실행 주체

  - name: sagas
    description: 여러 Aggregate를 가로지르는 업무 흐름 (Saga/Process Manager)
    fields:
      - name: name
        type: string
        required: true
        description: Saga 이름
      - name: description
        type: string
        required: true
        description: Saga 설명
      - name: external_dependencies
        type: list
        required: false
        description: 외부 의존 시스템
      - name: involved_aggregates
        type: list
        required: true
        description: 관련 Aggregate 목록
      - name: involved_entities
        type: list
        required: false
        description: 관련 엔티티 목록
      - name: steps
        type: list
        required: true
        description: Saga 단계 목록 (순서대로)

  - name: relationships
    description: 엔티티/Aggregate 간 관계 정의
    fields:
      - name: from
        type: string
        required: true
        description: 출발 엔티티
      - name: to
        type: string
        required: true
        description: 도착 엔티티
      - name: type
        type: string
        required: true
        description: 관계 이름 (한국어)
      - name: cardinality
        type: string
        required: true
        description: "카디널리티 (1:1, 1:N, N:1, N:M)"
      - name: fk_column
        type: string
        required: false
        description: FK 컬럼 경로
